              - text: "]"
          - paragraph [ref=e764]: На рисунке показана хронограмма современных классов хордовых.
          - paragraph [ref=e765]:
            - text: При
            - link "кладистическом подходе" [ref=e766] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BB%D0%B0%D0%B4%D0%B8%D1%81%D1%82%D0%B8%D0%BA%D0%B0
            - text: сопоставление иерархии таксономических групп с ветвями филогенетического дерева сталкивается с определёнными трудностями. Например, при этом подходе класс лопастепёрых рыб содержит 8 видов собственно рыб, а также всех наземных хордовых (четвероногих), поскольку они произошли от лопастепёрых рыб. Между тем, традиционно четвероногие делятся на классы земноводных, пресмыкающихся, птиц и млекопитающих, то есть в кладистической системе несколько традиционных классов оказываются подчинёнными другому классу.
          - paragraph [ref=e767]: Не меньшие проблемы возникают в надклассе четвероногих. Невозможно выделить отдельную ветвь для рептилий, так как они не являются монофилетической группой (произошедшие от рептилий птицы традиционно выделяются в отдельный класс). В результате выделен класс завропсид, включающий в себя пресмыкающихся и птиц, а выделение птиц из завропсид показано тонкой линией. При этом нужно учитывать, что обозначенное на дереве число видов птиц входит в число видов завропсид.
