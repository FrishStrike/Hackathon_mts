                            - /url: https://web.archive.org/web/0/http://www.fossilworks.org/cgi-bin/bridge.pl?a=taxonInfo&taxon_no=273393
          - paragraph [ref=e314]:
            - text: Хо́рдовые
            - generic [ref=e315]:
              - text: (
              - link "лат." [ref=e316] [cursor=pointer]:
                - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: Chordata)
            - text: —
            - link "тип" [ref=e317] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B8%D0%BF_(%D0%B1%D0%B8%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F)
            - link "вторичноротых животных" [ref=e318] [cursor=pointer]:
              - /url: /wiki/%D0%92%D1%82%D0%BE%D1%80%D0%B8%D1%87%D0%BD%D0%BE%D1%80%D0%BE%D1%82%D1%8B%D0%B5
            - text: ", для которых характерно наличие"
            - link "энтодермального" [ref=e319] [cursor=pointer]:
              - /url: /wiki/%D0%AD%D0%BD%D1%82%D0%BE%D0%B4%D0%B5%D1%80%D0%BC%D0%B0
            - text: осевого
            - link "скелета" [ref=e320] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BA%D0%B5%D0%BB%D0%B5%D1%82
            - text: в виде
            - link "хорды" [ref=e321] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%BE%D1%80%D0%B4%D0%B0_(%D0%B7%D0%BE%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F)
            - text: ", которая у высших форм заменяется"
            - link "позвоночником" [ref=e322] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D0%B8%D0%BA
            - text: . По степени развития
            - link "нервной системы" [ref=e323] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D1%80%D0%B2%D0%BD%D0%B0%D1%8F_%D1%81%D0%B8%D1%81%D1%82%D0%B5%D0%BC%D0%B0
            - text: тип хордовых занимает высшее место среди всех животных. В мире известно более 60 000 видов хордовых.
          - paragraph [ref=e324]:
            - text: По определению Cameron, 2020, хордовые — крупнейшая
            - link "кроновая группа" [ref=e325] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D1%80%D0%BE%D0%BD%D0%BE%D0%B2%D0%B0%D1%8F_%D0%B3%D1%80%D1%83%D0%BF%D0%BF%D0%B0
            - text: ", включающая"
            - link "морскую миногу" [ref=e326] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D1%80%D1%81%D0%BA%D0%B0%D1%8F_%D0%BC%D0%B8%D0%BD%D0%BE%D0%B3%D0%B0
            - text: (Petromyzon marinus), но не
            - link "пурпурного стронгилоцентротуса" [ref=e327] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D1%83%D1%80%D0%BF%D1%83%D1%80%D0%BD%D1%8B%D0%B9_%D1%81%D1%82%D1%80%D0%BE%D0%BD%D0%B3%D0%B8%D0%BB%D0%BE%D1%86%D0%B5%D0%BD%D1%82%D1%80%D0%BE%D1%82%D1%83%D1%81
            - text: (Strongylocentrotus purpuratus)
            - superscript [ref=e328]:
              - link "[3]" [ref=e329] [cursor=pointer]:
                - /url: "#cite_note-3"
            - text: . Понятие хордовые объединяет
            - link "позвоночных" [ref=e330] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D1%8B%D0%B5
            - text: и некоторых
            - link "беспозвоночных" [ref=e331] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D1%81%D0%BF%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D1%8B%D0%B5
            - text: ", имеющих, по крайней мере в некоторый период их жизненного цикла,"
            - link "хорду" [ref=e332] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%BE%D1%80%D0%B4%D0%B0_(%D0%B7%D0%BE%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F)
            - text: ","
            - link "полый спинной нервный тяж" [ref=e333] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D1%80%D0%B2%D0%BD%D0%B0%D1%8F_%D1%82%D1%80%D1%83%D0%B1%D0%BA%D0%B0
            - text: ","
            - link "жаберные щели" [ref=e334] [cursor=pointer]:
              - /url: /wiki/%D0%96%D0%B0%D0%B1%D1%80%D1%8B
            - text: ","
            - link "эндостиль" [ref=e335] [cursor=pointer]:
              - /url: /wiki/%D0%AD%D0%BD%D0%B4%D0%BE%D1%81%D1%82%D0%B8%D0%BB%D1%8C
            - text: "и хвост, располагающийся позади смещённого на вентральную сторону тела анального отверстия. Тип хордовых делится на три подтипа:"
            - link "бесчерепных" [ref=e336] [cursor=pointer]:
              - /url: /wiki/Acrania
            - text: ","
            - link "оболочников" [ref=e337] [cursor=pointer]:
              - /url: /wiki/Tunicata
            - text: ","
            - link "позвоночных" [ref=e338] [cursor=pointer]:
              - /url: /wiki/Vertebrata
            - text: . Ранее в качестве четвёртого подтипа рассматривались
            - link "полухордовые" [ref=e339] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%BB%D1%83%D1%85%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5
            - text: ", которые теперь вынесены в классификации в отдельную группу."
          - generic [ref=e340]:
            - heading "Особенности строения" [level=2] [ref=e341]: Особенности строения
            - generic [ref=e342]:
              - text: "["
              - link "править" [ref=e343] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A5%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5&veaction=edit&section=1
              - text: "|"
              - link "править код" [ref=e344] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A5%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5&action=edit&section=1
              - text: "]"
          - figure "Схема строения обобщённого хордового животного, показывающая его основные особенности" [ref=e345]:
            - link [ref=e346] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:General_chordate_morphology.svg?uselang=ru
              - img [ref=e347]
            - generic [ref=e348]: Схема строения обобщённого хордового животного, показывающая его основные особенности
          - paragraph [ref=e349]:
            - text: Хордовые — тип животных, характеризующихся
            - link "билатеральной симметрией" [ref=e350] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B8%D0%BB%D0%B0%D1%82%D0%B5%D1%80%D0%B0%D0%BB%D1%8C%D0%BD%D0%B0%D1%8F_%D1%81%D0%B8%D0%BC%D0%BC%D0%B5%D1%82%D1%80%D0%B8%D1%8F
            - text: "и наличием, по крайней мере, на определённых стадиях развития следующих признаков:"
          - list [ref=e351]:
            - listitem [ref=e352]:
              - link "Хорда" [ref=e353] [cursor=pointer]:
                - /url: /wiki/%D0%A5%D0%BE%D1%80%D0%B4%D0%B0_(%D0%B7%D0%BE%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F)
              - text: ", представляющая собой эластичный стержень, образующийся путём выпячивания спинной стороны кишечной трубки. У большинства"
              - link "позвоночных" [ref=e354] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D1%8B%D0%B5
              - text: хорда в ходе
              - link "эмбрионального развития" [ref=e355] [cursor=pointer]:
                - /url: /wiki/%D0%AD%D0%BC%D0%B1%D1%80%D0%B8%D0%BE%D0%BD%D0%B0%D0%BB%D1%8C%D0%BD%D0%BE%D0%B5_%D1%80%D0%B0%D0%B7%D0%B2%D0%B8%D1%82%D0%B8%D0%B5
              - text: полностью или частично замещается хрящевой и костной тканью, образующей
              - link "позвоночник" [ref=e356] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D0%B8%D0%BA
              - text: .
            - listitem [ref=e357]:
              - link "Нервная трубка" [ref=e358] [cursor=pointer]:
                - /url: /wiki/%D0%9D%D0%B5%D1%80%D0%B2%D0%BD%D0%B0%D1%8F_%D1%82%D1%80%D1%83%D0%B1%D0%BA%D0%B0
              - text: ", расположенная дорсально. У позвоночных развивается в"
              - link "спинной мозг" [ref=e359] [cursor=pointer]:
                - /url: /wiki/%D0%A1%D0%BF%D0%B8%D0%BD%D0%BD%D0%BE%D0%B9_%D0%BC%D0%BE%D0%B7%D0%B3
              - text: и
              - link "головной мозг" [ref=e360] [cursor=pointer]:
                - /url: /wiki/%D0%93%D0%BE%D0%BB%D0%BE%D0%B2%D0%BD%D0%BE%D0%B9_%D0%BC%D0%BE%D0%B7%D0%B3
              - text: .
            - listitem [ref=e361]:
              - link "Жаберные щели" [ref=e362] [cursor=pointer]:
                - /url: /wiki/%D0%96%D0%B0%D0%B1%D1%80%D1%8B
              - text: — парные отверстия в
              - link "глотке" [ref=e363] [cursor=pointer]:
                - /url: /wiki/%D0%93%D0%BB%D0%BE%D1%82%D0%BA%D0%B0
              - text: . У низших хордовых участвуют в фильтрации воды для питания. У наземных позвоночных жаберные щели закладываются в раннем
              - link "эмбриогенезе" [ref=e364] [cursor=pointer]:
                - /url: /wiki/%D0%AD%D0%BC%D0%B1%D1%80%D0%B8%D0%BE%D0%B3%D0%B5%D0%BD%D0%B5%D0%B7
              - text: в виде жаберных мешочков.
            - listitem [ref=e365]:
              - link "Мышечный хвост" [ref=e366] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9C%D1%8B%D1%88%D0%B5%D1%87%D0%BD%D1%8B%D0%B9_%D1%85%D0%B2%D0%BE%D1%81%D1%82&action=edit&redlink=1
              - text: — постанальный отдел тела, расположенный каудальнее смещённого на брюшную сторону тела
              - link "ануса" [ref=e367] [cursor=pointer]:
                - /url: /wiki/%D0%90%D0%BD%D1%83%D1%81
              - text: (в него заходят хорда и нервная трубка, но не заходит кишечник).
            - listitem [ref=e368]:
              - link "Эндостиль" [ref=e369] [cursor=pointer]:
                - /url: /wiki/%D0%AD%D0%BD%D0%B4%D0%BE%D1%81%D1%82%D0%B8%D0%BB%D1%8C
              - text: — желобок на вентральной стороне глотки. У низших хордовых-
              - link "фильтраторов" [ref=e370] [cursor=pointer]:
                - /url: /wiki/%D0%A4%D0%B8%D0%BB%D1%8C%D1%82%D1%80%D0%B0%D1%82%D0%BE%D1%80%D1%8B
              - text: в нём производится слизь, помогающая собирать частицы пищи и доставлять их в пищевод. Также в нём накапливается
              - link "иод" [ref=e371] [cursor=pointer]:
                - /url: /wiki/%D0%98%D0%BE%D0%B4
              - text: и, вероятно, он является предшественником
              - link "щитовидной железы" [ref=e372] [cursor=pointer]:
                - /url: /wiki/%D0%A9%D0%B8%D1%82%D0%BE%D0%B2%D0%B8%D0%B4%D0%BD%D0%B0%D1%8F_%D0%B6%D0%B5%D0%BB%D0%B5%D0%B7%D0%B0
              - text: позвоночных. Как таковой, эндостиль у позвоночных есть только у
              - link "пескоройки" [ref=e373] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%B5%D1%81%D0%BA%D0%BE%D1%80%D0%BE%D0%B9%D0%BA%D0%B0
              - text: .
          - generic [ref=e374]:
            - heading "Происхождение" [level=2] [ref=e375]: Происхождение
            - generic [ref=e376]:
              - text: "["
              - link "править" [ref=e377] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A5%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5&veaction=edit&section=2
              - text: "|"
              - link "править код" [ref=e378] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A5%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5&action=edit&section=2
              - text: "]"
          - paragraph [ref=e379]:
            - text: В настоящее время достигнуто согласие, что хордовые —
            - link "монофилетическая" [ref=e380] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D0%BD%D0%BE%D1%84%D0%B8%D0%BB%D0%B8%D1%8F
            - text: группа (являются потомками одного общего предка, который сам был хордовым), а ближайшими родственниками
            - link "позвоночных" [ref=e381] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D1%8B%D0%B5
            - generic [ref=e382]:
              - text: (
              - link "лат." [ref=e383] [cursor=pointer]:
                - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: Vertebrata)
            - text: являются
            - link "оболочники" [ref=e384] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%B1%D0%BE%D0%BB%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
            - generic [ref=e385]:
              - text: (
              - link "лат." [ref=e386] [cursor=pointer]:
                - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: Tunicata)
            - superscript [ref=e387]:
              - link "[4]" [ref=e388] [cursor=pointer]:
                - /url: "#cite_note-Markov_2008-4"
            - superscript [ref=e389]:
              - link "[5]" [ref=e390] [cursor=pointer]:
                - /url: "#cite_note-Yastrebov_2015-5"
            - text: . Поскольку окаменелости ранних хордовых плохо сохранились, выяснить родственные связи представителей типа можно только с помощью
            - link "молекулярной филогенетики" [ref=e391] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D0%BB%D0%B5%D0%BA%D1%83%D0%BB%D1%8F%D1%80%D0%BD%D0%B0%D1%8F_%D1%84%D0%B8%D0%BB%D0%BE%D0%B3%D0%B5%D0%BD%D0%B5%D1%82%D0%B8%D0%BA%D0%B0
            - text: .
          - paragraph [ref=e392]:
            - link "Билатеральные" [ref=e393] [cursor=pointer]:
              - /url: /wiki/Bilateria
            - text: животные делятся на две большие группы —
            - link "первичноротые" [ref=e394] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B5%D1%80%D0%B2%D0%B8%D1%87%D0%BD%D0%BE%D1%80%D0%BE%D1%82%D1%8B%D0%B5
            - text: и
            - link "вторичноротые" [ref=e395] [cursor=pointer]:
              - /url: /wiki/%D0%92%D1%82%D0%BE%D1%80%D0%B8%D1%87%D0%BD%D0%BE%D1%80%D0%BE%D1%82%D1%8B%D0%B5
            - text: . Хордовые относятся ко вторичноротым. Весьма вероятно, что ископаемое
            - link "кимберелла" [ref=e396] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D0%BC%D0%B1%D0%B5%D1%80%D0%B5%D0%BB%D0%BB%D0%B0
            - text: ", жившая 555 млн лет назад, принадлежала к первичноротым"
            - superscript [ref=e397]:
              - link "[6]" [ref=e398] [cursor=pointer]:
                - /url: "#cite_note-6"
            - text: . Жившая 549—543 млн лет назад в
            - link "эдиакарии" [ref=e399] [cursor=pointer]:
              - /url: /wiki/%D0%AD%D0%B4%D0%B8%D0%B0%D0%BA%D0%B0%D1%80%D0%B8%D0%B9
            - link "эрниетта" [ref=e400] [cursor=pointer]:
              - /url: /wiki/%D0%AD%D1%80%D0%BD%D0%B8%D0%B5%D1%82%D1%82%D0%B0
            - text: была уже явно вторичноротым животным
            - superscript [ref=e401]:
              - link "[7]" [ref=e402] [cursor=pointer]:
                - /url: "#cite_note-7"
            - text: . Таким образом, первичноротые и вторичноротые должны были разделиться до времени существования этих животных, то есть до начала
            - link "кембрийского периода" [ref=e403] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B5%D0%BC%D0%B1%D1%80%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D0%BF%D0%B5%D1%80%D0%B8%D0%BE%D0%B4
            - superscript [ref=e404]:
              - link "[8]" [ref=e405] [cursor=pointer]:
                - /url: "#cite_note-8"
            - text: .
          - paragraph [ref=e406]:
            - text: Первые известные ископаемые двух близких к хордовым групп —
            - link "иглокожих" [ref=e407] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%B3%D0%BB%D0%BE%D0%BA%D0%BE%D0%B6%D0%B8%D0%B5
            - text: и
            - link "полухордовых" [ref=e408] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%BB%D1%83%D1%85%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5
            - text: — обнаруживаются с раннего и среднего кембрия соответственно
            - superscript [ref=e409]:
              - link "[9]" [ref=e410] [cursor=pointer]:
                - /url: "#cite_note-9"
            - superscript [ref=e411]:
              - link "[10]" [ref=e412] [cursor=pointer]:
                - /url: "#cite_note-10"
            - text: . Кроме того, известно ископаемое
            - link "чэнцзянской биоты" [ref=e413] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B0%D0%BE%D1%82%D1%8F%D0%BD%D1%8C%D1%88%D0%B0%D0%BD%D1%8C%D1%81%D0%BA%D0%B8%D0%B5_%D1%81%D0%BB%D0%B0%D0%BD%D1%86%D1%8B
            - link "Yunnanozoon" [ref=e415] [cursor=pointer]:
              - /url: /wiki/Yunnanozoon
            - text: ", принадлежность которого к полухордовым или хордовым не определена"
            - superscript [ref=e416]:
              - link "[11]" [ref=e417] [cursor=pointer]:
                - /url: "#cite_note-11"
            - superscript [ref=e418]:
              - link "[12]" [ref=e419] [cursor=pointer]:
                - /url: "#cite_note-Chen-12"
            - text: . Другое ископаемое, относящееся к той же биоте,
            - link "Haikouella lanceolata" [ref=e421] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%B0%D0%B9%D0%BA%D0%BE%D1%83%D1%8D%D0%BB%D0%BB%D0%B0
            - text: явно является хордовым и, возможно, позвоночным. У него обнаружены признаки сердца, артерий, нервной трубки и мозга, хвоста, жаберных лепестков, возможно, глаз, но в то же время вокруг ротового отверстия есть щупальца
            - superscript [ref=e422]:
              - link "[12]" [ref=e423] [cursor=pointer]:
                - /url: "#cite_note-Chen-12"
            - text: .
            - link "Haikouichthys" [ref=e425] [cursor=pointer]:
              - /url: /wiki/Haikouichthys
            - text: и
            - link "Myllokunmingia" [ref=e427] [cursor=pointer]:
              - /url: /wiki/Myllokunmingia
            - text: ", также из чэнцзянской фауны, и"
            - link "пикайя" [ref=e428] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B8%D0%BA%D0%B0%D0%B9%D1%8F
            - text: из
            - link "сланцев Бёрджес" [ref=e429] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B0%D1%83%D0%BD%D0%B0_%D1%81%D0%BB%D0%B0%D0%BD%D1%86%D0%B5%D0%B2_%D0%91%D1%91%D1%80%D0%B4%D0%B6%D0%B5%D1%81
            - text: относятся к примитивным позвоночным
            - superscript [ref=e430]:
              - link "[13]" [ref=e431] [cursor=pointer]:
                - /url: "#cite_note-13"
            - superscript [ref=e432]:
              - link "[14]" [ref=e433] [cursor=pointer]:
                - /url: "#cite_note-14"
            - text: . Ископаемые ранних хордовых весьма редки, поскольку у них не было твёрдых частей тела.
          - paragraph [ref=e434]:
            - text: Исследования родственных отношений хордовых начались с 90-х годов XIX века. Они основывались на анатомических, эмбриологических и палеонтологических данных и приводили к разным
            - link "филогенетическим деревьям" [ref=e435] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B8%D0%BB%D0%BE%D0%B3%D0%B5%D0%BD%D0%B5%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%BE%D0%B5_%D0%B4%D0%B5%D1%80%D0%B5%D0%B2%D0%BE
            - text: . Некоторое время ближайшими современными родственниками хордовых считали полухордовых
            - superscript [ref=e436]:
              - link "[15]" [ref=e437] [cursor=pointer]:
                - /url: "#cite_note-15"
            - text: ", но позже ими оказалась группа, состоящая из полухордовых и иглокожих ("
            - link "Ambulacraria" [ref=e438] [cursor=pointer]:
              - /url: /wiki/Ambulacraria
            - text: )
            - superscript [ref=e439]:
              - link "[16]" [ref=e440] [cursor=pointer]:
                - /url: "#cite_note-Edgecombe_2011-16"
            - text: .
          - paragraph [ref=e441]:
            - text: Время разделения эволюционных линий хордовых и Ambulacraria на основании метода
            - link "молекулярных часов" [ref=e442] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D0%BB%D0%B5%D0%BA%D1%83%D0%BB%D1%8F%D1%80%D0%BD%D1%8B%D0%B5_%D1%87%D0%B0%D1%81%D1%8B
            - text: было оценено в 896 млн лет назад
            - superscript [ref=e443]:
              - link "[17]" [ref=e444] [cursor=pointer]:
                - /url: "#cite_note-Blair-17"
            - text: .
          - paragraph [ref=e445]:
            - text: Ниже приведена
