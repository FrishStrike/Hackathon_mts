          - paragraph [ref=e792]:
            - text: Бесчерепны́е (
            - link "лат." [ref=e793] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Cephalochordata) или головохо́рдовые (
            - link "лат." [ref=e794] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Acrania)
            - superscript [ref=e795]:
              - link "[21]" [ref=e796] [cursor=pointer]:
                - /url: "#cite_note-БСЭ_1-21"
            - text: — небольшие морские рыбообразные животные со всеми признаками, свойственными хордовым.
            - link "Бесчерепные" [ref=e797] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D0%BB%D0%BE%D0%B2%D0%BE%D1%85%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5
            - text: — подтип низших хордовых животных, в отличие от других хордовых (
            - link "оболочников" [ref=e798] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%B1%D0%BE%D0%BB%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
            - text: и
            - link "позвоночных" [ref=e799] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D1%8B%D0%B5
            - text: ), сохраняющий основные признаки типа (
            - link "хорда" [ref=e800] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%BE%D1%80%D0%B4%D0%B0_(%D0%B7%D0%BE%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F)
            - text: ","
            - link "нервная трубка" [ref=e801] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D1%80%D0%B2%D0%BD%D0%B0%D1%8F_%D1%82%D1%80%D1%83%D0%B1%D0%BA%D0%B0
            - text: и жаберные щели) в течение всей жизни.
            - link "Головной мозг" [ref=e802] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D0%BB%D0%BE%D0%B2%D0%BD%D0%BE%D0%B9_%D0%BC%D0%BE%D0%B7%D0%B3
            - text: отсутствует, органы чувств примитивны
            - superscript [ref=e803]:
              - link "[22]" [ref=e804] [cursor=pointer]:
                - /url: "#cite_note-22"
            - text: . Ведут придонный образ жизни, по характеру питания — роющие
            - link "фильтраторы" [ref=e805] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B8%D0%BB%D1%8C%D1%82%D1%80%D0%B0%D1%82%D0%BE%D1%80%D1%8B
            - superscript [ref=e806]:
              - link "[23]" [ref=e807] [cursor=pointer]:
                - /url: "#cite_note-Gee2008AmphioxusUnleashed-23"
            - superscript [ref=e808]:
              - link "[24]" [ref=e809] [cursor=pointer]:
                - /url: "#cite_note-24"
            - text: . Всего к бесчерепным относятся около 30
            - link "видов" [ref=e810] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B8%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B9_%D0%B2%D0%B8%D0%B4
            - text: ", составляющих один класс —"
