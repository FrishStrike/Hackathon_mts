          - figure "Полухордовое рода Saccoglossus" [ref=e911]:
            - link [ref=e912] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Eichelwurm.jpg?uselang=ru
              - img [ref=e913]
            - generic [ref=e914]: Полухордовое рода Saccoglossus
          - note [ref=e915]:
            - text: "Основная статья:"
            - link "Полухордовые" [ref=e916] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%BB%D1%83%D1%85%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5
          - paragraph [ref=e917]:
            - text: Полухо́рдовые (
            - link "лат." [ref=e918] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Hemichordata) — тип морских донных
            - link "беспозвоночных" [ref=e919] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D1%81%D0%BF%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D1%8B%D0%B5
            - text: из группы вторичноротых. Мягкотелые червеобразные животные. В мире известно 130 видов
            - superscript [ref=e920]:
              - link "[33]" [ref=e921] [cursor=pointer]:
                - /url: "#cite_note-Tassia_2016-33"
            - text: ", в России — 4 вида"
            - superscript [ref=e922]:
              - link "[34]" [ref=e923] [cursor=pointer]:
                - /url: "#cite_note-zin-count-34"
            - text: . Первоначально полухордовые считались подтипом или близкими родственниками хордовых, с которыми их объединяет наличие жаберных щелей, спинного нервного ствола и хордоподобного органа (стомохорда), представляющего собой вырост кишечника, поддерживающий хоботок. Однако стомохорд не
            - link "гомологичен" [ref=e924] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D0%BC%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F_(%D0%B1%D0%B8%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F)
            - link "хорде" [ref=e925] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%BE%D1%80%D0%B4%D0%B0_(%D0%B7%D0%BE%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F)
            - text: ". Кроме того, в отличие от хордовых, у полухордовых тело чётко делится на 3 отдела: хоботок (у кишечнодышащих) или головной щит (у"
            - link "перистожаберных" [ref=e926] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B5%D1%80%D0%B8%D1%81%D1%82%D0%BE%D0%B6%D0%B0%D0%B1%D0%B5%D1%80%D0%BD%D1%8B%D0%B5
            - text: "), воротник и туловище. Есть и ещё ряд отличий от хордовых: строение сердца, нервной системы и другие особенности внутренней организации, например, помимо спинного, у полухордовых есть и брюшной нервный тяж. Выделяют два класса:"
            - link "кишечнодышащие" [ref=e927] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D1%88%D0%B5%D1%87%D0%BD%D0%BE%D0%B4%D1%8B%D1%88%D0%B0%D1%89%D0%B8%D0%B5
            - text: (
            - link "лат." [ref=e928] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Enteropneusta) — 108 современных видов — и
            - link "перистожаберные" [ref=e929] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B5%D1%80%D0%B8%D1%81%D1%82%D0%BE%D0%B6%D0%B0%D0%B1%D0%B5%D1%80%D0%BD%D1%8B%D0%B5
            - text: (
            - link "лат." [ref=e930] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Pterobranchia) — 22 современных вида
            - superscript [ref=e931]:
              - link "[33]" [ref=e932] [cursor=pointer]:
                - /url: "#cite_note-Tassia_2016-33"
            - text: . К последним принадлежат
            - link "граптолиты" [ref=e933] [cursor=pointer]:
              - /url: /wiki/%D0%93%D1%80%D0%B0%D0%BF%D1%82%D0%BE%D0%BB%D0%B8%D1%82%D1%8B
            - text: ", широко распространённые в"
            - link "палеозое" [ref=e934] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B0%D0%BB%D0%B5%D0%BE%D0%B7%D0%BE%D0%B9
            - text: и ранее считавшиеся отдельным классом
            - superscript [ref=e935]:
              - link "[33]" [ref=e936] [cursor=pointer]:
                - /url: "#cite_note-Tassia_2016-33"
            - text: .
          - paragraph [ref=e937]:
            - text: Сходство
            - link "личинок" [ref=e938] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B8%D1%87%D0%B8%D0%BD%D0%BA%D0%B0
            - text: полухордовых (
            - link "торнарии" [ref=e939] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%BE%D1%80%D0%BD%D0%B0%D1%80%D0%B8%D1%8F
            - text: ) с личинками-
            - link "бипиннариями" [ref=e940] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B8%D0%BF%D0%B8%D0%BD%D0%BD%D0%B0%D1%80%D0%B8%D1%8F
            - link "иглокожих" [ref=e941] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%B3%D0%BB%D0%BE%D0%BA%D0%BE%D0%B6%D0%B8%D0%B5
            - text: позволило считать полухордовых промежуточным звеном между
            - link "иглокожими" [ref=e942] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%B3%D0%BB%D0%BE%D0%BA%D0%BE%D0%B6%D0%B8%D0%B5
            - text: и хордовыми.
          - generic [ref=e943]:
            - heading "Иглокожие" [level=3] [ref=e944]: Иглокожие
            - generic [ref=e945]:
              - text: "["
              - link "править" [ref=e946] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A5%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5&veaction=edit&section=11
              - text: "|"
              - link "править код" [ref=e947] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A5%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5&action=edit&section=11
              - text: "]"
          - 'figure "Иглокожие: морские звёзды" [ref=e948]':
            - link [ref=e949] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Sandstar_300.jpg?uselang=ru
              - img [ref=e950]
            - generic [ref=e951]:
              - link "Иглокожие" [ref=e952] [cursor=pointer]:
                - /url: /wiki/%D0%98%D0%B3%D0%BB%D0%BE%D0%BA%D0%BE%D0%B6%D0%B8%D0%B5
              - text: ":"
              - link "морские звёзды" [ref=e953] [cursor=pointer]:
                - /url: /wiki/%D0%9C%D0%BE%D1%80%D1%81%D0%BA%D0%B0%D1%8F_%D0%B7%D0%B2%D0%B5%D0%B7%D0%B4%D0%B0
          - note [ref=e954]:
            - text: "Основная статья:"
            - link "Иглокожие" [ref=e955] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%B3%D0%BB%D0%BE%D0%BA%D0%BE%D0%B6%D0%B8%D0%B5
          - paragraph [ref=e956]:
            - text: Иглоко́жие (
            - link "лат." [ref=e957] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Echinodermata) —
            - link "тип" [ref=e958] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B8%D0%BF_(%D0%B1%D0%B8%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F)
            - text: исключительно морских донных
            - link "животных" [ref=e959] [cursor=pointer]:
              - /url: /wiki/%D0%96%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D1%8B%D0%B5
            - text: ", большей частью свободноживущих, реже сидячих, встречающихся на любых глубинах"
            - link "Мирового океана" [ref=e960] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%BA%D0%B5%D0%B0%D0%BD
            - text: . Насчитывается около 7000 современных
            - link "видов" [ref=e961] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B8%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B9_%D0%B2%D0%B8%D0%B4
            - text: (в России — 400)
            - superscript [ref=e962]:
              - link "[35]" [ref=e963] [cursor=pointer]:
                - /url: "#cite_note-autogenerated1-35"
            - text: . Наряду с хордовыми, иглокожие относятся к ветви
            - link "вторичноротых животных" [ref=e964] [cursor=pointer]:
              - /url: /wiki/%D0%92%D1%82%D0%BE%D1%80%D0%B8%D1%87%D0%BD%D0%BE%D1%80%D0%BE%D1%82%D1%8B%D0%B5
            - text: (Deuterostomia). Современными представителями типа являются
            - link "морские звёзды" [ref=e965] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D1%80%D1%81%D0%BA%D0%B8%D0%B5_%D0%B7%D0%B2%D1%91%D0%B7%D0%B4%D1%8B
            - text: ","
            - link "морские ежи" [ref=e966] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D1%80%D1%81%D0%BA%D0%B8%D0%B5_%D0%B5%D0%B6%D0%B8
            - text: ","
            - link "офиуры" [ref=e967] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%84%D0%B8%D1%83%D1%80%D1%8B
            - text: (змеехвостки),
            - link "голотурии" [ref=e968] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D0%BB%D0%BE%D1%82%D1%83%D1%80%D0%B8%D0%B8
            - text: (морские огурцы) и
            - link "морские лилии" [ref=e969] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D1%80%D1%81%D0%BA%D0%B8%D0%B5_%D0%BB%D0%B8%D0%BB%D0%B8%D0%B8
            - text: . В состав этого типа входят также приблизительно 13 000 вымерших видов, которые процветали в морях, начиная с раннего
            - link "кембрия" [ref=e970] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B5%D0%BC%D0%B1%D1%80%D0%B8%D0%B9
            - text: .
          - paragraph [ref=e971]: "Иглокожие отличаются от хордовых тремя признаками:"
          - list [ref=e972]:
            - listitem [ref=e973]:
              - text: вместо двусторонней (
              - link "билатеральной" [ref=e974] [cursor=pointer]:
                - /url: /wiki/%D0%91%D0%B8%D0%BB%D0%B0%D1%82%D0%B5%D1%80%D0%B0%D0%BB%D1%8C%D0%BD%D0%B0%D1%8F_%D1%81%D0%B8%D0%BC%D0%BC%D0%B5%D1%82%D1%80%D0%B8%D1%8F
              - text: ) они обладают
              - link "радиальной симметрией" [ref=e975] [cursor=pointer]:
                - /url: /wiki/%D0%A0%D0%B0%D0%B4%D0%B8%D0%B0%D0%BB%D1%8C%D0%BD%D0%B0%D1%8F_%D1%81%D0%B8%D0%BC%D0%BC%D0%B5%D1%82%D1%80%D0%B8%D1%8F
              - text: ;
            - listitem [ref=e976]: схема строения их тела напоминает кольцо (в виде колеса с трубами-ногами);
            - listitem [ref=e977]:
              - text: их тела поддерживает
              - link "скелет" [ref=e978] [cursor=pointer]:
                - /url: /wiki/%D0%A1%D0%BA%D0%B5%D0%BB%D0%B5%D1%82
              - text: из
              - link "кальцита" [ref=e979] [cursor=pointer]:
                - /url: /wiki/%D0%9A%D0%B0%D0%BB%D1%8C%D1%86%D0%B8%D1%82
              - text: ", материала, не встречающегося у хордовых."
          - paragraph [ref=e980]:
            - text: Несмотря на то, что тела иглокожих хорошо защищены от воздействия окружающей среды кальцинированной оболочкой (скелетом), снаружи они покрываются тонкой кожей. Ноги иглокожих окружены
            - link "мышцами" [ref=e981] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D1%8B%D1%88%D1%86%D1%8B
