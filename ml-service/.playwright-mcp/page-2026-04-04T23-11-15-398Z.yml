          - paragraph [ref=e825]:
            - text: Оболо́чники (
            - link "лат." [ref=e826] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Tunicata, Urochordata) — подтип хордовых
            - link "животных" [ref=e827] [cursor=pointer]:
              - /url: /wiki/%D0%96%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D1%8B%D0%B5
            - text: . Включают 5 классов —
            - link "асцидий" [ref=e828] [cursor=pointer]:
              - /url: /wiki/%D0%90%D1%81%D1%86%D0%B8%D0%B4%D0%B8%D0%B8
            - text: ","
            - link "аппендикулярий" [ref=e829] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BF%D0%BF%D0%B5%D0%BD%D0%B4%D0%B8%D0%BA%D1%83%D0%BB%D1%8F%D1%80%D0%B8%D0%B8
            - text: ","
            - link "сальп" [ref=e830] [cursor=pointer]:
              - /url: /wiki/Salpida
            - text: ","
            - link "огнетелок" [ref=e831] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%B3%D0%BD%D0%B5%D1%82%D0%B5%D0%BB%D0%BA%D0%B8
            - text: и
            - link "бочёночников" [ref=e832] [cursor=pointer]:
              - /url: /wiki/Doliolida
            - text: . По другой классификации последние 3 класса считаются
            - link "отрядами" [ref=e833] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%82%D1%80%D1%8F%D0%B4_(%D0%B1%D0%B8%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%8F)
            - text: класса Thaliacea
            - superscript [ref=e834]:
              - link "[25]" [ref=e835] [cursor=pointer]:
                - /url: "#cite_note-25"
            - text: . Известно более 1 000 видов. Большинство из них имеют хорду только на личиночной стадии. Они распространены по всему миру и населяют морское дно.
          - paragraph [ref=e836]: "Три крупных класса оболочников:"
          - list [ref=e837]:
            - listitem [ref=e838]:
              - link "Асцидии" [ref=e839] [cursor=pointer]:
                - /url: /wiki/%D0%90%D1%81%D1%86%D0%B8%D0%B4%D0%B8%D0%B8
              - text: — низшие мягкотелые хордовые-фильтраторы, во взрослом состоянии ведущие сидячий образ жизни
              - superscript [ref=e840]:
                - link "[26]" [ref=e841] [cursor=pointer]:
                  - /url: "#cite_note-Benton2002VertebratePalaeontologyP5-26"
              - text: ;
            - listitem [ref=e842]:
              - link "аппендикулярии" [ref=e843] [cursor=pointer]:
                - /url: /wiki/%D0%90%D0%BF%D0%BF%D0%B5%D0%BD%D0%B4%D0%B8%D0%BA%D1%83%D0%BB%D1%8F%D1%80%D0%B8%D0%B8
              - text: сохраняют личиночные черты, такие как хвост, на протяжении всей жизни. По этой причине долгое время рассматривались как личинки асцидий и сальп
              - superscript [ref=e844]:
                - link "[27]" [ref=e845] [cursor=pointer]:
                  - /url: "#cite_note-27"
              - text: . Из-за наличия длинных хвостов личинки оболочников называют
              - link "лат." [ref=e846] [cursor=pointer]:
                - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: urochordata
              - superscript [ref=e847]:
                - link "[26]" [ref=e848] [cursor=pointer]:
                  - /url: "#cite_note-Benton2002VertebratePalaeontologyP5-26"
              - text: ;
            - listitem [ref=e849]:
              - text: третья группа
              - link "оболочников" [ref=e850] [cursor=pointer]:
                - /url: /wiki/%D0%9E%D0%B1%D0%BE%D0%BB%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
              - text: — свободноплавающие
              - link "сальпы" [ref=e851] [cursor=pointer]:
                - /url: /wiki/%D0%A1%D0%B0%D0%BB%D1%8C%D0%BF%D1%8B
              - text: ", питаются"
              - link "планктоном" [ref=e852] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%BB%D0%B0%D0%BD%D0%BA%D1%82%D0%BE%D0%BD
              - text: . В их жизненном цикле известно два поколения — одиночное гермафродитное и почкующееся колониальное бесполое. У личинок этих животных есть все основные признаки хордовых, в том числе хорда и хвост. Они также оснащены рудиментарным мозгом и датчиками
              - link "освещённости" [ref=e853] [cursor=pointer]:
                - /url: /wiki/%D0%93%D0%BB%D0%B0%D0%B7%D0%BA%D0%B8_%D0%93%D0%B5%D1%81%D1%81%D0%B5
              - text: и положения (крена)
              - superscript [ref=e854]:
                - link "[26]" [ref=e855] [cursor=pointer]:
                  - /url: "#cite_note-Benton2002VertebratePalaeontologyP5-26"
              - text: .
