          - paragraph [ref=e870]:
            - text: Позвоно́чные (
            - link "лат." [ref=e871] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D1%82%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Vertebrata) — высший подтип хордовых
            - link "животных" [ref=e872] [cursor=pointer]:
              - /url: /wiki/%D0%96%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D1%8B%D0%B5
            - text: . Доминирующая (наряду с
            - link "насекомыми" [ref=e873] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B0%D1%81%D0%B5%D0%BA%D0%BE%D0%BC%D1%8B%D0%B5
            - text: ) на земле и в воздушной среде группа животных. Отличаются от других хордовых наличием обособленного
            - link "черепа" [ref=e874] [cursor=pointer]:
              - /url: /wiki/%D0%A7%D0%B5%D1%80%D0%B5%D0%BF
            - text: и развитием
            - link "головного мозга" [ref=e875] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D0%BB%D0%BE%D0%B2%D0%BD%D0%BE%D0%B9_%D0%BC%D0%BE%D0%B7%D0%B3
            - text: и
            - link "органов чувств" [ref=e876] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%80%D0%B3%D0%B0%D0%BD%D1%8B_%D1%87%D1%83%D0%B2%D1%81%D1%82%D0%B2
            - text: . Хорда у большинства представителей высших хордовых замещается на
            - link "позвоночник" [ref=e877] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D0%B8%D0%BA
            - superscript [ref=e878]:
              - link "[28]" [ref=e879] [cursor=pointer]:
                - /url: "#cite_note-UCMPMorphologyOfVertebrates-28"
            - text: ", защищающий"
            - link "спинной мозг" [ref=e880] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BF%D0%B8%D0%BD%D0%BD%D0%BE%D0%B9_%D0%BC%D0%BE%D0%B7%D0%B3
            - text: и состоящий, как правило, из
            - link "хрящевой" [ref=e881] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D1%80%D1%8F%D1%89
            - text: и
            - link "костной ткани" [ref=e882] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D1%81%D1%82%D1%8C
            - text: .
            - link "Эндостиль" [ref=e883] [cursor=pointer]:
              - /url: /wiki/%D0%AD%D0%BD%D0%B4%D0%BE%D1%81%D1%82%D0%B8%D0%BB%D1%8C
            - text: ", как таковой, присутствует только у личинок"
            - link "миног" [ref=e884] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B8%D0%BD%D0%BE%D0%B3%D0%B8
            - superscript [ref=e885]:
              - link "[29]" [ref=e886] [cursor=pointer]:
                - /url: "#cite_note-29"
            - text: . По сравнению с низшими хордовыми —
            - link "бесчерепными" [ref=e887] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D0%BB%D0%BE%D0%B2%D0%BE%D1%85%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5
            - text: и
            - link "оболочниками" [ref=e888] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%B1%D0%BE%D0%BB%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
            - text: — они характеризуются значительно более высоким уровнем организации, что наглядно выражено как в их строении, так и в физиологических отправлениях. Среди позвоночных нет видов, ведущих сидячий (прикреплённый) образ жизни. Они перемещаются в широких пределах, активно разыскивая и захватывая пищу, находя для размножения особей другого пола, спасаясь от преследования врагов.
          - paragraph [ref=e889]:
            - text: У
            - link "миног" [ref=e890] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B8%D0%BD%D0%BE%D0%B3%D0%B8
            - text: есть недоразвитый
            - link "череп" [ref=e891] [cursor=pointer]:
              - /url: /wiki/%D0%A7%D0%B5%D1%80%D0%B5%D0%BF
            - text: и рудиментарные позвонки — следовательно, они могут рассматриваться как позвоночные
            - superscript [ref=e892]:
              - link "[30]" [ref=e893] [cursor=pointer]:
                - /url: "#cite_note-30"
            - text: .
            - link "Миксиновые" [ref=e894] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B8%D0%BA%D1%81%D0%B8%D0%BD%D0%BE%D0%B2%D1%8B%D0%B5
            - text: ", имеющие жаберный скелет, состоящий из небольшого числа хрящевых пластинок, рудиментарные позвонки, не всегда рассматриваются как истинные позвоночные"
            - superscript [ref=e895]:
              - link "[31]" [ref=e896] [cursor=pointer]:
                - /url: "#cite_note-31"
            - text: ", но"
            - link "молекулярная филогенетика" [ref=e897] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D0%BB%D0%B5%D0%BA%D1%83%D0%BB%D1%8F%D1%80%D0%BD%D0%B0%D1%8F_%D1%84%D0%B8%D0%BB%D0%BE%D0%B3%D0%B5%D0%BD%D0%B5%D1%82%D0%B8%D0%BA%D0%B0
            - text: показала, что это сестринская группа миног, образующая вместе с ними группу
            - link "круглоротых" [ref=e898] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D1%80%D1%83%D0%B3%D0%BB%D0%BE%D1%80%D0%BE%D1%82%D1%8B%D0%B5
            - superscript [ref=e899]:
              - link "[32]" [ref=e900] [cursor=pointer]:
                - /url: "#cite_note-32"
            - text: .
