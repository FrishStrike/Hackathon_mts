          - paragraph [ref=e735]:
            - text: Завропсиды (пресмыкающиеся и птицы) и синапсиды (млекопитающие и вымершие родственники) относятся к
            - link "кладе" [ref=e736] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BB%D0%B0%D0%B4%D0%B0
            - link "амниот" [ref=e737] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BC%D0%BD%D0%B8%D0%BE%D1%82%D1%8B
            - text: ", остальные классы позвоночных — к парафилетической группе"
            - link "анамний" [ref=e738] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B0%D0%BC%D0%BD%D0%B8%D0%B8
            - text: .
          - paragraph [ref=e739]:
            - text: Иногда отряды огнетелок, сальп и бочёночников повышают до классов в подтипе Tunicata. Также существует довольно много альтернативных классификаций позвоночных. Их наличие связано, в частности, с тем, что многие традиционно выделяемые группы позвоночных парафилетичны. Например, парафилетичны
            - link "лопастепёрые" [ref=e740] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%BE%D0%BF%D0%B0%D1%81%D1%82%D0%B5%D0%BF%D1%91%D1%80%D1%8B%D0%B5
            - text: (чтобы эта группа стала монофилетичной, в неё надо включить
            - link "наземных позвоночных" [ref=e741] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B5%D1%82%D1%80%D0%B0%D0%BF%D0%BE%D0%B4%D1%8B
            - text: ) и рептилии (в них с позиций
            - link "кладистической систематики" [ref=e742] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BB%D0%B0%D0%B4%D0%B8%D1%81%D1%82%D0%B8%D0%BA%D0%B0
            - text: следовало бы включить класс птиц).
          - paragraph [ref=e743]:
            - text: Очень часто используется несистемная группа
            - link "беспозвоночные" [ref=e744] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D1%81%D0%BF%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D1%8B%D0%B5
            - text: ", которая включает два подтипа хордовых ("
            - link "головохордовые" [ref=e745] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D0%BB%D0%BE%D0%B2%D0%BE%D1%85%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5
            - text: и
            - link "оболочники" [ref=e746] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%B1%D0%BE%D0%BB%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
            - text: ) и все остальные типы животных. Её использование подчёркивает важное значение, которое имеют
            - link "позвоночные" [ref=e747] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%B7%D0%B2%D0%BE%D0%BD%D0%BE%D1%87%D0%BD%D1%8B%D0%B5
            - text: в животном мире и жизни человека.
