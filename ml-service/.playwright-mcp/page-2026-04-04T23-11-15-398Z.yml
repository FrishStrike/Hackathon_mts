              - text: "["
              - link "править" [ref=e904] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A5%D0%BE%D1%80%D0%B4%D0%BE%D0%B2%D1%8B%D0%B5&veaction=edit&section=9
              - text: "|"
              - link "править код" [ref=e905] [cursor=pointer]:
