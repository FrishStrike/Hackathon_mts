            - generic [ref=e421]:
              - paragraph [ref=e422]:
                - text: Мониторы отображают визуальную часть работы компьютера, повышая удобство работы с ним. Выбор типа монитора зависит от ваших потребностей.
                - strong [ref=e423]:
                  - link "Игровые мониторы" [ref=e425] [cursor=pointer]:
                    - /url: https://www.samsung.com/ru/monitors/gaming/
                - text: ". Эти мониторы были разработаны специально для геймеров: высокая частота обновления (144 Гц, 165 Гц, 240 Гц и т. д.) обеспечивает плавность изображения, минимальное время отклика* (1 мс, 0,03 мс и т. д.) сокращает задержку пикселей на смену цветов. Такие технологии, как G-Sync и FreeSync, устраняют разрывы и прерывания изображения."
                - strong [ref=e426]:
                  - link "Ультраширокие мониторы" [ref=e428] [cursor=pointer]:
                    - /url: https://www.samsung.com/ru/monitors/ultra-wide/
                - text: . Благодаря более широкому соотношению сторон (21:9 или 32:9), ультраширокие мониторы обеспечивают больше полезного пространства экрана для многозадачной работы, игр и просмотра фильмов, создавая эффект погружения.
                - strong [ref=e429]:
                  - link "Изогнутые мониторы" [ref=e431] [cursor=pointer]:
                    - /url: https://www.samsung.com/ru/monitors/curved/
                - text: . Изогнутые мониторы обеспечивают естественный эффект просмотра изображения, снижают нагрузку на глаза и обеспечивают эффект погружения в происходящее на экране. Такие мониторы идеальны для игр, просмотра фильмов и выполнения рабочих задач, поскольку изгиб экрана полностью соответствует полю зрения глаз человека.
                - strong [ref=e432]:
                  - link "Мониторы с высоким разрешением" [ref=e434] [cursor=pointer]:
                    - /url: https://www.samsung.com/ru/monitors/all-monitors/?viewfinity
                - text: . Мониторы с разрешением 4K и 5K UHD обеспечивают четкое детализированное изображение, особенно важное для графического дизайна, видеомонтажа и обработки фотографий.
                - strong [ref=e435]:
                  - link "Smart дисплей" [ref=e437] [cursor=pointer]:
                    - /url: https://www.samsung.com/ru/monitors/smart/
                - text: . Предлагает расширенные функции, например подключение к Интернету, встроенную поддержку стриминговых сервисов, поддержку голосового управления и интеграцию с Интернетом вещей для удобства использования и повышенной производительности**.
              - text: "*Время отклика зависит от модели и способа измерения."
              - text: "**Для доступа ко всем функциям Smart-хаба необходима учетная запись Samsung."
