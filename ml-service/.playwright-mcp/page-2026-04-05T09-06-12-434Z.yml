                        - paragraph [ref=e409]: Вообще, общемировая практика показывает, что есть две основные системы бизнеса — рабочая лошадка, которая планируется надолго, которая может со временем переформатироваться под новые моменты, но общая база у неё остаётся, и вообще владельцы её ещё планируют внукам завещать. А возможно, они и сами те внуки, которым компанию зазавещали.
