                    - generic [ref=e1595]:
                      - paragraph [ref=e1596]: Случайно наткнулся в интернете на информацию о OMAD-диете (One Meal A Day — «один прием пищи в день»). Оказывается, популярная штука, особенно среди голливудских звёзд, т.к. сильно упрощает контроль за приёмами пищи, калориями и т.д. при высоконагруженном графике работы.
                      - paragraph [ref=e1597]: Кроме, собственно, снижения веса у OMAD есть положительные эффекты, связанные со здоровьем - снижение сахара, улучшение метаболизма. Связывают с явлением аутофагии, которая подключается из-за 23-часового интервала голодания. И вообще, само появление OMAD связывают с открытием и популяризацией аутофагии - Нобелевскую премию её открывателю выдали в 2016 году.
                      - paragraph [ref=e1598]: Почему пишу об этом… Я ж тоже раз в день питаюсь, как прям в OMAD-диете :) Начал, правда, сильно раньше 2016 года, когда не было информации ни про OMAD, ни про аутофагию.
                      - paragraph [ref=e1599]: Саму эту идею я узнал из двух старых книг. Одна была Галины Шаталовой, советского врача (вот только не помню, какую именно книгу читал). Вторая - Арнольда Эрета, который писал вообще в начале 20 века (название книги, увы, тоже не помню).
                      - paragraph [ref=e1600]: Что ж теперь получается? Во-первых, я (и вы) получил независимое подтверждение, верификацию действенности такого метода снижения и контроля веса. Ссылаться на OMAD - проще и авторитетнее, чем на себя несчастного. Во-вторых, могу служить объектом-доказательством, а то и объектом исследований как действенности OMAD, так и долговременного её влияния на здоровье (всё-таки опыт более 10 лет).
                      - paragraph [ref=e1601]: Такие вот дела.
