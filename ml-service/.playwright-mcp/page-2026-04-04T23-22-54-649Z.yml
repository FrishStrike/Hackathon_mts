          - figure "Тостер для хот-догов" [ref=e397]:
            - link [ref=e398] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Hot_Dog_Toaster.jpg?uselang=ru
              - img [ref=e399]
            - generic [ref=e400]: Тостер для хот-догов
          - paragraph [ref=e401]:
            - text: Множество разработок вносило современные технологии в конструкцию тостера. В 1990 Саймон Хаскетт (Simon Hackett) и Джон Ромки (John Romkey) создали The Internet Toaster — тостер, которым можно управлять через
            - link "интернет" [ref=e402] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%BD%D1%82%D0%B5%D1%80%D0%BD%D0%B5%D1%82
            - text: .
            - superscript [ref=e403]:
              - link "[16]" [ref=e404] [cursor=pointer]:
                - /url: "#cite_note-tIn-16"
            - text: В 2001 Робин Саутгейт (Robin Southgate) из университета Брунеля в Англии создал тостер, который мог зажаркой создавать рисунок на тосте, предсказывающий погоду (ограниченный солнечной и облачной погодой)
            - superscript [ref=e405]:
              - link "[17]" [ref=e406] [cursor=pointer]:
                - /url: "#cite_note-17"
            - text: Тостер звонил по заранее заданному номеру для получения прогноза погоды.
            - superscript [ref=e407]:
              - link "[18]" [ref=e408] [cursor=pointer]:
                - /url: "#cite_note-18"
          - paragraph [ref=e409]:
            - text: В 2005 Technologic Systems, вендор встраиваемых систем, создали тостер, работающий под операционной системой
            - link "NetBSD" [ref=e410] [cursor=pointer]:
              - /url: /wiki/NetBSD
            - text: ", в рекламных целях."
            - superscript [ref=e411]:
              - link "[19]" [ref=e412] [cursor=pointer]:
                - /url: "#cite_note-19"
            - text: В 2012 Башир Том (Basheer Tome), студент технологического института Джорджии, создал тостер с цветовым датчиком, зажаривающий тост до заранее заданного цвета.
            - superscript [ref=e413]:
              - link "[20]" [ref=e414] [cursor=pointer]:
                - /url: "#cite_note-20"
          - paragraph [ref=e415]:
            - text: Тостер, который использует
            - link "Twitter" [ref=e416] [cursor=pointer]:
              - /url: /wiki/Twitter
            - text: ", упоминался как ранний образец интернета вещей."
            - superscript [ref=e417]:
              - link "[21]" [ref=e418] [cursor=pointer]:
                - /url: "#cite_note-21"
            - superscript [ref=e419]:
              - link "[22]" [ref=e420] [cursor=pointer]:
                - /url: "#cite_note-22"
            - text: Тостеры использовались как рекламные объекты для онлайн-маркетинга.
            - superscript [ref=e421]:
              - link "[23]" [ref=e422] [cursor=pointer]:
                - /url: "#cite_note-23"
          - paragraph [ref=e423]:
            - text: После переделки тостовые печи могут использоваться для пайки печатных плат.
            - superscript [ref=e424]:
              - link "[24]" [ref=e425] [cursor=pointer]:
                - /url: "#cite_note-hackaday_081022-24"
            - superscript [ref=e426]:
              - link "[25]" [ref=e427] [cursor=pointer]:
                - /url: "#cite_note-circuitcellar_1785-25"
          - paragraph [ref=e428]: Тостер для хот-догов — разновидность конструкции тостера, он готовит хотдог без микроволновой печи. Он выглядит как обычный тостер, только имеет в центре отделение для жарки сосисок и пазы для булки по краям.
