            - link [ref=e326] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:General_Electric_Model_D-12_toaster,_1910s.jpg?uselang=ru
              - img [ref=e327]
            - generic [ref=e328]: Тостер General Electric Model D-12 toaster, 1910-е годы
          - paragraph [ref=e329]:
            - text: До появления электротостеров хлеб для тостов поджаривался зажатым в металлической сетке
            - superscript [ref=e330]:
              - link "[4]" [ref=e331] [cursor=pointer]:
                - /url: "#cite_note-4"
            - text: на огне или в кухонной печи. Кухонная утварь для поджаривания хлеба стала появляться в XIX веке, включая декоративные элементы из кованого железа.
            - superscript [ref=e332]:
              - link "[5]" [ref=e333] [cursor=pointer]:
                - /url: "#cite_note-5"
          - generic [ref=e334]:
            - heading "Развитие нагревающих элементов" [level=3] [ref=e335]: Развитие нагревающих элементов
            - generic [ref=e336]:
              - text: "["
              - link "править" [ref=e337] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A2%D0%BE%D1%81%D1%82%D0%B5%D1%80&veaction=edit&section=7
              - text: "|"
              - link "править код" [ref=e338] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A2%D0%BE%D1%81%D1%82%D0%B5%D1%80&action=edit&section=7
              - text: "]"
          - paragraph [ref=e339]: Основной технической проблемой был поиск материала электрического нагревателя, который бы выдерживал периодический нагрев до красно-оранжевого каления и при этом не перегорал и не становился бы слишком хрупким. Похожая проблема была решена ранее разработчиками ламп накаливания, но их работа облегчалась тем, что лампа имеет колбу, свободную от воздуха, что невозможно сделать в тостере.
          - paragraph [ref=e340]: Ранние попытки изготовления электротостеров были неудачными — стальные нагреватели перегорали, плавились и были пожароопасны. Кроме того, электричество было не так распространено и его подача не отличалась стабильностью.
          - paragraph [ref=e341]:
            - text: Проблему с нагревательными элементами решил молодой инженер Альберт Марш (Albert Marsh), который изобрел сплав никеля и хрома —
            - link "нихром" [ref=e342] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B8%D1%85%D1%80%D0%BE%D0%BC
            - text: ", пригодный для изготовления долговечных нагревателей."
            - superscript [ref=e343]:
              - link "[6]" [ref=e344] [cursor=pointer]:
                - /url: "#cite_note-US_Patent_811859-6"
            - superscript [ref=e345]:
              - link "[7]" [ref=e346] [cursor=pointer]:
                - /url: "#cite_note-Toaster_Museum-7"
            - superscript [ref=e347]:
              - link "[8]" [ref=e348] [cursor=pointer]:
                - /url: "#cite_note-George_2003-8"
            - superscript [ref=e349]:
              - link "[9]" [ref=e350] [cursor=pointer]:
                - /url: "#cite_note-Clark-9"
          - paragraph [ref=e351]:
            - text: Первый патент США на электротостер был получен Джорджем Шнайдером (George Schneider) из American Electrical Heater Company of Detroit в сотрудничестве с Маршем.
            - superscript [ref=e352]:
              - link "[7]" [ref=e353] [cursor=pointer]:
                - /url: "#cite_note-Toaster_Museum-7"
            - text: Одно из первых применений компании Hoskins для хромеля было изготовление тостеров, но позже было заброшено для концентраций усилий по производству самого провода.
            - superscript [ref=e354]:
              - link "[8]" [ref=e355] [cursor=pointer]:
                - /url: "#cite_note-George_2003-8"
          - paragraph [ref=e356]:
            - text: Первая коммерчески успешная модель электротостера была представлена компанией
            - link "General Electric" [ref=e357] [cursor=pointer]:
              - /url: /wiki/General_Electric
            - text: в 1909 году как GE model D-12.
            - superscript [ref=e358]:
              - link "[7]" [ref=e359] [cursor=pointer]:
                - /url: "#cite_note-Toaster_Museum-7"
            - superscript [ref=e360]:
              - link "[10]" [ref=e361] [cursor=pointer]:
                - /url: "#cite_note-10"
