          - paragraph [ref=e232]:
            - text: То́стер (
            - link "англ." [ref=e233] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: toaster) — устройство с питанием от электросети, предназначенное для быстрого поджаривания плоских кусков
            - link "хлеба" [ref=e234] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%BB%D0%B5%D0%B1
            - text: (
            - link "тостов" [ref=e235] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%BE%D1%81%D1%82%D0%BE%D0%B2%D1%8B%D0%B9_%D1%85%D0%BB%D0%B5%D0%B1
            - text: ).
          - generic [ref=e236]:
            - heading "Устройство" [level=2] [ref=e237]: Устройство
            - generic [ref=e238]:
              - text: "["
              - link "править" [ref=e239] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A2%D0%BE%D1%81%D1%82%D0%B5%D1%80&veaction=edit&section=1
              - text: "|"
              - link "править код" [ref=e240] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A2%D0%BE%D1%81%D1%82%D0%B5%D1%80&action=edit&section=1
              - text: "]"
          - paragraph [ref=e241]:
            - text: В зависимости от определённой модели, тостер может быть рассчитан на поджаривание 2 или 4 кусочков хлеба (так называемых «то́стов»). У всех тостеров имеются нагревательные элементы и регулируемый
            - link "термостат" [ref=e242] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B5%D1%80%D0%BC%D0%BE%D1%81%D1%82%D0%B0%D1%82
            - text: ", с помощью которого есть возможность выбрать необходимый режим для приготовления более или менее поджаренных тостов и скорость приготовления. Термостат рассчитан на 6-11 позиций регулировки"
            - link "температуры" [ref=e243] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B5%D0%BC%D0%BF%D0%B5%D1%80%D0%B0%D1%82%D1%83%D1%80%D0%B0
            - text: . В некоторые тостеры ставят плавную регулировку температуры. Современный тостер имеет электронное управление, которое производит контроль времени поджаривания ломтей хлеба в зависимости от выбранной пользователем температуры.
          - figure "Тосты" [ref=e244]:
            - link [ref=e245] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Toast-3.jpg?uselang=ru
              - img [ref=e246]
            - generic [ref=e247]: Тосты
          - generic [ref=e248]:
            - heading "Характеристика" [level=2] [ref=e249]: Характеристика
            - generic [ref=e250]:
              - text: "["
              - link "править" [ref=e251] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A2%D0%BE%D1%81%D1%82%D0%B5%D1%80&veaction=edit&section=2
              - text: "|"
              - link "править код" [ref=e252] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A2%D0%BE%D1%81%D1%82%D0%B5%D1%80&action=edit&section=2
              - text: "]"
          - list [ref=e253]:
            - listitem [ref=e254]:
              - link "Мощность" [ref=e255] [cursor=pointer]:
                - /url: /wiki/%D0%9C%D0%BE%D1%89%D0%BD%D0%BE%D1%81%D1%82%D1%8C
              - text: ", Вт — количество потребляемой энергии."
            - listitem [ref=e256]: Количество отделений — у тостеров может быть 1, 2 или 4 отделения для тостов.
            - listitem [ref=e257]: Количество тостов — наибольшее количество ломтей хлеба, которое может вместить тостер за один раз.
            - listitem [ref=e258]: Электронное управление — в зависимости от необходимой температуры электроника определяет время и степень обжаривания ломтей хлеба. По окончании этого времени тостер автоматически выключается и подаётся предупреждающий сигнал.
            - listitem [ref=e259]: Регулируемый термостат — позволяет выбирать и поддерживать тот температурный режим, который является необходимым для приготовления более или менее поджаренных тостов.
          - generic [ref=e260]:
            - heading "Тостеры с верхней загрузкой" [level=3] [ref=e261]: Тостеры с верхней загрузкой
            - generic [ref=e262]:
              - text: "["
              - link "править" [ref=e263] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A2%D0%BE%D1%81%D1%82%D0%B5%D1%80&veaction=edit&section=3
              - text: "|"
              - link "править код" [ref=e264] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A2%D0%BE%D1%81%D1%82%D0%B5%D1%80&action=edit&section=3
              - text: "]"
          - figure "Классический хромированный электротостер с двумя отсеками загрузки" [ref=e265]:
            - link [ref=e266] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Toaster.jpg?uselang=ru
              - img [ref=e267]
            - generic [ref=e268]: Классический хромированный электротостер с двумя отсеками загрузки
          - figure "Свечение нагревательных элементов современного тостера с двумя отсеками загрузки." [ref=e269]:
            - link [ref=e270] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Toaster_Filaments.JPG?uselang=ru
              - img [ref=e271]
            - generic [ref=e272]: Свечение нагревательных элементов современного тостера с двумя отсеками загрузки.
          - paragraph [ref=e273]: Тостеры с верхней загрузкой и выбросом тостов (pop-up toasters) обычно имеют два отсека сверху для загрузки ломтиков хлеба. Когда в отсеки тостера загружен хлеб, рычагом сбоку тостера опускается лоток с хлебом вниз, и тостер начинает работу. Когда заданный цикл приготовления тостов закончен, тостер отключается и лоток с хлебом выталкивает тосты вверх, иногда чересчур энергично. Нагревательные элементы в таких тостерах обычно ориентированы вертикально, параллельно ломтикам хлеба.
          - paragraph [ref=e274]: В первых моделях тостеров время приготовления задавалось таймером, что приводило к неравномерной обжарке тостов — первый тост был недожаренным, так как таймер не учитывал, что тостер ещё не прогрет, когда второй тост начинал приготовление в уже теплом тостере. Начиная с 1930-х контроль времени приготовления переложили на терморегулятор, (обычно биметаллическая пластинка рядом с тостом), который контролировал степень приготовления и как только температура достигала заданную — отключал тостер.
          - paragraph [ref=e275]:
            - text: Среди тостеров с верхней загрузкой модели с двумя отсеками более востребованы, чем модели с четырьмя отсеками.
            - superscript [ref=e276]:
              - link "[1]" [ref=e277] [cursor=pointer]:
                - /url: "#cite_note-Consumer_Reports_Nov_2012-1"
            - text: Внешний вид таких тостеров простирается от классических округлых хромированных форм до пластиковых тостеров необычных форм.
            - superscript [ref=e278]:
              - link "[1]" [ref=e279] [cursor=pointer]:
                - /url: "#cite_note-Consumer_Reports_Nov_2012-1"
            - text: Реклама и цена тостера не является показателем или гарантией качества приготовления тостов.
            - superscript [ref=e280]:
              - link "[1]" [ref=e281] [cursor=pointer]:
                - /url: "#cite_note-Consumer_Reports_Nov_2012-1"
            - text: Типичный современный тостер с верхней загрузкой на два отсека имеет мощность от 600 до 1200 Ватт.
            - superscript [ref=e282]:
              - link "[2]" [ref=e283] [cursor=pointer]:
                - /url: "#cite_note-2"
          - paragraph [ref=e284]:
            - text: В 2012 в США типовая цена среднего тостера была 15 $.
            - superscript [ref=e285]:
              - link "[1]" [ref=e286] [cursor=pointer]:
                - /url: "#cite_note-Consumer_Reports_Nov_2012-1"
          - generic [ref=e287]:
            - heading "Тостерные печи" [level=3] [ref=e288]: Тостерные печи
            - generic [ref=e289]:
