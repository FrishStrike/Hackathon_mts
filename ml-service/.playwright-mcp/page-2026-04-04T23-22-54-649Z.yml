          - 'figure "Патент США #1,394,450. «Хлебный тостер», 18 октября 1921 получен Charles Strite" [ref=e367]':
            - link [ref=e368] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:United_States_patent_1,394,450,_%22Bread-Toaster%22,_1921.pdf?uselang=ru
              - img [ref=e369]
            - generic [ref=e370]: "Патент США #1,394,450. «Хлебный тостер», 18 октября 1921 получен Charles Strite"
          - paragraph [ref=e371]:
            - text: В 1913 Ллойд Гроф Копеман (Lloyd Groff Copeman) и его жена Хазель Бергер Копеман (Hazel Berger Copeman) подали множество заявок на патент конструкции тостеров, и в этот же год Copeman Electric Stove Company представила тостер с простым разворотом хлеба.
            - superscript [ref=e372]:
              - link "[11]" [ref=e373] [cursor=pointer]:
                - /url: "#cite_note-lloydcopeman-11"
            - text: Компания производила «тостер, который переворачивает хлеб». До этого тостер зажаривал хлеб только с одной стороны и требовалось перевернуть его руками, в то время как тостер компании Copeman позволял перевернуть хлеб, не касаясь его.
            - superscript [ref=e374]:
              - link "[12]" [ref=e375] [cursor=pointer]:
                - /url: "#cite_note-12"
          - paragraph [ref=e376]:
            - text: Тостеры с автоматическим выбросом хлеба были изобретены Чарльзом Стритом (Charles Strite) в 1921.
            - superscript [ref=e377]:
              - link "[13]" [ref=e378] [cursor=pointer]:
                - /url: "#cite_note-13"
            - text: В 1925, используя переделанную версию тостера Стрита, Waters Genter Company представила Model 1-A-1 Toastmaster,
            - superscript [ref=e379]:
              - link "[14]" [ref=e380] [cursor=pointer]:
                - /url: "#cite_note-14"
            - text: первая модель тостера, которая могла зажарить хлеб с двух сторон одновременно управлением нагревательным элементом по таймеру и выбросом хлеба по готовности.
          - generic [ref=e381]:
            - heading "Опасности" [level=2] [ref=e382]: Опасности
            - generic [ref=e383]:
              - text: "["
              - link "править" [ref=e384] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%A2%D0%BE%D1%81%D1%82%D0%B5%D1%80&veaction=edit&section=9
              - text: "|"
              - link "править код" [ref=e385] [cursor=pointer]:
