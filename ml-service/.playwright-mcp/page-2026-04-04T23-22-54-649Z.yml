              - text: "]"
          - paragraph [ref=e386]:
            - text: Тостеры служат причиной 800 смертей ежегодно от поражения электрическим током или пожара.
            - superscript [ref=e387]:
              - link "[15]" [ref=e388] [cursor=pointer]:
                - /url: "#cite_note-15"
          - paragraph [ref=e389]:
            - text: Иногда люди пытаюся достать тост
            - link "вилкой" [ref=e390] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%B8%D0%BB%D0%BA%D0%B0_(%D1%81%D1%82%D0%BE%D0%BB%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BF%D1%80%D0%B8%D0%B1%D0%BE%D1%80)
            - text: "не думая о том, что тостер питается электричеством. Результат:"
            - link "поражение электрическим током" [ref=e391] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D1%80%D0%B0%D0%B6%D0%B5%D0%BD%D0%B8%D0%B5_%D1%8D%D0%BB%D0%B5%D0%BA%D1%82%D1%80%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%BC_%D1%82%D0%BE%D0%BA%D0%BE%D0%BC
            - text: .
