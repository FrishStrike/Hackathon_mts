              - text: "]"
          - figure "Тостерная печь (Япония)" [ref=e292]:
            - link [ref=e293] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Zojirushi_toaster_oven_ET-TB15_2.jpg?uselang=ru
              - img [ref=e294]
            - generic [ref=e295]: Тостерная печь (Япония)
          - paragraph [ref=e296]:
            - text: Тостерная печь — это небольшая электропечь с дверцей, вынимаемым поддоном для укладки тостов. Тосты укладываются в держатель горизонтально. Когда приготовление тостов завершено, печь отключается. Дверца, как правило, должна быть открыта вручную. Тостерные печи крупнее тостеров с верхней загрузкой, но могут выполнять все те же функции, что и обычные электропечи, с поправкой на небольшой размер. Тостерные печи позволяют приготовить тосты с начинкой на тосте, например с сыром или чесноком. Так как нагревательный элемент в печи расположен дальше от тоста, это увеличивает время приготовления (4-6 минут против 2-3 у тостеров с верхней загрузкой) и подсушивает хлеб сильнее.
            - superscript [ref=e297]:
              - link "[1]" [ref=e298] [cursor=pointer]:
                - /url: "#cite_note-Consumer_Reports_Nov_2012-1"
            - text: Так как тост лежит на решетке, она оставляет непрожареный след с одной из сторон.
            - superscript [ref=e299]:
              - link "[1]" [ref=e300] [cursor=pointer]:
                - /url: "#cite_note-Consumer_Reports_Nov_2012-1"
            - text: Результаты потребительского тестирования не показали, что качество приготовленных тостов в конвекционных тостерных печах выше, чем в обычных тостерных печах.
            - superscript [ref=e301]:
              - link "[1]" [ref=e302] [cursor=pointer]:
                - /url: "#cite_note-Consumer_Reports_Nov_2012-1"
          - paragraph [ref=e303]: В 2017 в США типичная цена тостерной печи была 30-240 $.
