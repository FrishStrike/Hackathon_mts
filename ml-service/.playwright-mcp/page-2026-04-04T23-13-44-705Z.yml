              - text: "]"
          - list [ref=e1067]:
            - listitem [ref=e1068]:
              - text: Первая попытка спуститься с вершины посредством
              - link "горных лыж" [ref=e1069] [cursor=pointer]:
                - /url: /wiki/%D0%93%D0%BE%D1%80%D0%BD%D1%8B%D0%B5_%D0%BB%D1%8B%D0%B6%D0%B8
              - text: была предпринята в 1969 году японцем Миура. Она закончилась не так, как он планировал; Миура чуть не свалился в пропасть, но чудом сумел спастись и остался жив.
            - listitem [ref=e1070]: В 1992 году по склону Эвереста на лыжах спустился французский лыжник Пьер Тардевель. Он съехал с южной вершины, расположенной на высоте 8571 м, и преодолел 3 км за 3 часа. Через 4 года итальянский лыжник Ханс Каммерландер спустился с высоты 6400 м по северному склону. Он был у подножия через 17 часов.
            - listitem [ref=e1071]: В 1998 году француз Кирил Десремо совершил первый спуск с вершины на сноуборде.
            - listitem [ref=e1072]:
              - text: В 2000 году словенец Даво Карничар съехал с Джомолунгмы на горных лыжах
              - superscript [ref=e1073]:
