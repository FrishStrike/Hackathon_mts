              - text: первой из женщин покорила Джомолунгму
          - paragraph [ref=e765]:
            - text: Весной 1975 года Эверест впервые штурмует женская экспедиция. Первой женщиной, покорившей Джомолунгму, стала японская альпинистка
            - link "Дзюнко Табэи" [ref=e766] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B0%D0%B1%D1%8D%D0%B8,_%D0%94%D0%B7%D1%8E%D0%BD%D0%BA%D0%BE
            - text: (16 мая 1975 года). Первой
            - link "европейкой" [ref=e767] [cursor=pointer]:
              - /url: /wiki/%D0%95%D0%B2%D1%80%D0%BE%D0%BF%D0%B0
            - text: ", поднявшейся на вершину, стала полька"
            - link "Ванда Руткевич" [ref=e768] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D1%83%D1%82%D0%BA%D0%B5%D0%B2%D0%B8%D1%87,_%D0%92%D0%B0%D0%BD%D0%B4%D0%B0
            - text: (1978). Первой советской альпинисткой, достигшей вершины, стала
            - link "Екатерина Иванова" [ref=e769] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%B2%D0%B0%D0%BD%D0%BE%D0%B2%D0%B0,_%D0%95%D0%BA%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%BD%D0%B0_%D0%9D%D0%B8%D0%BA%D0%BE%D0%BB%D0%B0%D0%B5%D0%B2%D0%BD%D0%B0
            - text: (1990).
          - paragraph [ref=e770]:
            - text: 24 сентября 1975 года
            - link "британская экспедиция" [ref=e771] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%80%D0%B8%D1%82%D0%B0%D0%BD%D1%81%D0%BA%D0%B0%D1%8F_%D1%8D%D0%BA%D1%81%D0%BF%D0%B5%D0%B4%D0%B8%D1%86%D0%B8%D1%8F_%D0%BD%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%83_(1975)
