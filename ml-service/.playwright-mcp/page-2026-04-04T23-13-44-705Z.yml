              - text: "|"
              - link "править код" [ref=e1206] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=20
              - text: "]"
          - paragraph [ref=e1207]:
            - text: С 2007 года китайская компания
            - generic [ref=e1208]:
              - text: «
              - link "China Mobile" [ref=e1209] [cursor=pointer]:
                - /url: /wiki/China_Mobile
              - text: »
            - text: предоставляет
            - link "спутниковую связь" [ref=e1210] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BF%D1%83%D1%82%D0%BD%D0%B8%D0%BA%D0%BE%D0%B2%D0%B0%D1%8F_%D1%81%D0%B2%D1%8F%D0%B7%D1%8C
            - text: ", но она пока неустойчивая и не позволяет проводить"
            - link "видеоконференции" [ref=e1211] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%B8%D0%B4%D0%B5%D0%BE%D0%BA%D0%BE%D0%BD%D1%84%D0%B5%D1%80%D0%B5%D0%BD%D1%86%D0%B8%D1%8F
            - text: .
          - paragraph [ref=e1212]:
            - text: 29 октября 2010 года оператор мобильной связи «Ncell» (
            - generic [ref=e1213]:
              - text: «
              - link "TeliaSonera" [ref=e1214] [cursor=pointer]:
                - /url: /wiki/Telia_Company
              - text: Group»
            - text: ) установил в
            - link "Непале" [ref=e1215] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB
            - text: антенны на высоте 5164 м. На Эвересте появился высокоскоростной
            - link "Интернет" [ref=e1216] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%BD%D1%82%D0%B5%D1%80%D0%BD%D0%B5%D1%82
            - text: ", охватывающий вершину горы. При помощи Интернета информацию в глобальную сеть передаёт"
            - link "веб-камера Джомолунгмы" [ref=e1217] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%B5%D0%B1-%D0%BA%D0%B0%D0%BC%D0%B5%D1%80%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%8B
            - text: ", установленная в 2011 году итальянскими учёными и являющаяся (на 2014 год) самой высокой веб-камерой в мире"
            - superscript [ref=e1218]:
              - link "[81]" [ref=e1219] [cursor=pointer]:
                - /url: "#cite_note-81"
            - text: .
          - generic [ref=e1220]:
            - heading "Экологическая ситуация" [level=2] [ref=e1221]: Экологическая ситуация
            - generic [ref=e1222]:
              - text: "["
              - link "править" [ref=e1223] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=21
              - text: "|"
              - link "править код" [ref=e1224] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=21
              - text: "]"
          - paragraph [ref=e1225]:
            - text: Согласно наблюдениям, за последние 90 лет отмечается быстрое таяние ледников как в районе Эвереста, так и в целом в Гималаях
            - superscript [ref=e1226]:
              - link "[82]" [ref=e1227] [cursor=pointer]:
                - /url: "#cite_note-82"
            - text: .
          - figure "Джомолунгма, вид из лагеря на высоте 6200 м над уровнем моря. Ветер сдувает снег с горы. Фото 1921 года" [ref=e1228]:
            - link [ref=e1229] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Mount_Everest_from_the_20,000_foot_camp.jpg?uselang=ru
              - img [ref=e1230]
            - generic [ref=e1232]: Джомолунгма, вид из лагеря на высоте 6200 м над уровнем моря. Ветер сдувает снег с горы. Фото 1921 года
          - paragraph [ref=e1233]:
            - text: Число туристов, посещавших гору со стороны Непала в 2000—2003 годах, исчислялось сотнями тысяч. Объём мусора, накопившегося на склонах горы, настолько велик, что Эверест называют «самой высокогорной свалкой в мире»
            - superscript [ref=e1234]:
              - link "[83]" [ref=e1235] [cursor=pointer]:
                - /url: "#cite_note-autogenerated2-83"
            - text: .
          - paragraph [ref=e1236]:
            - text: В 2007 году только китайский участок самой высокой вершины нашей планеты посетили 40 тысяч туристов. По подсчётам экологов, после них осталось 120 тонн мусора — в среднем, по 3 кг на каждого. Непальская авиакомпания «Yeti Airlines» собрала 17 тонн мусора в окрестностях деревни Лукла, которая является перевалочным пунктом для альпинистов, идущих к
            - link "основному лагерю на Эвересте" [ref=e1237] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B0%D0%B7%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BB%D0%B0%D0%B3%D0%B5%D1%80%D1%8C_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%8B
            - text: . Для того, чтобы убрать такое количество пивных бутылок,
            - link "пластиковых пакетов" [ref=e1238] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%BB%D0%B8%D1%8D%D1%82%D0%B8%D0%BB%D0%B5%D0%BD%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BF%D0%B0%D0%BA%D0%B5%D1%82
            - text: ","
            - link "алюминиевых банок" [ref=e1239] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B8%D0%B2%D0%BD%D0%B0%D1%8F_%D0%B1%D0%B0%D0%BD%D0%BA%D0%B0
            - text: ", кислородных баллонов, верёвок и сломанных лестниц, потребовалось около 2 месяцев"
            - superscript [ref=e1240]:
              - link "[83]" [ref=e1241] [cursor=pointer]:
                - /url: "#cite_note-autogenerated2-83"
            - text: .
          - paragraph [ref=e1242]:
            - text: В мае 2008 года силами Тибетского автономного регионального бюро по защите окружающей среды в регионе было собрано 8 тонн отходов, а в 2019 году — 11 тонн
            - superscript [ref=e1243]:
              - link "[84]" [ref=e1244] [cursor=pointer]:
                - /url: "#cite_note-84"
            - text: .
          - paragraph [ref=e1245]:
            - text: Также весьма актуален вопрос захоронения тел погибших альпинистов, особенно для местных жителей —
            - link "шерпов" [ref=e1246] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D0%BF%D1%8B
            - superscript [ref=e1247]:
              - link "[85]" [ref=e1248] [cursor=pointer]:
                - /url: "#cite_note-85"
            - text: .
          - paragraph [ref=e1249]:
            - text: С 2014 года постановлением Министерства туризма и гражданской авиации Непала было принято решение о том, что каждый альпинист, поднимающийся на Эверест, по возвращении должен вынести со склона горы не менее 8 килограммов мусора
            - superscript [ref=e1250]:
              - link "[86]" [ref=e1251] [cursor=pointer]:
                - /url: "#cite_note-86"
            - text: .
