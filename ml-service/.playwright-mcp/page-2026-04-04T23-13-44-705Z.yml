          - paragraph [ref=e756]:
            - text: 1 мая 1963 года Джим Уиттакер (
            - link "англ." [ref=e757] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Jim Whittaker) стал первым американцем, ступившим на вершину Эвереста. Три недели спустя вторая группа из той же американской экспедиции совершила первопрохождение ранее непокоренного Западного ребра Эвереста
            - superscript [ref=e758]:
              - link "[35]" [ref=e759] [cursor=pointer]:
                - /url: "#cite_note-35"
            - text: .
          - figure "Японка Дзюнко Табэи первой из женщин покорила Джомолунгму" [ref=e760]:
            - link [ref=e761] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Junko_Tabei,_Jaapani_alpinist_85.jpg?uselang=ru
              - img [ref=e762]
            - generic [ref=e763]:
              - text: Японка
              - link "Дзюнко Табэи" [ref=e764] [cursor=pointer]:
