              - text: "]"
          - figure "Вид на Джомолунгму с вершины Кала-Патхар" [ref=e562]:
            - link [ref=e563] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Everest_panorama_from_Kala_Patthar.jpg?uselang=ru
              - img [ref=e564]
            - generic [ref=e566]:
              - text: Вид на Джомолунгму с вершины
              - link "Кала-Патхар" [ref=e567] [cursor=pointer]:
                - /url: /wiki/%D0%9A%D0%B0%D0%BB%D0%B0-%D0%9F%D0%B0%D1%82%D1%85%D0%B0%D1%80
          - paragraph [ref=e568]:
            - text: Эверест является высочайшей вершиной Земли, чем привлекает к себе большое внимание
            - link "альпинистов" [ref=e569] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BB%D1%8C%D0%BF%D0%B8%D0%BD%D0%B8%D0%B7%D0%BC
            - text: ; попытки восхождений носят регулярный характер.
          - paragraph [ref=e570]:
            - text: Подъём на вершину занимает около 2 месяцев — с
            - link "акклиматизацией" [ref=e571] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BA%D0%BA%D0%BB%D0%B8%D0%BC%D0%B0%D1%82%D0%B8%D0%B7%D0%B0%D1%86%D0%B8%D1%8F
            - text: и установкой лагерей. Потеря массы за восхождение — в среднем 10—15 кг. Страны, на территории которых находятся подступы к вершине, берут плату не только за восхождение на неё, а также за ряд обязательных услуг (транспорт, офицер связи, переводчик и т. п.)
            - superscript [ref=e572]:
              - link "[23]" [ref=e573] [cursor=pointer]:
                - /url: "#cite_note-mountain.ru-23"
            - superscript [ref=e574]:
              - link "[24]" [ref=e575] [cursor=pointer]:
                - /url: "#cite_note-rian.ru-24"
            - text: . Устанавливается также очерёдность подъёма экспедиций
            - superscript [ref=e576]:
              - link "[24]" [ref=e577] [cursor=pointer]:
                - /url: "#cite_note-rian.ru-24"
            - text: . Дешевле всего взойти на Джомолунгму со стороны
            - link "Тибета" [ref=e578] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B8%D0%B1%D0%B5%D1%82
            - text: (КНР)
            - superscript [ref=e579]:
              - link "[23]" [ref=e580] [cursor=pointer]:
                - /url: "#cite_note-mountain.ru-23"
            - text: по классическому маршруту с севера
            - superscript [ref=e581]:
              - link "[25]" [ref=e582] [cursor=pointer]:
                - /url: "#cite_note-25"
            - text: .
          - figure "Вид на Эверест с борта самолёта" [ref=e583]:
            - link [ref=e584] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Mount_Everest_as_seen_from_Drukair2_PLW_edit.jpg?uselang=ru
              - img [ref=e585]
            - generic [ref=e587]: Вид на Эверест с борта самолёта
          - paragraph [ref=e588]:
            - text: Основной сезон восхождения на вершину — весна и осень, так как в это время отсутствуют
            - link "муссоны" [ref=e589] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D1%83%D1%81%D1%81%D0%BE%D0%BD
            - text: . Наиболее подходящим сезоном для восхождения по южному и северному склонам считается весна. Осенью можно подниматься только с юга.
          - paragraph [ref=e590]:
            - text: Значительная часть восхождений организуется специализированными фирмами и совершается в составе коммерческих групп. Клиенты этих фирм оплачивают услуги гидов, которые проводят необходимое обучение, предоставляют снаряжение и, насколько это возможно, обеспечивают безопасность на всём пути. Стоимость восхождения составляет до 85 тысяч
            - link "долларов США" [ref=e591] [cursor=pointer]:
              - /url: /wiki/%D0%94%D0%BE%D0%BB%D0%BB%D0%B0%D1%80_%D0%A1%D0%A8%D0%90
            - text: ", причём одно только разрешение на восхождение, выданное правительством"
            - link "Непала" [ref=e592] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB
            - text: ", стоит 10 тысяч долларов"
            - superscript [ref=e593]:
              - link "[26]" [ref=e594] [cursor=pointer]:
                - /url: "#cite_note-26"
            - superscript [ref=e595]:
              - link "[27]" [ref=e596] [cursor=pointer]:
                - /url: "#cite_note-autogenerated5-27"
            - text: .
          - paragraph [ref=e597]:
            - text: "В XXI веке, благодаря развитию туристической инфраструктуры, отмечается значительный рост ежегодных восхождений: так, если в 1983 году вершины достигли 8 человек, в 1990 году — около 40, то в 2012 году только за один день на Эверест поднялось 234 человека"
            - superscript [ref=e598]:
              - link "[28]" [ref=e599] [cursor=pointer]:
                - /url: "#cite_note-autogenerated20130614-1-28"
            - text: . При восхождении отмечены многочасовые пробки
            - superscript [ref=e600]:
              - link "[28]" [ref=e601] [cursor=pointer]:
                - /url: "#cite_note-autogenerated20130614-1-28"
            - text: и даже драки между альпинистами
            - superscript [ref=e602]:
              - link "[28]" [ref=e603] [cursor=pointer]:
                - /url: "#cite_note-autogenerated20130614-1-28"
            - superscript [ref=e604]:
              - link "[29]" [ref=e605] [cursor=pointer]:
                - /url: "#cite_note-29"
            - text: .
          - paragraph [ref=e606]:
            - text: Как считают специалисты, успех экспедиции напрямую зависит от погоды и экипировки путешественников
            - superscript [ref=e607]:
              - link "[24]" [ref=e608] [cursor=pointer]:
                - /url: "#cite_note-rian.ru-24"
            - text: . Восхождение на Джомолунгму продолжает оставаться серьёзным испытанием для каждого, вне зависимости от степени его подготовки
            - superscript [ref=e609]:
              - link "[24]" [ref=e610] [cursor=pointer]:
                - /url: "#cite_note-rian.ru-24"
            - text: . Существенную роль играет
            - link "акклиматизация" [ref=e611] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BA%D0%BA%D0%BB%D0%B8%D0%BC%D0%B0%D1%82%D0%B8%D0%B7%D0%B0%D1%86%D0%B8%D1%8F
            - text: перед восхождением на Эверест. Типичная экспедиция с южной стороны тратит до двух недель на подъём из Катманду до
            - link "базового лагеря" [ref=e612] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B0%D0%B7%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BB%D0%B0%D0%B3%D0%B5%D1%80%D1%8C_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%8B
            - text: на высоте 5364 м, и ещё около месяца уходит на акклиматизацию к высоте, прежде чем совершается первая попытка восхождения на вершину.
          - paragraph [ref=e613]:
            - text: Самый сложный участок восхождения на Эверест — последние 300 м, прозванный восходителями на гору «самой длинной милей на Земле». Для успешного прохождения этого участка требуется преодолеть крутейший гладкий каменный склон, покрытый
            - link "порошеобразным" [ref=e614] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D1%80%D0%BE%D1%88%D0%B0
            - text: снегом.
