            - text: . На вершину поднялись
            - link "Даг Скотт" [ref=e775] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BA%D0%BE%D1%82%D1%82,_%D0%94%D0%B0%D0%B3
            - text: и
            - link "Дугал Хэстон" [ref=e776] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D1%8D%D1%81%D1%82%D0%BE%D0%BD,_%D0%94%D1%83%D0%B3%D0%B0%D0%BB
            - text: . Через два дня, 26 сентября
            - link "Питер Бордман" [ref=e777] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%BE%D1%80%D0%B4%D0%BC%D0%B0%D0%BD,_%D0%9F%D0%B8%D1%82%D0%B5%D1%80
            - text: и шерп Петемба (
            - link "англ." [ref=e778] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Pertemba) повторили их путь на вершину. Следовавший за ними
            - link "Мик Берк" [ref=e779] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D1%80%D0%BA,_%D0%9C%D0%B8%D0%BA
            - text: пропал без вести
            - superscript [ref=e780]:
              - link "[37]" [ref=e781] [cursor=pointer]:
                - /url: "#cite_note-37"
            - text: .
          - paragraph [ref=e782]:
            - text: В последующие годы, снова по классическому пути первовосходителей, на Эверест поднимаются альпинисты
