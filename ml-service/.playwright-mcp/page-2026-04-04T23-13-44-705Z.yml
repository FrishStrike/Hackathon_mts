                  - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%9F%D1%80%D0%BE%D0%B2%D0%B5%D1%80%D1%8F%D0%B5%D0%BC%D0%BE%D1%81%D1%82%D1%8C
                - text: ", иначе она может быть удалена. Вы можете"
                - link "отредактировать" [ref=e1100] [cursor=pointer]:
                  - /url: https://ru.wikipedia.org/w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit
                - text: статью, добавив ссылки на
                - link "авторитетные источники" [ref=e1101] [cursor=pointer]:
                  - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%90%D0%B2%D1%82%D0%BE%D1%80%D0%B8%D1%82%D0%B5%D1%82%D0%BD%D1%8B%D0%B5_%D0%B8%D1%81%D1%82%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
                - text: в виде
                - link "сносок" [ref=e1102] [cursor=pointer]:
                  - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%A1%D0%BD%D0%BE%D1%81%D0%BA%D0%B8
                - text: .
              - generic [ref=e1104]: (2 июня 2025)
          - generic [ref=e1110]:
            - generic [ref=e1111]:
              - text: Возможно, эта статья содержит
              - link "оригинальное исследование" [ref=e1113] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%9D%D0%B5%D0%B4%D0%BE%D0%BF%D1%83%D1%81%D1%82%D0%B8%D0%BC%D0%BE%D1%81%D1%82%D1%8C_%D0%BE%D1%80%D0%B8%D0%B3%D0%B8%D0%BD%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D1%85_%D0%B8%D1%81%D1%81%D0%BB%D0%B5%D0%B4%D0%BE%D0%B2%D0%B0%D0%BD%D0%B8%D0%B9
              - text: .
            - generic [ref=e1114]:
              - generic [ref=e1115]:
                - text: Проверьте соответствие информации приведённым источникам и удалите или исправьте информацию, являющуюся оригинальным исследованием. В случае необходимости подтвердите информацию авторитетными
                - link "источниками" [ref=e1116] [cursor=pointer]:
                  - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%A1%D1%81%D1%8B%D0%BB%D0%BA%D0%B8_%D0%BD%D0%B0_%D0%B8%D1%81%D1%82%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
                - text: . В противном случае статья может быть выставлена на удаление.
              - generic [ref=e1118]: (2 июня 2025)
          - paragraph [ref=e1119]:
            - text: До начала 1990-х годов в экспедиции на гималайские восьмитысячники ходили опытные альпинисты. Они сами оплачивали связанные с восхождением высокие расходы, находя спонсоров или получая государственное финансирование. Некоторые альпинисты, как американец
            - link "Скотт Фишер" [ref=e1120] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B8%D1%88%D0%B5%D1%80,_%D0%A1%D0%BA%D0%BE%D1%82%D1%82
            - text: в 1980-е годы, для покрытия своих расходов стали одновременно организовывать платные туристические походы до базовых лагерей. Поднявшиеся в 1990 году на Эверест
            - link "Роб Холл" [ref=e1121] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%BE%D0%BB%D0%BB,_%D0%A0%D0%BE%D0%B1
            - text: и
            - link "Гэри Болл" [ref=e1122] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%91%D0%BE%D0%BB%D0%BB,_%D0%93%D1%8D%D1%80%D0%B8&action=edit&redlink=1
            - text: пошли ещё дальше, предложив клиентам своей туристической компании подъём уже собственно на Эверест. В 1991 году в Южный базовый лагерь Эвереста прибыло 20 экспедиций, в 1992 — 24, в 1993 — 19. Чтобы минимизировать риски при таком количестве команд на горе, в начале 1994 года
            - link "министерство туризма Непала" [ref=e1123] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%9C%D0%B8%D0%BD%D0%B8%D1%81%D1%82%D0%B5%D1%80%D1%81%D1%82%D0%B2%D0%BE_%D1%82%D1%83%D1%80%D0%B8%D0%B7%D0%BC%D0%B0_%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB%D0%B0&action=edit&redlink=1
            - text: "объявило новую стратегию: «Один маршрут — одна экспедиция», при этом, чтобы не потерять доход в казну, цена"
            - link "разрешения" [ref=e1124] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%9F%D0%B5%D1%80%D0%BC%D0%B8%D1%82_(%D0%B0%D0%BB%D1%8C%D0%BF%D0%B8%D0%BD%D0%B8%D0%B7%D0%BC)&action=edit&redlink=1
            - text: поднялась с 10 тысяч долларов за всю экспедицию до 10 тысяч долларов за каждого участника. Таким образом, альпинисты, вместо того, чтобы собирать профессиональных участников, отныне были вынуждены привлекать в команду платных клиентов — врачей, адвокатов, бизнесменов, которые благодаря своим высоким доходам в совокупности могли покрыть общую стоимость экспедиции. Постепенно, уже к концу 1990-х кардинально изменились функции
            - link "носильщиков-шерпов" [ref=e1125] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D0%BF%D0%B0_(%D0%B0%D0%BB%D1%8C%D0%BF%D0%B8%D0%BD%D0%B8%D0%B7%D0%BC)
            - text: ": если раньше они только поднимали грузы и помогали устанавливать базовый лагерь, теперь они начали прокладывать тропу, провешивать перила и верёвки, ставить палатки в верхних лагерях, следить за состоянием маршрута; появилась специализированная команда шерпов"
            - link "Icefall Doctors" [ref=e1127] [cursor=pointer]:
              - /url: /w/index.php?title=Icefall_Doctors&action=edit&redlink=1
            - text: ", которая занимается исключительно прокладыванием и поддерживанием пути через"
            - link "ледопад" [ref=e1128] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B5%D0%B4%D0%BE%D0%BF%D0%B0%D0%B4_%D0%9A%D1%85%D1%83%D0%BC%D0%B1%D1%83
            - text: . Перенимая навыки профессиональных альпинистов и горных спасателей, шерпы стали максимально облегчать путь клиентов. Одновременно сильно улучшилась, став более лёгкой, надёжной и качественной, экипировка (появились стельки с подогревом и т. п.). Если в 1990-х годах для получения акклиматизации восходителям приходилось многократно ходить туда-сюда через опасный
            - link "Кхумбу" [ref=e1129] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D1%85%D1%83%D0%BC%D0%B1%D1%83_(%D0%BB%D0%B5%D0%B4%D0%BD%D0%B8%D0%BA)
            - text: ", в XXI веке, с развитием вертолётного транспорта, появилась возможность акклиматизироваться на других, менее сложных и опасных вершинах; кроме того, клиенты стали пользоваться возможностью перелетать через Кхумбу на вертолёте. Также вошла в обиход предварительная подготовка в барокамерах; в самом Непале появились отели, предлагающие номера с барокамерами. Развитие метеоролигической службы, регулярное получение данных со"
            - link "спутников" [ref=e1130] [cursor=pointer]:
              - /url: /wiki/%D0%98%D1%81%D0%BA%D1%83%D1%81%D1%81%D1%82%D0%B2%D0%B5%D0%BD%D0%BD%D1%8B%D0%B9_%D1%81%D0%BF%D1%83%D1%82%D0%BD%D0%B8%D0%BA_%D0%97%D0%B5%D0%BC%D0%BB%D0%B8
            - text: и их быстрый анализ позволили точно предсказывать погодные «окна» и приближение непогоды, делая восхождения более безопасными. Коммерческие компании, конкурируя между собой, стали улучшать быт и уровень комфорта в лагерях, включая туалет и душ в
            - link "базовом лагере" [ref=e1131] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B0%D0%B7%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BB%D0%B0%D0%B3%D0%B5%D1%80%D1%8C_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%8B
            - text: ", немыслимые ранее"
            - superscript [ref=e1132]:
              - text: "["
              - link "источник?" [ref=e1134] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%A1%D1%81%D1%8B%D0%BB%D0%BA%D0%B8_%D0%BD%D0%B0_%D0%B8%D1%81%D1%82%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
              - text: "]"
            - text: .
          - paragraph [ref=e1135]:
            - text: Очень быстро Эверест из горы для самых сильных альпинистов превратился в гору, на которую, при наличии средств, может подняться каждый. Следующее повышение стоимости сбора принесло ещё больше доходов, но количество желающих взойти на Эверест не убавилось. Популярность горы привела к таким явлениям, как пробки на всех участках маршрута, когда люди вынуждены подолгу стоять у перил и ждать своей очереди на проход
            - superscript [ref=e1136]:
              - text: "["
              - link "источник?" [ref=e1138] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%A1%D1%81%D1%8B%D0%BB%D0%BA%D0%B8_%D0%BD%D0%B0_%D0%B8%D1%81%D1%82%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
              - text: "]"
            - text: .
          - paragraph [ref=e1139]:
            - text: С ростом уровня коммерции участились конфликты между шерпами и профессиональными альпинистами, желающими подняться своими силами (в альпийском стиле, без использования кислорода), так как альпинисты-одиночки не приносят шерпам доход и при этом потенциально могут пользоваться результатом их труда. Так,
            - link "Райнхольд Месснер" [ref=e1140] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B5%D1%81%D1%81%D0%BD%D0%B5%D1%80,_%D0%A0%D0%B0%D0%B9%D0%BD%D1%85%D0%BE%D0%BB%D1%8C%D0%B4
            - text: упоминает случай, когда шерпы напали на альпиниста
            - link "Ули Штека" [ref=e1141] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D1%82%D0%B5%D0%BA,_%D0%A3%D0%BB%D0%B8
            - text: и избили его
            - superscript [ref=e1142]:
              - link "[75]" [ref=e1143] [cursor=pointer]:
                - /url: "#cite_note-Месснер-75"
            - text: .
          - paragraph [ref=e1144]:
            - text: На ноябрь 2025 года количество граждан России, поднявшихся на Эверест перевалило за 700; большинство из них — клиенты коммерческих экспедиций
            - superscript [ref=e1145]:
              - text: "["
              - link "источник?" [ref=e1147] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%A1%D1%81%D1%8B%D0%BB%D0%BA%D0%B8_%D0%BD%D0%B0_%D0%B8%D1%81%D1%82%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
              - text: "]"
            - text: .
          - generic [ref=e1148]:
            - heading "Новые правила" [level=3] [ref=e1149]: Новые правила
            - generic [ref=e1150]:
              - text: "["
              - link "править" [ref=e1151] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=18
              - text: "|"
              - link "править код" [ref=e1152] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=18
              - text: "]"
          - paragraph [ref=e1153]:
            - text: В 2025 году власти Непала существенно ужесточили правила восхождений на восьмитысячники, включая Эверест. Стоимость пермитов была увеличена, перелёты из базовых лагерей к верхним лагерям на вертолёте запрещены — отныне разрешены лишь эвакуационные полёты. Каждый желающий взойти на Эверест обязан приложить к пакету документов сертификат о подъёме на другой восьмитысячник. Кроме того, каждый восходитель или клиент, невзирая на уровень подготовки, обязан иметь собственного
            - link "шерпа" [ref=e1154] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D0%BF%D0%B0_(%D0%B0%D0%BB%D1%8C%D0%BF%D0%B8%D0%BD%D0%B8%D0%B7%D0%BC)
            - text: ; Власти обещали ужесточить контроль над корректным использованием пермитов, чтобы исключить случаи использования пермита на другой горе или в другой промежуток времени; восхождения, при которых восходители не вышли на радиосвязь на контрольных точках, не будет засчитываться
            - superscript [ref=e1155]:
              - text: "["
              - link "источник?" [ref=e1157] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%A1%D1%81%D1%8B%D0%BB%D0%BA%D0%B8_%D0%BD%D0%B0_%D0%B8%D1%81%D1%82%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
              - text: "]"
            - text: .
          - paragraph [ref=e1158]:
            - text: Новые правила подвергались критике со стороны профессиональных альпинистов, так как урезает возможности для автономных восхождений и делает их дороже
            - superscript [ref=e1159]:
              - text: "["
              - link "источник?" [ref=e1161] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%A1%D1%81%D1%8B%D0%BB%D0%BA%D0%B8_%D0%BD%D0%B0_%D0%B8%D1%81%D1%82%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
              - text: "]"
            - text: .
          - generic [ref=e1162]:
            - heading "Полёты над вершиной" [level=2] [ref=e1163]: Полёты над вершиной
            - generic [ref=e1164]:
              - text: "["
              - link "править" [ref=e1165] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=19
              - text: "|"
              - link "править код" [ref=e1166] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=19
              - text: "]"
          - list [ref=e1167]:
            - listitem [ref=e1168]:
              - text: 3 апреля 1933 года два
              - link "биплана" [ref=e1169] [cursor=pointer]:
                - /url: /wiki/%D0%91%D0%B8%D0%BF%D0%BB%D0%B0%D0%BD
              - text: ", управляемые британскими пилотами"
              - link "маркизом Клайдсдейлом" [ref=e1170] [cursor=pointer]:
                - /url: /wiki/%D0%94%D1%83%D0%B3%D0%BB%D0%B0%D1%81-%D0%93%D0%B0%D0%BC%D0%B8%D0%BB%D1%8C%D1%82%D0%BE%D0%BD,_%D0%94%D1%83%D0%B3%D0%BB%D0%B0%D1%81,_14-%D0%B9_%D0%B3%D0%B5%D1%80%D1%86%D0%BE%D0%B3_%D0%93%D0%B0%D0%BC%D0%B8%D0%BB%D1%8C%D1%82%D0%BE%D0%BD
              - text: и Дэвидом Макинтайром (
              - link "англ." [ref=e1171] [cursor=pointer]:
                - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: David MacIntyre), совершили первый полёт над вершиной.
            - listitem [ref=e1172]:
              - text: В 2001 году супружеская пара из
              - link "Франции" [ref=e1173] [cursor=pointer]:
                - /url: /wiki/%D0%A4%D1%80%D0%B0%D0%BD%D1%86%D0%B8%D1%8F
              - text: ", Бертран и Клер Бернье, слетела вниз с вершины на"
              - link "параплане" [ref=e1174] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%B0%D1%80%D0%B0%D0%BF%D0%BB%D0%B0%D0%BD
              - text: ‑тандеме
              - superscript [ref=e1175]:
                - link "[46]" [ref=e1176] [cursor=pointer]:
                  - /url: "#cite_note-autogenerated3-46"
              - text: .
            - listitem [ref=e1177]:
              - text: В мае 2004 года
              - link "итальянец" [ref=e1178] [cursor=pointer]:
                - /url: /wiki/%D0%98%D1%82%D0%B0%D0%BB%D0%B8%D1%8F
              - link "Анджело Д’Арриго" [ref=e1179] [cursor=pointer]:
                - /url: /wiki/%D0%94%E2%80%99%D0%90%D1%80%D1%80%D0%B8%D0%B3%D0%BE,_%D0%90%D0%BD%D0%B4%D0%B6%D0%B5%D0%BB%D0%BE
              - text: впервые в
              - link "истории авиации" [ref=e1180] [cursor=pointer]:
                - /url: /wiki/%D0%98%D1%81%D1%82%D0%BE%D1%80%D0%B8%D1%8F_%D0%B0%D0%B2%D0%B8%D0%B0%D1%86%D0%B8%D0%B8
              - text: совершил полёт на
              - link "дельтаплане" [ref=e1181] [cursor=pointer]:
                - /url: /wiki/%D0%94%D0%B5%D0%BB%D1%8C%D1%82%D0%B0%D0%BF%D0%BB%D0%B0%D0%BD
              - text: над вершиной высочайшей горы Земли
              - superscript [ref=e1182]:
                - link "[76]" [ref=e1183] [cursor=pointer]:
                  - /url: "#cite_note-76"
              - text: .
            - listitem [ref=e1184]:
              - text: 14 мая 2005 года лётчик-испытатель фирмы «
              - link "Eurocopter" [ref=e1185] [cursor=pointer]:
                - /url: /wiki/Airbus_Helicopters
              - text: » Дидье Дельсаль (
              - link "фр." [ref=e1186] [cursor=pointer]:
                - /url: /wiki/%D0%A4%D1%80%D0%B0%D0%BD%D1%86%D1%83%D0%B7%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: Didier Delsalle) успешно посадил
              - link "вертолёт" [ref=e1187] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B5%D1%80%D1%82%D0%BE%D0%BB%D1%91%D1%82
              - link "Eurocopter AS 350 Ecureuil" [ref=e1189] [cursor=pointer]:
                - /url: /wiki/A%C3%A9rospatiale_AS.350_%C3%89cureuil
              - text: на вершину горы. Это был первый случай подобной посадки
              - superscript [ref=e1190]:
                - link "[77]" [ref=e1191] [cursor=pointer]:
                  - /url: "#cite_note-membrana4674-77"
              - text: .
            - listitem [ref=e1192]:
              - text: В 2008 году две парашютистки, Венди Смит и Холли Бадж, и парашютист Нейл Джонс приземлились на вершину, выпрыгнув с
              - link "самолёта" [ref=e1193] [cursor=pointer]:
                - /url: /wiki/%D0%A1%D0%B0%D0%BC%D0%BE%D0%BB%D1%91%D1%82
              - text: ", летящего на высоте чуть менее 9 км (на 142 м выше самой верхней точки горы)"
              - superscript [ref=e1194]:
                - link "[78]" [ref=e1195] [cursor=pointer]:
                  - /url: "#cite_note-78"
              - text: .
            - listitem [ref=e1196]:
              - text: 21 мая 2011 года непальцы Сано Бабу и Лапка Шерпа, взойдя на Эверест, стартовали на тандемном
              - link "параплане" [ref=e1197] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%B0%D1%80%D0%B0%D0%BF%D0%BB%D0%B0%D0%BD
              - text: и пролетели на высоте 30 м над вершиной, установив мировой рекорд высоты полёта на этом типе летательного аппарата
              - superscript [ref=e1198]:
                - link "[79]" [ref=e1199] [cursor=pointer]:
                  - /url: "#cite_note-79"
              - superscript [ref=e1200]:
                - link "[80]" [ref=e1201] [cursor=pointer]:
                  - /url: "#cite_note-80"
              - text: .
