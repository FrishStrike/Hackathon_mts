            - text: была выпущена в 1719 году по результатам разведки, проведённой
            - link "ламами" [ref=e325] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D0%BC%D0%B0_(%D0%B1%D1%83%D0%B4%D0%B4%D0%B8%D0%B7%D0%BC)
            - text: Curqin Zangbu и Lanben Zhainba в 1712—1717 годах по указанию
            - link "императора Китая" [ref=e326] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D0%BD%D1%81%D0%B8
            - text: . На европейской копии карты, составленной
            - link "де Анвилем" [ref=e327] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B2%D0%B8%D0%BB%D1%8C,_%D0%96%D0%B0%D0%BD_%D0%91%D0%B0%D1%82%D0%B8%D1%81%D1%82_%D0%91%D1%83%D1%80%D0%B3%D0%B8%D0%BD%D1%8C%D0%BE%D0%BD_%D0%B4%D0%B5
            - text: ", место, примерно соответствующее расположению горы, именовалось Tchoumou Lancma', при том, что оригинальная китайская"
            - link "идеограмма" [ref=e328] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%B4%D0%B5%D0%BE%D0%B3%D1%80%D0%B0%D0%BC%D0%BC%D0%B0
            - text: звучала как Jumu Langma Alin
            - superscript [ref=e329]:
              - text: "["
              - link "уточнить" [ref=e331] [cursor=pointer]:
