          - paragraph [ref=e650]:
            - text: Восхождения на Эверест с желанием достичь высшей точки горы отличается исключительной трудностью и опасностью и иногда оканчиваются гибелью как восходителей, так и сопровождающих их носильщиков-
            - link "шерпов" [ref=e651] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D0%BF%D1%8B
            - text: ". Указанная трудность обусловлена особо неблагоприятными климатическими условиями верхушечной зоны горы вследствие значительной высоты её положения. В числе возможных неблагоприятных для организма человека климатических факторов: высокая разрежённость атмосферы и, как следствие, крайне низкое содержание кислорода в ней, граничащее со смертельно низким значением; низкие температуры до −50…−60 °C, что в сочетании с временами дующими ураганными ветрами субъективно ощущается человеческим организмом как температура до −100…−120 °C, что способно привести к крайне быстро возникающей температурной травме; немалое значение имеет сильное поступление солнечной радиации на таких высотах. Указанные причины дополняются «стандартными» опасностями альпинизма, присущими и гораздо менее высоким вершинам: сходы"
            - link "лавин" [ref=e652] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D0%B2%D0%B8%D0%BD%D0%B0
            - text: ", обрыв с крутых склонов, падение в расщелины рельефа."
