              - text: "]"
          - paragraph [ref=e374]:
            - text: До конца XIX века в Индийском обозрении фигурировали также такие названия горы, как Jomokangar, Jhomogangar, Chamokankar, Deodangar, Bhirab Langur, Bharab Than, Nyanam, Chingopamari, Gualham и другие, но в отсутствие доказательств, что именно они являются местным названием Эвереста, ни одно из них не рассматривалось всерьёз географической наукой. Первым исследователем из Индийского обозрения, посетившим окрестности Эвереста с Непальской стороны, стал Натха Сингх, он же впервые услышал название Chholungbif. В декабре 1920 года сотрудник британского представительства
            - link "Чарльз Белл" [ref=e375] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D0%BB%D0%BB,_%D0%A7%D0%B0%D1%80%D0%BB%D1%8C%D0%B7_%D0%90%D0%BB%D1%8C%D1%84%D1%80%D0%B5%D0%B4
            - text: ", улаживавший вопросы организации"
            - link "первой британской экспедиции на Эверест" [ref=e376] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%80%D0%B8%D1%82%D0%B0%D0%BD%D1%81%D0%BA%D0%B0%D1%8F_%D1%80%D0%B0%D0%B7%D0%B2%D0%B5%D0%B4%D1%8B%D0%B2%D0%B0%D1%82%D0%B5%D0%BB%D1%8C%D0%BD%D0%B0%D1%8F_%D1%8D%D0%BA%D1%81%D0%BF%D0%B5%D0%B4%D0%B8%D1%86%D0%B8%D1%8F_%D0%BD%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%83_(1921)
            - text: ", помимо «добра» от"
            - link "Далай-ламы" [ref=e377] [cursor=pointer]:
              - /url: /wiki/%D0%94%D0%B0%D0%BB%D0%B0%D0%B9-%D0%BB%D0%B0%D0%BC%D0%B0_XIII
            - text: получил
            - link "пергамент" [ref=e378] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B5%D1%80%D0%B3%D0%B0%D0%BC%D0%B5%D0%BD%D1%82
            - text: ", на котором на"
            - link "тибетском языке" [ref=e379] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B8%D0%B1%D0%B5%D1%82%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: было написано предложение, часть которого звучала как «…монастыря страны птиц юга — Лхо Ча-Мо-Лунг (… Monastery is the bird country of the south, Lho Cha-Mo Lung)». Позднее в
            - link "Лхасе" [ref=e380] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D1%85%D0%B0%D1%81%D0%B0
            - text: один из секретарей Далай-ламы пояснил ему, что Cha-Mo Lung — сокращённое название Cha-Dzi-Ma-Lung-Ma, а Lho — просто обозначение юга. В
            - link "пермите, выданном официальными властями Тибета первой британской экспедиции на Эверест" [ref=e381] [cursor=pointer]:
              - /url: https://ru.wikisource.org/wiki/%D0%A2%D0%B8%D0%B1%D0%B5%D1%82%D1%81%D0%BA%D0%B8%D0%B9_%D0%BF%D0%B0%D1%81%D0%BF%D0%BE%D1%80%D1%82_%D0%91%D1%80%D0%B8%D1%82%D0%B0%D0%BD%D1%81%D0%BA%D0%BE%D0%B9_%D1%80%D0%B0%D0%B7%D0%B2%D0%B5%D0%B4%D1%8B%D0%B2%D0%B0%D1%82%D0%B5%D0%BB%D1%8C%D0%BD%D0%BE%D0%B9_%D1%8D%D0%BA%D1%81%D0%BF%D0%B5%D0%B4%D0%B8%D1%86%D0%B8%D0%B8_%D0%BD%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%83
            - text: ", также фигурировало название Chha-Mo-Lung Ma, это же название использовалось и в пермитах 1922, 1933 и 1936 годов. Современное название утвердилось в географической науке в 1960-х годах. В различных вариантах перевода с тибетского языка, по утверждению Белла, название может интерпретироваться как «Божественная Мать Земли» или «Божественная Мать Ветра». У"
            - link "шерпов" [ref=e382] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D0%BF%D1%8B
            - text: в простонародье название горы интерпретируется как «Гора, над которой не могут пролететь птицы».
            - link "Непальское название" [ref=e383] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB%D1%8C%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: — Сагарма́тха (
            - link "непальск." [ref=e384] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB%D1%8C%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: सगरमाथा)
            - superscript [ref=e385]:
              - link "[9]" [ref=e386] [cursor=pointer]:
                - /url: "#cite_note-9"
            - text: — впервые появилось также в 1960-х годах в ходе
            - link "демаркации" [ref=e387] [cursor=pointer]:
              - /url: /wiki/%D0%94%D0%B5%D0%BC%D0%B0%D1%80%D0%BA%D0%B0%D1%86%D0%B8%D1%8F
            - text: границы
            - link "Непала" [ref=e388] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB
            - text: и Китая, которая проходит по вершине
            - superscript [ref=e389]:
              - link "[10]" [ref=e390] [cursor=pointer]:
                - /url: "#cite_note-10"
            - text: .
          - paragraph [ref=e391]:
            - text: В переводе с тибетского языка Чомолангма (ཇོ་མོ་གླང་མ) означает «Божественная (ཇོ་མོ) Мать (མ) жизненной энергии (གླང)». Гора названа так в честь
            - link "бонской" [ref=e392] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%BE%D0%BD_(%D1%80%D0%B5%D0%BB%D0%B8%D0%B3%D0%B8%D1%8F)
            - text: богини Шераб Чжаммы (Sherab «мудрейшая», Cham-ma «любящая мать»), олицетворяющей материнскую энергию
            - superscript [ref=e393]:
              - link "[11]" [ref=e394] [cursor=pointer]:
                - /url: "#cite_note-11"
            - text: . Другое тибетское название вершины — Чомогангкар (ཇོ་མོ་གངས་དཀར) — «Святая Мать, белая, как снег»
            - superscript [ref=e395]:
              - link "[12]" [ref=e396] [cursor=pointer]:
                - /url: "#cite_note-12"
            - text: .
          - paragraph [ref=e397]:
            - link "Официальная китайская транскрипция" [ref=e398] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D1%80%D0%B0%D0%BD%D1%81%D0%BA%D1%80%D0%B8%D0%B1%D0%B8%D1%80%D0%BE%D0%B2%D0%B0%D0%BD%D0%B8%D0%B5_%D0%B8%D0%BD%D0%BE%D1%8F%D0%B7%D1%8B%D1%87%D0%BD%D1%8B%D1%85_%D0%B8%D0%BC%D1%91%D0%BD_%D0%B8_%D0%BD%D0%B0%D0%B7%D0%B2%D0%B0%D0%BD%D0%B8%D0%B9_%D0%B2_%D0%BA%D0%B8%D1%82%D0%B0%D0%B9%D1%81%D0%BA%D0%BE%D0%B5_%D0%BF%D0%B8%D1%81%D1%8C%D0%BC%D0%BE
            - text: и также название — Чжумуланма фэн (
            - link "кит." [ref=e399] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D1%82%D0%B0%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - link "трад." [ref=e400] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D1%82%D0%B0%D0%B9%D1%81%D0%BA%D0%BE%D0%B5_%D0%BF%D0%B8%D1%81%D1%8C%D0%BC%D0%BE#Полные_и_упрощённые_иероглифы
            - text: 珠穆朗瑪峰,
            - link "упр." [ref=e401] [cursor=pointer]:
              - /url: /wiki/%D0%A3%D0%BF%D1%80%D0%BE%D1%89%D0%B5%D0%BD%D0%B8%D0%B5_%D0%B8%D0%B5%D1%80%D0%BE%D0%B3%D0%BB%D0%B8%D1%84%D0%BE%D0%B2
            - text: 珠穆朗玛峰,
            - link "пиньинь" [ref=e402] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B8%D0%BD%D1%8C%D0%B8%D0%BD%D1%8C
            - text: Zhūmùlǎngmǎ fēng). Хотя исторически использовались и другие китайские названия, включая Шэнмуфэ́н (
            - link "кит." [ref=e403] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D1%82%D0%B0%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - link "трад." [ref=e404] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D1%82%D0%B0%D0%B9%D1%81%D0%BA%D0%BE%D0%B5_%D0%BF%D0%B8%D1%81%D1%8C%D0%BC%D0%BE#Полные_и_упрощённые_иероглифы
            - text: 聖母峰,
            - link "упр." [ref=e405] [cursor=pointer]:
              - /url: /wiki/%D0%A3%D0%BF%D1%80%D0%BE%D1%89%D0%B5%D0%BD%D0%B8%D0%B5_%D0%B8%D0%B5%D1%80%D0%BE%D0%B3%D0%BB%D0%B8%D1%84%D0%BE%D0%B2
            - text: 圣母峰,
            - link "пиньинь" [ref=e406] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B8%D0%BD%D1%8C%D0%B8%D0%BD%D1%8C
            - text: Shèngmǔ fēng «вершина святой матери»), но эти названия были постепенно отменены, когда в мае 1952 года
            - link "министерство гражданской администрации КНР" [ref=e407] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B8%D0%BD%D0%B8%D1%81%D1%82%D0%B5%D1%80%D1%81%D1%82%D0%B2%D0%BE_%D0%B3%D1%80%D0%B0%D0%B6%D0%B4%D0%B0%D0%BD%D1%81%D0%BA%D0%BE%D0%B9_%D0%B0%D0%B4%D0%BC%D0%B8%D0%BD%D0%B8%D1%81%D1%82%D1%80%D0%B0%D1%86%D0%B8%D0%B8_%D0%9A%D0%9D%D0%A0
            - text: издало указ о введении единого названия
            - superscript [ref=e408]:
              - link "[13]" [ref=e409] [cursor=pointer]:
                - /url: "#cite_note-13"
            - text: .
