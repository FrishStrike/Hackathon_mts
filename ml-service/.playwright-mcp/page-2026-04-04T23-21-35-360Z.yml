          - paragraph [ref=e438]:
            - text: Вершина находится в
            - link "Гималаях" [ref=e439] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%B8%D0%BC%D0%B0%D0%BB%D0%B0%D0%B8
            - text: в хребте
            - link "Махалангур-Химал" [ref=e440] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B0%D1%85%D0%B0%D0%BB%D0%B0%D0%BD%D0%B3%D1%83%D1%80-%D0%A5%D0%B8%D0%BC%D0%B0%D0%BB
            - text: ", по которому проходит граница"
            - link "Непала" [ref=e441] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB
            - text: и
            - link "Тибетского автономного района" [ref=e442] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B8%D0%B1%D0%B5%D1%82%D1%81%D0%BA%D0%B8%D0%B9_%D0%B0%D0%B2%D1%82%D0%BE%D0%BD%D0%BE%D0%BC%D0%BD%D1%8B%D0%B9_%D1%80%D0%B0%D0%B9%D0%BE%D0%BD
            - text: (
            - link "Китай" [ref=e443] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D1%82%D0%B0%D0%B9
            - text: ).
          - paragraph [ref=e444]:
            - text: Эверест имеет форму трёхгранной
            - link "пирамиды" [ref=e445] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B8%D1%80%D0%B0%D0%BC%D0%B8%D0%B4%D0%B0_(%D0%B3%D0%B5%D0%BE%D0%BC%D0%B5%D1%82%D1%80%D0%B8%D1%8F)
            - text: ", южный склон более крутой. На южном склоне и рёбрах"
            - link "снег" [ref=e446] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BD%D0%B5%D0%B3
            - text: и
            - link "фирн" [ref=e447] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B8%D1%80%D0%BD
            - text: не удерживаются, вследствие чего они обнажены. Высота Северо-восточного плеча — 8393 м. Высота от подножия до вершины — около 3550 м. Вершина состоит в основном из
            - link "осадочных отложений" [ref=e448] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%81%D0%B0%D0%B4%D0%BE%D1%87%D0%BD%D1%8B%D0%B5_%D0%B3%D0%BE%D1%80%D0%BD%D1%8B%D0%B5_%D0%BF%D0%BE%D1%80%D0%BE%D0%B4%D1%8B
            - text: . В ясную погоду с вершины открывается вид примерно на 370
            - link "километров" [ref=e449] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D0%BB%D0%BE%D0%BC%D0%B5%D1%82%D1%80
            - text: вокруг, охватывая территорию в 250 тысяч км². Однако её высоты недостаточно, чтобы увидеть, что
            - link "Земля круглая" [ref=e450] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%BE%D1%80%D0%BC%D0%B0_%D0%97%D0%B5%D0%BC%D0%BB%D0%B8
            - superscript [ref=e451]:
              - link "[14]" [ref=e452] [cursor=pointer]:
                - /url: "#cite_note-14"
            - text: .
          - paragraph [ref=e453]:
            - text: С юга Эверест соединяется
            - link "перевалом" [ref=e454] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B5%D1%80%D0%B5%D0%B2%D0%B0%D0%BB
            - link "Южное седло" [ref=e455] [cursor=pointer]:
              - /url: /wiki/%D0%AE%D0%B6%D0%BD%D0%BE%D0%B5_%D1%81%D0%B5%D0%B4%D0%BB%D0%BE
            - text: (7906 м) с
            - link "Лхоцзе" [ref=e456] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D1%85%D0%BE%D1%86%D0%B7%D0%B5
            - text: (8516 м), называемой иногда Южной вершиной. С севера круто спадающее остро заточенное
            - link "Северное седло" [ref=e457] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B5%D0%B2%D0%B5%D1%80%D0%BD%D0%BE%D0%B5_%D1%81%D0%B5%D0%B4%D0%BB%D0%BE
            - text: (7020 м) соединяет Эверест с Северной вершиной —
            - link "Чангзе" [ref=e458] [cursor=pointer]:
              - /url: /wiki/%D0%A7%D0%B0%D0%BD%D0%B3%D0%B7%D0%B5
            - text: (7553 м). На восток круто обрывается непроходимая восточная стена
            - link "Кангшунг" [ref=e459] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D0%BD%D0%B3%D1%88%D1%83%D0%BD%D0%B3_(%D1%81%D1%82%D0%B5%D0%BD%D0%B0)
            - text: (3350 м). С
            - link "массива" [ref=e460] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D1%80%D0%BD%D1%8B%D0%B9_%D0%BC%D0%B0%D1%81%D1%81%D0%B8%D0%B2
            - text: во все стороны стекают
            - link "ледники" [ref=e461] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B5%D0%B4%D0%BD%D0%B8%D0%BA
            - text: ", оканчивающиеся на высоте около 5000 м."
          - paragraph [ref=e462]:
            - text: Джомолунгма частично входит в состав
            - link "национального парка Сагарматха" [ref=e463] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B0%D0%B3%D0%B0%D1%80%D0%BC%D0%B0%D1%82%D1%85%D0%B0_(%D0%BD%D0%B0%D1%86%D0%B8%D0%BE%D0%BD%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D0%B9_%D0%BF%D0%B0%D1%80%D0%BA)
            - text: (
            - link "Непал" [ref=e464] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB
            - text: ).
          - paragraph [ref=e465]:
            - text: В геологическом плане гора сложена тремя различными комплексами пород. Верхние 200 метров горы у самой вершины состоят из слоев морских пород
            - link "ордовикского" [ref=e466] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%80%D0%B4%D0%BE%D0%B2%D0%B8%D0%BA
            - text: "возраста (около 450 миллионов лет): известняков и перекристаллизованных доломитов с прослоями"
            - link "алевролитов" [ref=e467] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BB%D0%B5%D0%B2%D1%80%D0%BE%D0%BB%D0%B8%D1%82
            - text: . В породах находят окаменевшие раковины
            - link "остракод" [ref=e468] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%81%D1%82%D1%80%D0%B0%D0%BA%D0%BE%D0%B4%D1%8B
            - text: и
            - link "брахиопод" [ref=e469] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%80%D0%B0%D1%85%D0%B8%D0%BE%D0%BF%D0%BE%D0%B4
            - text: ", остатки"
            - link "трилобитов" [ref=e470] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D1%80%D0%B8%D0%BB%D0%BE%D0%B1%D0%B8%D1%82
            - text: и
            - link "криноидей" [ref=e471] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D1%80%D0%B8%D0%BD%D0%BE%D0%B8%D0%B4%D0%B5%D0%B8
            - text: ", а также биопленки"
            - link "цианобактерий" [ref=e472] [cursor=pointer]:
              - /url: /wiki/%D0%A6%D0%B8%D0%B0%D0%BD%D0%BE%D0%B1%D0%B0%D0%BA%D1%82%D0%B5%D1%80%D0%B8%D0%B8
            - text: . В интервале высот от 7000 до 8600 метров, находится формация, состоящая из деформированных во время надвиговых процессов
            - link "филлитов" [ref=e473] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B8%D0%BB%D0%BB%D0%B8%D1%82%D1%8B
            - text: и
            - link "сланцев" [ref=e474] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BB%D0%B0%D0%BD%D1%86%D1%8B
            - text: с небольшой долей мраморов. Все эти породы — метаморфические. Они образовались в результате переработки при высоких температурах и давлении глубоководного флиша — комплекса
            - link "осадочных пород" [ref=e475] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%81%D0%B0%D0%B4%D0%BE%D1%87%D0%BD%D1%8B%D0%B5_%D0%BF%D0%BE%D1%80%D0%BE%D0%B4%D1%8B
            - text: (
            - link "аргиллитов" [ref=e476] [cursor=pointer]:
              - /url: /wiki/%D0%90%D1%80%D0%B3%D0%B8%D0%BB%D0%BB%D0%B8%D1%82
            - text: ","
            - link "песчаников" [ref=e477] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B5%D1%81%D1%87%D0%B0%D0%BD%D0%B8%D0%BA
            - text: и
            - link "известняков" [ref=e478] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%B7%D0%B2%D0%B5%D1%81%D1%82%D0%BD%D1%8F%D0%BA
            - text: ), накопившихся в раннем и среднем
            - link "кембрии" [ref=e479] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B5%D0%BC%D0%B1%D1%80%D0%B8%D0%B9
            - text: (490—500 миллионов лет). Предполагается, что морские отложения накопились на континентальном шельфе Индии до того, как она столкнулась с Азией. При столкновении они деформировались и частично подверглись метаморфизму — перекристаллизации с изменением минерального состава и структуры. Ниже абсолютной отметки 7000 метров, в основании горы, лежит формация, состоящая из метаморфических сланцев и
            - link "гнейсов" [ref=e480] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BD%D0%B5%D0%B9%D1%81
            - text: раннекембрийского и протерозойского возраста (более 500 миллионов лет), прорванных многочисленными горизонтальными и вертикальными телами
            - link "гранитов" [ref=e481] [cursor=pointer]:
              - /url: /wiki/%D0%93%D1%80%D0%B0%D0%BD%D0%B8%D1%82
            - text: мощностью от 1 см до 1500 м. Они являются частью пояса
            - link "олигоцен" [ref=e482] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%BB%D0%B8%D0%B3%D0%BE%D1%86%D0%B5%D0%BD
            - text: "-"
            - link "миоценовых" [ref=e483] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B8%D0%BE%D1%86%D0%B5%D0%BD
            - text: интрузивных пород, известных как верхнегималайские лейкограниты, которые образовались в результате частичного плавления нижней части Индостанской плиты, погрузившейся под Евразийскую во время
            - link "субдукции" [ref=e484] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D1%83%D0%B1%D0%B4%D1%83%D0%BA%D1%86%D0%B8%D1%8F
            - text: 24—20 миллионов лет назад.
          - paragraph [ref=e485]:
            - text: Само образование Джомолунгмы могло начаться около 55 миллионов лет назад
            - superscript [ref=e486]:
              - link "[15]" [ref=e487] [cursor=pointer]:
                - /url: "#cite_note-15"
            - superscript [ref=e488]:
              - text: "["
              - link "неавторитетный источник" [ref=e490] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%90%D0%B2%D1%82%D0%BE%D1%80%D0%B8%D1%82%D0%B5%D1%82%D0%BD%D1%8B%D0%B5_%D0%B8%D1%81%D1%82%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
              - text: "]"
            - text: .
          - generic [ref=e491]:
            - heading "Климат" [level=2] [ref=e492]: Климат
            - generic [ref=e493]:
              - text: "["
              - link "править" [ref=e494] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=5
              - text: "|"
              - link "править код" [ref=e495] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=5
              - text: "]"
          - paragraph [ref=e496]:
            - text: Средняя дневная температура на вершине Джомолунгмы в июле около −19 °C, в январе около −36 °C (и может понижаться до −60 °C). Поскольку высота вершины находится почти на нижней границе
            - link "высотного струйного течения" [ref=e497] [cursor=pointer]:
              - /url: /wiki/%D0%92%D1%8B%D1%81%D0%BE%D1%82%D0%BD%D0%BE%D0%B5_%D1%81%D1%82%D1%80%D1%83%D0%B9%D0%BD%D0%BE%D0%B5_%D1%82%D0%B5%D1%87%D0%B5%D0%BD%D0%B8%D0%B5
            - text: ", довольно характерны внезапные штормы с порывами ветра вплоть до 160 км/ч. Осадки выпадают в виде снега во время летнего"
            - link "муссона" [ref=e498] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D1%83%D1%81%D1%81%D0%BE%D0%BD
            - text: ", продолжающегося с конца мая до середины сентября"
            - superscript [ref=e499]:
              - link "[1]" [ref=e500] [cursor=pointer]:
                - /url: "#cite_note-britannica-1"
            - text: .
          - generic [ref=e501]:
            - heading "Измерения высоты" [level=2] [ref=e502]: Измерения высоты
            - generic [ref=e503]:
              - text: "["
              - link "править" [ref=e504] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=6
              - text: "|"
              - link "править код" [ref=e505] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=6
              - text: "]"
          - figure "3D-анимация Джомолунгмы и окружающего ландшафта" [ref=e506]:
            - link [ref=e507] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Everest_3D.gif?uselang=ru
              - img [ref=e508]
            - generic [ref=e510]:
              - link "3D" [ref=e511] [cursor=pointer]:
                - /url: /wiki/%D0%A2%D1%80%D1%91%D1%85%D0%BC%D0%B5%D1%80%D0%BD%D0%B0%D1%8F_%D0%B3%D1%80%D0%B0%D1%84%D0%B8%D0%BA%D0%B0
              - text: "-анимация Джомолунгмы и окружающего"
              - link "ландшафта" [ref=e512] [cursor=pointer]:
                - /url: /wiki/%D0%9B%D0%B0%D0%BD%D0%B4%D1%88%D0%B0%D1%84%D1%82
          - paragraph [ref=e513]:
            - text: Первым определившим, что Джомолунгма является высочайшей вершиной на
            - link "Земле" [ref=e514] [cursor=pointer]:
              - /url: /wiki/%D0%97%D0%B5%D0%BC%D0%BB%D1%8F
            - text: ", стал индийский"
            - link "математик" [ref=e515] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B0%D1%82%D0%B5%D0%BC%D0%B0%D1%82%D0%B8%D0%BA%D0%B0
            - text: и
            - link "топограф" [ref=e516] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%BE%D0%BF%D0%BE%D0%B3%D1%80%D0%B0%D1%84%D0%B8%D1%8F
            - link "Радханат Сикдар" [ref=e517] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B8%D0%BA%D0%B4%D0%B0%D1%80,_%D0%A0%D0%B0%D0%B4%D1%85%D0%B0%D0%BD%D0%B0%D1%82
            - text: . В 1852 году на основе
            - link "тригонометрических" [ref=e518] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D1%80%D0%B8%D0%B3%D0%BE%D0%BD%D0%BE%D0%BC%D0%B5%D1%82%D1%80%D0%B8%D1%8F
            - text: расчётов и компиляции данных, полученных в результате не менее шести обсерваций, он пришёл к выводу, что Пик-XV является высочайшим на Земле, а не
            - link "Канченджанга" [ref=e519] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D0%BD%D1%87%D0%B5%D0%BD%D0%B4%D0%B6%D0%B0%D0%BD%D0%B3%D0%B0
            - text: ", как считалось до этого. Им же была вычислена приблизительная высота восьмитысячника, которая составила ровно 29 000"
            - link "футов" [ref=e520] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D1%83%D1%82
            - text: (8839 м), к которой руководитель
            - link "геодезической" [ref=e521] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%B5%D0%BE%D0%B4%D0%B5%D0%B7%D0%B8%D1%8F
            - text: службы
            - link "Британской Индии" [ref=e522] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%80%D0%B8%D1%82%D0%B0%D0%BD%D1%81%D0%BA%D0%B0%D1%8F_%D0%98%D0%BD%D0%B4%D0%B8%D1%8F
            - link "Эндрю Во" [ref=e523] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%BE,_%D0%AD%D0%BD%D0%B4%D1%80%D1%8E_%D0%A1%D0%BA%D0%BE%D1%82%D1%82
            - text: — преемник
            - link "Джорджа Эвереста" [ref=e524] [cursor=pointer]:
              - /url: /wiki/%D0%AD%D0%B2%D0%B5%D1%80%D0%B5%D1%81%D1%82,_%D0%94%D0%B6%D0%BE%D1%80%D0%B4%D0%B6
            - text: ", добавил пару футов, чтобы расчёты Сикдара не выглядели как «округлённые». Результаты вычислений Сикдара были официально опубликованы в марте 1856 года"
            - superscript [ref=e525]:
              - link "[16]" [ref=e526] [cursor=pointer]:
                - /url: "#cite_note-16"
            - text: .
          - paragraph [ref=e527]:
            - text: Спустя 100 лет, в 1952—1954 годах индийскими топографами были проведены повторные измерения высоты вершины, и в 1955 году географической наукой была повсеместно принята её высота в 29 028 футов (8848 м) над уровнем моря
            - superscript [ref=e528]:
              - link "[17]" [ref=e529] [cursor=pointer]:
                - /url: "#cite_note-17"
            - text: .
          - paragraph [ref=e530]:
            - text: 23 июля 1975 года
            - link "правительство КНР" [ref=e531] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D1%81%D1%83%D0%B4%D0%B0%D1%80%D1%81%D1%82%D0%B2%D0%B5%D0%BD%D0%BD%D1%8B%D0%B9_%D1%81%D0%BE%D0%B2%D0%B5%D1%82_%D0%9A%D0%9D%D0%A0
            - text: на основе комплексных измерений китайской экспедиции этого года опубликовало значение высоты вершины в 8848,13 м (за минусом снежного покрова глубиной 0,92 м)
            - superscript [ref=e532]:
              - link "[18]" [ref=e533] [cursor=pointer]:
                - /url: "#cite_note-zhurnal-18"
            - text: . Итальянские изыскания 1987 года показали высоту 29 108 футов (8872 м). В 1992 году итальянцы с использованием
            - link "GPS" [ref=e534] [cursor=pointer]:
              - /url: /wiki/GPS
            - text: и технологии лазерных измерений получили истинную высоту 8846 м (за вычетом двухметровой высоты снежно-ледовой вершинной «шапки»). Методология всех этих измерений, тем не менее, была поставлена под сомнение
            - superscript [ref=e535]:
              - link "[1]" [ref=e536] [cursor=pointer]:
                - /url: "#cite_note-britannica-1"
            - text: .
          - paragraph [ref=e537]:
            - text: В 1999 году американская экспедиция, финансируемая
            - link "Национальным географическим обществом" [ref=e538] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B0%D1%86%D0%B8%D0%BE%D0%BD%D0%B0%D0%BB%D1%8C%D0%BD%D0%BE%D0%B5_%D0%B3%D0%B5%D0%BE%D0%B3%D1%80%D0%B0%D1%84%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%BE%D0%B5_%D0%BE%D0%B1%D1%89%D0%B5%D1%81%D1%82%D0%B2%D0%BE
            - text: ", с использованием высокоточного GPS-оборудования определила высоту вершины в 29 035 футов (8850 м) +/− 6,5 футов (2 метра)."
          - paragraph [ref=e539]:
            - text: В 2005 году китайская экспедиция впервые в мире с помощью
            - link "радара" [ref=e540] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D0%B0%D0%B4%D0%B8%D0%BE%D0%BB%D0%BE%D0%BA%D0%B0%D1%86%D0%B8%D0%BE%D0%BD%D0%BD%D0%B0%D1%8F_%D1%81%D1%82%D0%B0%D0%BD%D1%86%D0%B8%D1%8F
            - text: определила значение высоты скального уровня вершины 8844,43 м, выше которого располагался метровый слой, вероятно, камня и льда, и 3,5-метровый слой снега
            - superscript [ref=e541]:
              - link "[18]" [ref=e542] [cursor=pointer]:
                - /url: "#cite_note-zhurnal-18"
            - text: . Измерения проводили на восходе солнца, когда особенности атмосферы минимально искажают результаты
            - superscript [ref=e543]:
              - link "[19]" [ref=e544] [cursor=pointer]:
                - /url: "#cite_note-19"
            - text: . С принятием этой оценки в качестве высоты горы был не согласен Непал, настаивая на классическом значении 8848 м
            - superscript [ref=e545]:
              - link "[20]" [ref=e546] [cursor=pointer]:
                - /url: "#cite_note-20"
            - text: . В 2010 году стороны пришли к компромиссу — официальная высота Джомолунгмы фиксируется на отметке 8848 м над уровнем моря, а высота твёрдой
            - link "породы" [ref=e547] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D1%80%D0%BD%D0%B0%D1%8F_%D0%BF%D0%BE%D1%80%D0%BE%D0%B4%D0%B0
            - text: составляет 8844 м
            - superscript [ref=e548]:
              - link "[21]" [ref=e549] [cursor=pointer]:
                - /url: "#cite_note-21"
            - text: ", а в декабре 2020 года власти Китая и Непала, наконец, согласовали официальную высоту Джомолунгмы — 8848,86 м, разница в определении которой препятствовала подписанию протокола о границе стран"
            - superscript [ref=e550]:
              - link "[1]" [ref=e551] [cursor=pointer]:
                - /url: "#cite_note-britannica-1"
            - text: (немаловажную роль в этом споре сыграли учёные, высказавшие мнение, что после
            - link "Непальского землетрясения" [ref=e552] [cursor=pointer]:
              - /url: /wiki/%D0%97%D0%B5%D0%BC%D0%BB%D0%B5%D1%82%D1%80%D1%8F%D1%81%D0%B5%D0%BD%D0%B8%D1%8F_%D0%B2_%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB%D0%B5_(2015)
            - text: она могла уменьшиться
            - superscript [ref=e553]:
              - link "[22]" [ref=e554] [cursor=pointer]:
                - /url: "#cite_note-22"
            - text: ).
          - generic [ref=e555]:
            - heading "Эверест как объект альпинизма" [level=2] [ref=e556]: Эверест как объект альпинизма
