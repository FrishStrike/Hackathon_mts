            - listitem [ref=e1166]:
              - text: 3 апреля 1933 года два
              - link "биплана" [ref=e1167] [cursor=pointer]:
                - /url: /wiki/%D0%91%D0%B8%D0%BF%D0%BB%D0%B0%D0%BD
              - text: ", управляемые британскими пилотами"
              - link "маркизом Клайдсдейлом" [ref=e1168] [cursor=pointer]:
                - /url: /wiki/%D0%94%D1%83%D0%B3%D0%BB%D0%B0%D1%81-%D0%93%D0%B0%D0%BC%D0%B8%D0%BB%D1%8C%D1%82%D0%BE%D0%BD,_%D0%94%D1%83%D0%B3%D0%BB%D0%B0%D1%81,_14-%D0%B9_%D0%B3%D0%B5%D1%80%D1%86%D0%BE%D0%B3_%D0%93%D0%B0%D0%BC%D0%B8%D0%BB%D1%8C%D1%82%D0%BE%D0%BD
              - text: и Дэвидом Макинтайром (
              - link "англ." [ref=e1169] [cursor=pointer]:
                - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: David MacIntyre), совершили первый полёт над вершиной.
            - listitem [ref=e1170]:
              - text: В 2001 году супружеская пара из
              - link "Франции" [ref=e1171] [cursor=pointer]:
                - /url: /wiki/%D0%A4%D1%80%D0%B0%D0%BD%D1%86%D0%B8%D1%8F
              - text: ", Бертран и Клер Бернье, слетела вниз с вершины на"
              - link "параплане" [ref=e1172] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%B0%D1%80%D0%B0%D0%BF%D0%BB%D0%B0%D0%BD
              - text: ‑тандеме
              - superscript [ref=e1173]:
                - link "[46]" [ref=e1174] [cursor=pointer]:
                  - /url: "#cite_note-autogenerated3-46"
              - text: .
            - listitem [ref=e1175]:
              - text: В мае 2004 года
              - link "итальянец" [ref=e1176] [cursor=pointer]:
                - /url: /wiki/%D0%98%D1%82%D0%B0%D0%BB%D0%B8%D1%8F
              - link "Анджело Д’Арриго" [ref=e1177] [cursor=pointer]:
                - /url: /wiki/%D0%94%E2%80%99%D0%90%D1%80%D1%80%D0%B8%D0%B3%D0%BE,_%D0%90%D0%BD%D0%B4%D0%B6%D0%B5%D0%BB%D0%BE
              - text: впервые в
              - link "истории авиации" [ref=e1178] [cursor=pointer]:
                - /url: /wiki/%D0%98%D1%81%D1%82%D0%BE%D1%80%D0%B8%D1%8F_%D0%B0%D0%B2%D0%B8%D0%B0%D1%86%D0%B8%D0%B8
              - text: совершил полёт на
              - link "дельтаплане" [ref=e1179] [cursor=pointer]:
                - /url: /wiki/%D0%94%D0%B5%D0%BB%D1%8C%D1%82%D0%B0%D0%BF%D0%BB%D0%B0%D0%BD
              - text: над вершиной высочайшей горы Земли
              - superscript [ref=e1180]:
                - link "[76]" [ref=e1181] [cursor=pointer]:
                  - /url: "#cite_note-76"
              - text: .
            - listitem [ref=e1182]:
              - text: 14 мая 2005 года лётчик-испытатель фирмы «
              - link "Eurocopter" [ref=e1183] [cursor=pointer]:
                - /url: /wiki/Airbus_Helicopters
              - text: » Дидье Дельсаль (
              - link "фр." [ref=e1184] [cursor=pointer]:
                - /url: /wiki/%D0%A4%D1%80%D0%B0%D0%BD%D1%86%D1%83%D0%B7%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: Didier Delsalle) успешно посадил
              - link "вертолёт" [ref=e1185] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B5%D1%80%D1%82%D0%BE%D0%BB%D1%91%D1%82
              - link "Eurocopter AS 350 Ecureuil" [ref=e1187] [cursor=pointer]:
                - /url: /wiki/A%C3%A9rospatiale_AS.350_%C3%89cureuil
              - text: на вершину горы. Это был первый случай подобной посадки
              - superscript [ref=e1188]:
                - link "[77]" [ref=e1189] [cursor=pointer]:
                  - /url: "#cite_note-membrana4674-77"
              - text: .
            - listitem [ref=e1190]:
              - text: В 2008 году две парашютистки, Венди Смит и Холли Бадж, и парашютист Нейл Джонс приземлились на вершину, выпрыгнув с
              - link "самолёта" [ref=e1191] [cursor=pointer]:
                - /url: /wiki/%D0%A1%D0%B0%D0%BC%D0%BE%D0%BB%D1%91%D1%82
              - text: ", летящего на высоте чуть менее 9 км (на 142 м выше самой верхней точки горы)"
              - superscript [ref=e1192]:
                - link "[78]" [ref=e1193] [cursor=pointer]:
                  - /url: "#cite_note-78"
              - text: .
            - listitem [ref=e1194]:
              - text: 21 мая 2011 года непальцы Сано Бабу и Лапка Шерпа, взойдя на Эверест, стартовали на тандемном
              - link "параплане" [ref=e1195] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%B0%D1%80%D0%B0%D0%BF%D0%BB%D0%B0%D0%BD
              - text: и пролетели на высоте 30 м над вершиной, установив мировой рекорд высоты полёта на этом типе летательного аппарата
              - superscript [ref=e1196]:
                - link "[79]" [ref=e1197] [cursor=pointer]:
                  - /url: "#cite_note-79"
              - superscript [ref=e1198]:
                - link "[80]" [ref=e1199] [cursor=pointer]:
                  - /url: "#cite_note-80"
              - text: .
