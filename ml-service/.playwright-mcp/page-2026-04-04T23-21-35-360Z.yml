          - note [ref=e995]:
            - text: "Основная статья:"
            - link "Катастрофа на Джомолунгме (1996)" [ref=e996] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D1%82%D0%B0%D1%81%D1%82%D1%80%D0%BE%D1%84%D0%B0_%D0%BD%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B5_(1996)
          - paragraph [ref=e997]:
            - text: В ночь с 10 на 11 мая 1996 года во время спуска с вершины погибли пятеро участников коммерческих экспедиций компаний «
            - link "Консультанты по приключениям" [ref=e999] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%9A%D0%BE%D0%BD%D1%81%D1%83%D0%BB%D1%8C%D1%82%D0%B0%D0%BD%D1%82%D1%8B_%D0%BF%D0%BE_%D0%BF%D1%80%D0%B8%D0%BA%D0%BB%D1%8E%D1%87%D0%B5%D0%BD%D0%B8%D1%8F%D0%BC&action=edit&redlink=1
            - superscript [ref=e1000]:
              - link "[англ.]" [ref=e1001] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Adventure_Consultants
            - text: »
            - link "Роба Холла" [ref=e1002] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%BE%D0%BB%D0%BB,_%D0%A0%D0%BE%D0%B1
            - text: ", включая его самого,"
            - link "Скотта Фишера" [ref=e1003] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B8%D1%88%D0%B5%D1%80,_%D0%A1%D0%BA%D0%BE%D1%82%D1%82
            - text: ", — руководителя коммерческой экспедиции компании «"
            - link "Горное безумие" [ref=e1004] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%93%D0%BE%D1%80%D0%BD%D0%BE%D0%B5_%D0%B1%D0%B5%D0%B7%D1%83%D0%BC%D0%B8%D0%B5&action=edit&redlink=1
            - text: », а также троих восходителей из
            - link "Индийской" [ref=e1005] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%BD%D0%B4%D0%B8%D1%8F
            - text: национальной экспедиции, организованной Индо-Тибетской пограничной службой (
            - link "англ." [ref=e1006] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Indo-Tibet Border Police). Ещё двое альпинистов, совершавших в тот день восхождение, получили серьёзные
            - link "обморожения" [ref=e1007] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%82%D0%BC%D0%BE%D1%80%D0%BE%D0%B6%D0%B5%D0%BD%D0%B8%D0%B5
            - text: . По числу жертв майская трагедия стала самой крупной с 1922 года, когда в
            - link "лавине" [ref=e1008] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D0%B2%D0%B8%D0%BD%D0%B0
            - text: ", сошедшей с"
            - link "Северного седла" [ref=e1009] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B5%D0%B2%D0%B5%D1%80%D0%BD%D0%BE%D0%B5_%D1%81%D0%B5%D0%B4%D0%BB%D0%BE
            - text: ", погибли семеро"
            - link "носильщиков" [ref=e1010] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%BE%D1%81%D0%B8%D0%BB%D1%8C%D1%89%D0%B8%D0%BA
            - link "британской экспедиции на Джомолунгму" [ref=e1011] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%80%D0%B8%D1%82%D0%B0%D0%BD%D1%81%D0%BA%D0%B0%D1%8F_%D1%8D%D0%BA%D1%81%D0%BF%D0%B5%D0%B4%D0%B8%D1%86%D0%B8%D1%8F_%D0%BD%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%83_(1922)
            - link "Чарльза Брюса" [ref=e1012] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%80%D1%8E%D1%81,_%D0%A7%D0%B0%D1%80%D0%BB%D1%8C%D0%B7_%D0%93%D1%80%D0%B0%D0%BD%D0%B2%D0%B8%D0%BB%D1%8C
            - superscript [ref=e1013]:
              - link "[68]" [ref=e1014] [cursor=pointer]:
                - /url: "#cite_note-68"
            - text: .
          - paragraph [ref=e1015]:
            - text: Трагедия получила широкую огласку в
            - link "средствах массовой информации" [ref=e1016] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D1%80%D0%B5%D0%B4%D1%81%D1%82%D0%B2%D0%B0_%D0%BC%D0%B0%D1%81%D1%81%D0%BE%D0%B2%D0%BE%D0%B9_%D0%B8%D0%BD%D1%84%D0%BE%D1%80%D0%BC%D0%B0%D1%86%D0%B8%D0%B8
            - text: и вызвала полемику по самому широкому спектру вопросов, касающихся как организации коммерческих восхождений в целом, так и частных вопросов высотного альпинизма (использования кислорода, высокогорной этики). Несмотря на то, что авария наглядно продемонстрировала несовершенство (на тот момент) организаций коммерческих экспедиций, их число только выросло
            - superscript [ref=e1017]:
              - link "[69]" [ref=e1018] [cursor=pointer]:
                - /url: "#cite_note-69"
            - text: .
          - paragraph [ref=e1019]:
            - text: Многие из непосредственных участников-свидетелей этого драматического восхождения позже опубликовали книги, в которых изложили собственное видение причин и обстоятельств, приведших к аварии, наиболее известными из которых стали
            - link "бестселлер" [ref=e1020] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D1%81%D1%82%D1%81%D0%B5%D0%BB%D0%BB%D0%B5%D1%80
            - text: «
            - link "В разрежённом воздухе" [ref=e1021] [cursor=pointer]:
              - /url: /wiki/%D0%92_%D1%80%D0%B0%D0%B7%D1%80%D0%B5%D0%B6%D1%91%D0%BD%D0%BD%D0%BE%D0%BC_%D0%B2%D0%BE%D0%B7%D0%B4%D1%83%D1%85%D0%B5
            - text: »
            - link "Джона Кракауэра" [ref=e1022] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D1%80%D0%B0%D0%BA%D0%B0%D1%83%D1%8D%D1%80,_%D0%94%D0%B6%D0%BE%D0%BD
            - text: ", — клиента Роба Холла (1997), и книга"
            - link "Анатолия Букреева" [ref=e1023] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%83%D0%BA%D1%80%D0%B5%D0%B5%D0%B2,_%D0%90%D0%BD%D0%B0%D1%82%D0%BE%D0%BB%D0%B8%D0%B9_%D0%9D%D0%B8%D0%BA%D0%BE%D0%BB%D0%B0%D0%B5%D0%B2%D0%B8%D1%87
            - text: ", — гида «Горного безумия», «"
            - link "Восхождение" [ref=e1025] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%92%D0%BE%D1%81%D1%85%D0%BE%D0%B6%D0%B4%D0%B5%D0%BD%D0%B8%D0%B5_(%D0%BA%D0%BD%D0%B8%D0%B3%D0%B0)&action=edit&redlink=1
            - superscript [ref=e1026]:
              - link "[англ.]" [ref=e1027] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/The_Climb_(book)
            - text: » (1997). Трагедия на северном маршруте частично описана в книге
            - link "Мэтта Дикинсона" [ref=e1028] [cursor=pointer]:
              - /url: /wiki/%D0%94%D0%B8%D0%BA%D0%B8%D0%BD%D1%81%D0%BE%D0%BD,_%D0%9C%D1%8D%D1%82%D1%82
            - text: «Другая сторона Эвереста» (2000). Наиболее полное описание действий индийской группы изложил в своей статье заместитель её руководителя
            - superscript [ref=e1029]:
              - link "[70]" [ref=e1030] [cursor=pointer]:
                - /url: "#cite_note-70"
            - text: .
