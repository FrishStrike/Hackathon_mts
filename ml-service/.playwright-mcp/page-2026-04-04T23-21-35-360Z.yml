              - text: .
            - generic [ref=e645]:
              - generic [ref=e646]:
                - text: Проверьте соответствие информации приведённым источникам и удалите или исправьте информацию, являющуюся оригинальным исследованием. В случае необходимости подтвердите информацию авторитетными
