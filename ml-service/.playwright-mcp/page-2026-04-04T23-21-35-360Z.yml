            - link "Каракорум" [ref=e673] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D1%80%D0%B0%D0%BA%D0%BE%D1%80%D1%83%D0%BC_(%D0%B3%D0%BE%D1%80%D0%BD%D0%B0%D1%8F_%D1%81%D0%B8%D1%81%D1%82%D0%B5%D0%BC%D0%B0)
            - text: (на Джомолунгму,
            - link "Чогори" [ref=e674] [cursor=pointer]:
              - /url: /wiki/%D0%A7%D0%BE%D0%B3%D0%BE%D1%80%D0%B8
            - text: ","
            - link "Канченджангу" [ref=e675] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D0%BD%D1%87%D0%B5%D0%BD%D0%B4%D0%B6%D0%B0%D0%BD%D0%B3%D0%B0
            - text: ","
            - link "Нангапарбат" [ref=e676] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B0%D0%BD%D0%B3%D0%B0%D0%BF%D0%B0%D1%80%D0%B1%D0%B0%D1%82
            - text: и другие вершины). Их участникам удалось взойти на несколько семитысячников этих горных районов, но ни одна попытка штурма вершин
            - link "восьмитысячников" [ref=e677] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%BE%D1%81%D1%8C%D0%BC%D0%B8%D1%82%D1%8B%D1%81%D1%8F%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
            - text: успеха не имела. Лишь в 1950 году французам удалось взойти на первый восьмитысячник —
            - link "Аннапурну" [ref=e678] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%BD%D0%B0%D0%BF%D1%83%D1%80%D0%BD%D0%B0
            - text: .
          - paragraph [ref=e679]:
            - text: Английские альпинисты добились наибольшего результата при попытках восхождения на Эверест, благодаря применению кислорода. После разведывательной экспедиции 1921 года последовала экспедиция 1922 года, в которой Джордж Финч и Джеффри Брюс достигли высоты 8320 м, впервые использовав кислород. В 1924 году Нортон достиг высоты 8565 м, а
            - link "Джордж Мэллори" [ref=e680] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D1%8D%D0%BB%D0%BB%D0%BE%D1%80%D0%B8,_%D0%94%D0%B6%D0%BE%D1%80%D0%B4%D0%B6
            - text: и
            - link "Эндрю Ирвин" [ref=e681] [cursor=pointer]:
              - /url: /wiki/%D0%98%D1%80%D0%B2%D0%B8%D0%BD,_%D0%AD%D0%BD%D0%B4%D1%80%D1%8E_%D0%9A%D0%BE%D0%BC%D0%B8%D0%BD
            - text: (как оценил
            - link "Н. Оделл" [ref=e683] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%9E%D0%B4%D0%B5%D0%BB%D0%BB,_%D0%9D%D0%BE%D1%8D%D0%BB%D1%8C_%D0%AD%D0%B2%D0%B0%D1%80%D1%82&action=edit&redlink=1
            - superscript [ref=e684]:
              - link "[англ.]" [ref=e685] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Noel_Odell
            - text: ) — более 8600 м.
            - link "По некоторым данным" [ref=e686] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%B8%D1%81%D0%BA%D0%B8_%D0%9C%D1%8D%D0%BB%D0%BB%D0%BE%D1%80%D0%B8_%D0%B8_%D0%98%D1%80%D0%B2%D0%B8%D0%BD%D0%B0
            - text: ", последний раз их видели живыми в 150 метрах от вершины (через бинокль, в разрыве облаков). Существует версия, что они погибли уже при спуске с вершины; и спор о том, достигли они её или нет, продолжается и сегодня. Тело Мэллори было обнаружено в 1999 году, останки Ирвина (предположительно) — в 2024 году"
            - link "Джимми Чином" [ref=e687] [cursor=pointer]:
              - /url: /wiki/%D0%A7%D0%B8%D0%BD,_%D0%94%D0%B6%D0%B8%D0%BC%D0%BC%D0%B8
            - superscript [ref=e688]:
              - link "[30]" [ref=e689] [cursor=pointer]:
                - /url: "#cite_note-natgeo-found-30"
            - text: .
          - paragraph [ref=e690]:
            - text: В 1933 году П. Вин-Харрис, Л. Уэйгер и Ф. Смит достигли высоты 8565 м. В 1934 году
            - link "эксцентрик" [ref=e692] [cursor=pointer]:
              - /url: /w/index.php?title=Eccentricity_(behavior)&action=edit&redlink=1
            - superscript [ref=e693]:
              - link "[англ.]" [ref=e694] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Eccentricity_(behavior)
            - superscript [ref=e695]:
              - text: "["
              - link "источник не указан 1280 дней" [ref=e697] [cursor=pointer]:
                - /url: /wiki/%D0%92%D0%B8%D0%BA%D0%B8%D0%BF%D0%B5%D0%B4%D0%B8%D1%8F:%D0%A1%D1%81%D1%8B%D0%BB%D0%BA%D0%B8_%D0%BD%D0%B0_%D0%B8%D1%81%D1%82%D0%BE%D1%87%D0%BD%D0%B8%D0%BA%D0%B8
              - text: "]"
            - link "Морис Уилсон" [ref=e698] [cursor=pointer]:
              - /url: /wiki/%D0%A3%D0%B8%D0%BB%D1%81%D0%BE%D0%BD,_%D0%9C%D0%BE%D1%80%D0%B8%D1%81
            - text: ", не имевший специальной альпинистской подготовки и веривший в то, что он будет вознесён на вершину сверхъестественными силами, погиб на высоте около 7 км, хотя впоследствии иногда считалось, что он разбил найденную более поздними экспедициями на высоте 8,5 км палатку. Следующие британские экспедиции были предприняты в 1936 и 1938 годах. В 1947 году канадец Эрл Денман с двумя"
            - link "шерпами" [ref=e699] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D0%BF%D1%8B
            - text: смог подняться лишь до 6,7 км.
          - paragraph [ref=e700]:
            - text: Участники экспедиций до 1949 года пытались взойти на высочайшую точку планеты с севера, со стороны
            - link "Тибета" [ref=e701] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B8%D0%B1%D0%B5%D1%82
            - text: ", потому что территория"
            - link "Непала" [ref=e702] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB
            - text: до 1948 года была закрыта для европейцев
            - superscript [ref=e703]:
              - link "[31]" [ref=e704] [cursor=pointer]:
                - /url: "#cite_note-autogenerated1-31"
            - text: . Первая разведка на Эверест с юга, со стороны Непала, была предпринята англичанами в 1949 году
            - superscript [ref=e705]:
              - link "[31]" [ref=e706] [cursor=pointer]:
                - /url: "#cite_note-autogenerated1-31"
            - text: . В 1950 году для европейцев фактически закрылся Тибет.
          - figure "Эдмунд Хиллари в 1953 году" [ref=e707]:
            - link [ref=e708] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Edmund_Hillary,_c._1953,_autograph_removed.jpg?uselang=ru
              - img [ref=e709]
            - generic [ref=e711]:
              - link "Эдмунд Хиллари" [ref=e712] [cursor=pointer]:
                - /url: /wiki/%D0%A5%D0%B8%D0%BB%D0%BB%D0%B0%D1%80%D0%B8,_%D0%AD%D0%B4%D0%BC%D1%83%D0%BD%D0%B4
              - text: в 1953 году
          - paragraph [ref=e713]:
            - text: Первое восхождение было совершено 29 мая 1953 года
            - link "шерпом" [ref=e714] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D0%BF%D1%8B
            - link "Тенцингом Норгеем" [ref=e715] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B5%D0%BD%D1%86%D0%B8%D0%BD%D0%B3_%D0%9D%D0%BE%D1%80%D0%B3%D0%B5%D0%B9
            - text: и
            - link "новозеландцем" [ref=e716] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%BE%D0%B2%D0%B0%D1%8F_%D0%97%D0%B5%D0%BB%D0%B0%D0%BD%D0%B4%D0%B8%D1%8F
            - link "Эдмундом Хиллари" [ref=e717] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%B8%D0%BB%D0%BB%D0%B0%D1%80%D0%B8,_%D0%AD%D0%B4%D0%BC%D1%83%D0%BD%D0%B4
            - text: через
            - link "Южное седло" [ref=e718] [cursor=pointer]:
              - /url: /wiki/%D0%AE%D0%B6%D0%BD%D0%BE%D0%B5_%D1%81%D0%B5%D0%B4%D0%BB%D0%BE
            - text: — по пути, разведанному накануне швейцарцами. Восходители пользовались кислородными приборами. В работе экспедиции принимали участие более 30 шерпов
            - superscript [ref=e719]:
              - link "[31]" [ref=e720] [cursor=pointer]:
                - /url: "#cite_note-autogenerated1-31"
            - superscript [ref=e721]:
              - link "[32]" [ref=e722] [cursor=pointer]:
                - /url: "#cite_note-32"
            - superscript [ref=e723]:
              - link "[33]" [ref=e724] [cursor=pointer]:
                - /url: "#cite_note-33"
            - text: .
          - paragraph [ref=e725]:
            - text: В последующие годы высочайшую вершину мира покорили альпинисты разных стран мира —
            - link "США" [ref=e726] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BE%D0%B5%D0%B4%D0%B8%D0%BD%D1%91%D0%BD%D0%BD%D1%8B%D0%B5_%D0%A8%D1%82%D0%B0%D1%82%D1%8B_%D0%90%D0%BC%D0%B5%D1%80%D0%B8%D0%BA%D0%B8
            - text: ","
            - link "СССР" [ref=e727] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BE%D1%8E%D0%B7_%D0%A1%D0%BE%D0%B2%D0%B5%D1%82%D1%81%D0%BA%D0%B8%D1%85_%D0%A1%D0%BE%D1%86%D0%B8%D0%B0%D0%BB%D0%B8%D1%81%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D1%85_%D0%A0%D0%B5%D1%81%D0%BF%D1%83%D0%B1%D0%BB%D0%B8%D0%BA
            - text: (
            - link "Первая советская гималайская экспедиция" [ref=e728] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B5%D1%80%D0%B2%D0%B0%D1%8F_%D1%81%D0%BE%D0%B2%D0%B5%D1%82%D1%81%D0%BA%D0%B0%D1%8F_%D0%B3%D0%B8%D0%BC%D0%B0%D0%BB%D0%B0%D0%B9%D1%81%D0%BA%D0%B0%D1%8F_%D1%8D%D0%BA%D1%81%D0%BF%D0%B5%D0%B4%D0%B8%D1%86%D0%B8%D1%8F
            - text: ),
            - link "КНР" [ref=e729] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D1%82%D0%B0%D0%B9
            - text: ","
            - link "Индии" [ref=e730] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%BD%D0%B4%D0%B8%D1%8F
            - text: ","
            - link "Японии" [ref=e731] [cursor=pointer]:
              - /url: /wiki/%D0%AF%D0%BF%D0%BE%D0%BD%D0%B8%D1%8F
            - text: ","
            - link "Италии" [ref=e732] [cursor=pointer]:
              - /url: /wiki/%D0%98%D1%82%D0%B0%D0%BB%D0%B8%D1%8F
            - text: и других стран.
          - paragraph [ref=e733]:
            - text: 25 мая 1960 года в 2 часа 20 минут ночи Эверест впервые покоряет
            - link "китайская экспедиция" [ref=e735] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%9A%D0%B8%D1%82%D0%B0%D0%B9%D1%81%D0%BA%D0%B0%D1%8F_%D1%8D%D0%BA%D1%81%D0%BF%D0%B5%D0%B4%D0%B8%D1%86%D0%B8%D1%8F_%D0%BD%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%83_1960_%D0%B3%D0%BE%D0%B4%D0%B0&action=edit&redlink=1
            - superscript [ref=e736]:
