          - paragraph [ref=e671]:
            - text: До момента первого восхождения на вершину, которое состоялось в 1953 году, было проведено около 50 экспедиций в
            - link "Гималаи" [ref=e672] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%B8%D0%BC%D0%B0%D0%BB%D0%B0%D0%B8
