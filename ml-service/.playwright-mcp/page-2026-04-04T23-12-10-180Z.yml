          - figure "Жительница Екатеринбурга оставила надпись «Козёл» на стекле автомобиля соседа, из-за которого не могла выехать со двора. 2019 год" [ref=e414]:
            - link [ref=e415] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:%D0%9D%D0%B0%D0%B4%D0%BF%D0%B8%D1%81%D1%8C_%D0%9A%D0%BE%D0%B7%D0%B5%D0%BB_%D0%BE%D1%81%D1%82%D0%B0%D0%B2%D0%BB%D0%B5%D0%BD%D0%BD%D0%B0%D1%8F_%D1%81%D0%BE%D1%81%D0%B5%D0%B4%D0%BA%D0%BE%D0%B9_%D0%B2%D0%BE%D0%B4%D0%B8%D1%82%D0%B5%D0%BB%D1%8F_%D0%B2_%D0%95%D0%BA%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%BD%D0%B1%D1%83%D1%80%D0%B3%D0%B5_22_%D0%B4%D0%B5%D0%BA%D0%B0%D0%B1%D1%80%D1%8F_2019_%D0%B3%D0%BE%D0%B4%D0%B0.jpg?uselang=ru
              - img [ref=e416]
            - generic [ref=e417]:
              - text: Жительница
              - link "Екатеринбурга" [ref=e418] [cursor=pointer]:
                - /url: /wiki/%D0%95%D0%BA%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%BD%D0%B1%D1%83%D1%80%D0%B3
              - text: оставила надпись «Козёл» на стекле автомобиля соседа, из-за которого не могла выехать со двора. 2019 год
          - paragraph [ref=e419]:
            - text: Среди женщин весьма распространена пословица «Любовь зла — полюбишь и козла», где слово «козёл» характеризует подлое и развратное существо. По смыслу к ней примыкает и выражение «все мужики — козлы»
            - superscript [ref=e420]:
              - link "[11]" [ref=e421] [cursor=pointer]:
                - /url: "#cite_note-:0-11"
            - text: .
          - paragraph [ref=e422]:
            - text: Фразеологизм «Отставной козы барабанщик», означающий человека без определённых занятий, влачащего жалкое существование, связан с традициями русских
            - link "балаганов" [ref=e423] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B0%D0%BB%D0%B0%D0%B3%D0%B0%D0%BD
            - text: XIX века, где часто выступал
            - link "шут" [ref=e424] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D1%83%D1%82
            - text: в маске козы, а публику на представление сзывал
            - link "барабанщик" [ref=e425] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B0%D1%80%D0%B0%D0%B1%D0%B0%D0%BD%D1%89%D0%B8%D0%BA
            - text: (как правило —
            - link "отставной" [ref=e426] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%82%D1%81%D1%82%D0%B0%D0%B2%D0%BA%D0%B0
            - text: военный музыкант, оставшийся без средств)
            - superscript [ref=e427]:
              - link "[11]" [ref=e428] [cursor=pointer]:
                - /url: "#cite_note-:0-11"
            - text: .
          - paragraph [ref=e429]:
            - text: По другой версии этот термин происходит от турецкого «kasap» — «мясник», что первоначально относилось к русским пехотинцам XVI—XVII вв. и было обусловлено их обычным вооружением того времени —
            - link "бердышами" [ref=e430] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D1%80%D0%B4%D1%8B%D1%88
            - superscript [ref=e431]:
              - link "[12]" [ref=e432] [cursor=pointer]:
                - /url: "#cite_note-12"
            - text: .
          - paragraph [ref=e433]:
            - text: Словосочетание «забить козла» стало обозначением партии в
            - link "домино" [ref=e434] [cursor=pointer]:
              - /url: /wiki/%D0%94%D0%BE%D0%BC%D0%B8%D0%BD%D0%BE
            - superscript [ref=e435]:
              - link "[11]" [ref=e436] [cursor=pointer]:
                - /url: "#cite_note-:0-11"
            - text: .
