            - text: ","
            - link "молоко" [ref=e352] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D1%8C%D0%B5_%D0%BC%D0%BE%D0%BB%D0%BE%D0%BA%D0%BE
            - text: ","
            - link "мех, шерсть и кожа" [ref=e353] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D0%BB%D0%B8%D0%BD%D0%B0
            - text: ". По направлению продуктивности породы коз делятся на типы: молочные, шёрстные, пуховые, молочно-мясо-шёрстные."
          - paragraph [ref=e354]:
            - link "Ангорская коза" [ref=e355] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BE%D1%80%D1%81%D0%BA%D0%B0%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0
            - text: разводится для получения шерсти.
            - link "Кашмирская коза" [ref=e356] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D1%88%D0%BC%D0%B8%D1%80%D1%81%D0%BA%D0%B0%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0
            - text: и
            - link "Оренбургская коза" [ref=e357] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D1%80%D0%B5%D0%BD%D0%B1%D1%83%D1%80%D0%B3%D1%81%D0%BA%D0%B0%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0
            - text: разводятся для пуха. В США некоторые хозяйства разводят
            - link "обморочных коз" [ref=e358] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%B1%D0%BC%D0%BE%D1%80%D0%BE%D1%87%D0%BD%D0%B0%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0
            - text: .
          - paragraph [ref=e359]:
            - text: Удой обычно составляет 450—550 кг молока жирностью 3,8—4,5 % за
            - link "лактацию" [ref=e360] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D0%BA%D1%82%D0%B0%D1%86%D0%B8%D1%8F
            - superscript [ref=e361]:
              - link "[3]" [ref=e362] [cursor=pointer]:
                - /url: "#cite_note-КНЭ-3"
            - text: (в среднем 3—4, иногда 6—7 литров за удой
            - superscript [ref=e363]:
              - link "[9]" [ref=e364] [cursor=pointer]:
                - /url: "#cite_note-9"
            - text: ). Настриг шерсти с козлов — 4—6 кг, с маток — 3—5 кг. Длина состригаемой шерсти составляет 15—18 см. Начёс пуха — 0,2—0,5 кг. Срок хозяйственного использования животного обычно достигает 7—8 лет. Из козьих шкур производят кожу высокой выделки —
            - link "сафьян" [ref=e365] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B0%D1%84%D1%8C%D1%8F%D0%BD
            - text: ","
            - link "шевро" [ref=e366] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D0%B2%D1%80%D0%BE
            - superscript [ref=e367]:
              - link "[3]" [ref=e368] [cursor=pointer]:
                - /url: "#cite_note-КНЭ-3"
            - text: .
          - generic [ref=e369]:
            - heading "Вред природным экосистемам" [level=2] [ref=e370]: Вред природным экосистемам
            - generic [ref=e371]:
              - text: "["
              - link "править" [ref=e372] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%BE%D0%BC%D0%B0%D1%88%D0%BD%D1%8F%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0&veaction=edit&section=5
              - text: "|"
              - link "править код" [ref=e373] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%BE%D0%BC%D0%B0%D1%88%D0%BD%D1%8F%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0&action=edit&section=5
              - text: "]"
          - paragraph [ref=e374]:
            - text: Коза домашняя включена в
            - link "список самых опасных инвазивных видов" [ref=e375] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BF%D0%B8%D1%81%D0%BE%D0%BA_%D1%81%D0%B0%D0%BC%D1%8B%D1%85_%D0%BE%D0%BF%D0%B0%D1%81%D0%BD%D1%8B%D1%85_%D0%B8%D0%BD%D0%B2%D0%B0%D0%B7%D0%B8%D0%B2%D0%BD%D1%8B%D1%85_%D0%B2%D0%B8%D0%B4%D0%BE%D0%B2
            - text: по версии
            - link "Международного союза охраны природы" [ref=e376] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B5%D0%B6%D0%B4%D1%83%D0%BD%D0%B0%D1%80%D0%BE%D0%B4%D0%BD%D1%8B%D0%B9_%D1%81%D0%BE%D1%8E%D0%B7_%D0%BE%D1%85%D1%80%D0%B0%D0%BD%D1%8B_%D0%BF%D1%80%D0%B8%D1%80%D0%BE%D0%B4%D1%8B
            - text: . На многих островах, где отсутствуют крупные травоядные животные, поселение коз резко негативно сказывается на общем биоразнообразии. Козы поедают широкий спектр растений, влияя на количественный состав природных растительных сообществ. Вследствие этого происходит увеличение распространения почвенной эрозии, сокращение численности слабо конкурентных местных травоядных.
          - paragraph [ref=e377]:
            - text: С целью восстановления природных сообществ популяции коз были искоренены примерно со 120 мелких островов, куда ранее они были завезены. Крупнейшие из таких островов —
            - link "Ланаи" [ref=e378] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D0%BD%D0%B0%D0%B8
            - text: (Гавайские острова),
            - link "Сан-Клементе" [ref=e379] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B0%D0%BD-%D0%9A%D0%BB%D0%B5%D0%BC%D0%B5%D0%BD%D1%82%D0%B5_(%D0%BE%D1%81%D1%82%D1%80%D0%BE%D0%B2)
            - text: (острова Чаннел, США),
            - link "Пинта" [ref=e380] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B8%D0%BD%D1%82%D0%B0_(%D0%BE%D1%81%D1%82%D1%80%D0%BE%D0%B2)
            - text: (Галапагосские острова, Эквадор),
            - link "Рауль" [ref=e381] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D0%B0%D1%83%D0%BB%D1%8C_(%D0%BE%D1%81%D1%82%D1%80%D0%BE%D0%B2)
            - text: (острова Кермадек, Новая Зеландия).
          - paragraph [ref=e382]:
            - text: Для более эффективного истребления коз на островах используются охота с вертолёта (при большой численности коз), специально обученные собаки (при небольшой численности травоядных и развитой растительности), а также стерильные козы с радиотелеметрическими ошейниками (для обнаружения последних коз на острове)
            - superscript [ref=e383]:
              - link "[10]" [ref=e384] [cursor=pointer]:
                - /url: "#cite_note-10"
            - text: .
          - generic [ref=e385]:
            - heading "Козы в мифологии и культуре" [level=2] [ref=e386]: Козы в мифологии и культуре
            - generic [ref=e387]:
