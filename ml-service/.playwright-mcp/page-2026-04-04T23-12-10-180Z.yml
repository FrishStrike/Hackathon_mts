              - text: "]"
          - figure "Козлёнок" [ref=e248]:
            - link [ref=e249] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Domestic_goat_kid_in_capeweed.jpg?uselang=ru
              - img [ref=e250]
            - generic [ref=e251]: Козлёнок
          - paragraph [ref=e252]:
            - text: Живая масса козлов составляет 60—65 кг, маток 40—60 кг
            - superscript [ref=e253]:
              - link "[3]" [ref=e254] [cursor=pointer]:
                - /url: "#cite_note-КНЭ-3"
            - text: .
          - paragraph [ref=e255]:
            - text: У большинства
            - link "самцов" [ref=e256] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B0%D0%BC%D0%B5%D1%86
            - text: и
            - link "самок" [ref=e257] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B0%D0%BC%D0%BA%D0%B0
            - text: есть
            - link "борода" [ref=e258] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%BE%D1%80%D0%BE%D0%B4%D0%B0
            - text: ", а тело покрыто прямой шерстью. Её длина и качество зависят от породы. Например, у"
            - link "ангорских коз" [ref=e259] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BE%D1%80%D1%81%D0%BA%D0%B0%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0
            - link "шерсть" [ref=e260] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D1%81%D1%82%D1%8C
            - text: длинная и шелковистая, а у кашмирских славится толстым пуховым подшёрстком. Масть варьирует от чисто-белой до тёмно-бурой, чёрной и пёстрой.
            - link "Рога" [ref=e261] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D0%BE%D0%B3
            - text: при основании сжатые с боков, загнуты назад и усажены спереди поперечными валиками.
          - figure "Козлёнок, сосущий материнское вымя" [ref=e262]:
            - link [ref=e263] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Suckling_goat.jpg?uselang=ru
              - img [ref=e264]
            - generic [ref=e265]: Козлёнок, сосущий материнское вымя
          - paragraph [ref=e266]:
            - text: Питаются козы
            - link "травой" [ref=e267] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D1%80%D0%B0%D0%B2%D0%B0
            - text: и молодыми побегами деревьев и кустарников. Они быстро поглощают большое количество корма, а в промежутках между едой пережёвывают жвачку. Как и у прочих
            - link "жвачных" [ref=e268] [cursor=pointer]:
              - /url: /wiki/%D0%96%D0%B2%D0%B0%D1%87%D0%BD%D1%8B%D0%B5_%D0%B6%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D1%8B%D0%B5
            - text: ", проглоченная пища накапливается в одном из отделов желудка —"
            - link "рубце" [ref=e269] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D1%83%D0%B1%D0%B5%D1%86_(%D0%BE%D1%80%D0%B3%D0%B0%D0%BD_%D0%BF%D0%B8%D1%89%D0%B5%D0%B2%D0%B0%D1%80%D0%B5%D0%BD%D0%B8%D1%8F)
            - text: ", где частично переваривается и образует комок жвачки, которая отрыгивается и дожёвывается во рту. Коза очень неприхотлива и способна выживать в местах, где другой скот страдал бы от голода. Она может переносить сильные морозы и жару, но плохо приспособлена к сырому климату. Оптимальные условия коза находит в полузасушливых районах."
          - paragraph [ref=e270]: Коза — нетребовательное животное, довольствуется часто очень скудными пастбищами. Козы прекрасно лазают, могут пастись в местах, недоступных для другого скота. Продолжительность жизни 9—10 лет, максимально 17 лет; средний срок хозяйственного использования 7—8 лет.
          - paragraph [ref=e271]:
            - link "Случка" [ref=e272] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BB%D1%83%D1%87%D0%BA%D0%B0
            - text: обычно проводится раз в год, причём один козёл может покрыть стадо из 30—50 самок. После
            - link "беременности" [ref=e273] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D1%80%D0%B5%D0%BC%D0%B5%D0%BD%D0%BD%D0%BE%D1%81%D1%82%D1%8C
            - text: ", длящейся 21—23 недели, рождается обычно пара козлят, хотя нередко и большее их число в помёте (до пяти). Они появляются на свет зрячими, с хорошо развитым шёрстным покровом и спустя несколько часов уже резво скачут."
          - generic [ref=e274]:
            - heading "Одомашнивание (доместикация) коз" [level=3] [ref=e275]: Одомашнивание (доместикация) коз
            - generic [ref=e276]:
              - text: "["
              - link "править" [ref=e277] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%BE%D0%BC%D0%B0%D1%88%D0%BD%D1%8F%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0&veaction=edit&section=2
              - text: "|"
              - link "править код" [ref=e278] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%BE%D0%BC%D0%B0%D1%88%D0%BD%D1%8F%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0&action=edit&section=2
              - text: "]"
          - paragraph [ref=e279]:
            - text: Козы были одомашнены ок. 11 тысяч лет назад, согласно последним археологическим данным. Регион доместикации —
            - link "Плодородный полумесяц" [ref=e280] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BB%D0%BE%D0%B4%D0%BE%D1%80%D0%BE%D0%B4%D0%BD%D1%8B%D0%B9_%D0%BF%D0%BE%D0%BB%D1%83%D0%BC%D0%B5%D1%81%D1%8F%D1%86
            - text: ","
            - link "Передняя Азия" [ref=e281] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B5%D1%80%D0%B5%D0%B4%D0%BD%D1%8F%D1%8F_%D0%90%D0%B7%D0%B8%D1%8F
            - text: . При этом одомашнивание произошло в трёх регионах Плодородного Полумесяца — западном, восточном и южном, независимо друг от друга и шло параллельно. В дальнейшем, при развитии торговли и движения населения в регионе, различия в этих трёх видах первых коз свелись к нулю. Согласно анализу ядерного генома, также подтверждается, что единого предка у современных домашних коз нет, в основе современных животных лежат три древних вида коз. Были проанализированы сначала дикие, древние популяции коз и исследования выявили, что разделение на генном уровне произошло ранее 47 тысяч лет назад. Исследования доказали, что доместикация проводилась разными популяциями людей эпохи неолита. Различия в генетике древних коз имеют прямое соотношение с расхождением в генетике земледельцев, живших в тот период на Ближнем востоке и также разделившихся на две ветви — анатолийские и иранские.
          - paragraph [ref=e282]:
            - text: Современные виды европейских коз генетически близки к козам периода неолита с Запада Ближнего Востока. Современные козы в Восточной Азии ведут генетику от популяции древних коз с Востока Плодородного полумесяца. Современные африканские козы наиболее близки к южной древней генетической линии коз —
            - link "Левант" [ref=e283] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B5%D0%B2%D0%B0%D0%BD%D1%82
            - text: .
          - paragraph [ref=e284]:
            - text: Дикий предок коз —
            - link "бородатый или безоаровый козёл" [ref=e285] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D0%B7%D0%BE%D0%B0%D1%80%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BA%D0%BE%D0%B7%D1%91%D0%BB
            - text: — обитатель тех же областей, что и
            - link "муфлон" [ref=e286] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D1%83%D1%84%D0%BB%D0%BE%D0%BD
            - text: . В ходе подробного исследования генома диких, ископаемых останков безоарового козла и геномов ископаемых коз периода неолита найдены признаки планомерной селекции, при которой животных отбирали по следующим признакам — телосложение, метаболизм, пигментация, репродукция, молочность
            - superscript [ref=e287]:
              - link "[4]" [ref=e288] [cursor=pointer]:
                - /url: "#cite_note-4"
            - superscript [ref=e289]:
              - link "[5]" [ref=e290] [cursor=pointer]:
                - /url: "#cite_note-5"
            - text: .
