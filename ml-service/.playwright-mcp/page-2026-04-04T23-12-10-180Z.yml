              - text: —
              - link "Безоаровый козёл" [ref=e311] [cursor=pointer]:
                - /url: /wiki/%D0%91%D0%B5%D0%B7%D0%BE%D0%B0%D1%80%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BA%D0%BE%D0%B7%D1%91%D0%BB
              - text: — распространён от
              - link "Турции" [ref=e312] [cursor=pointer]:
                - /url: /wiki/%D0%A2%D1%83%D1%80%D1%86%D0%B8%D1%8F
              - text: до
              - link "Афганистана" [ref=e313] [cursor=pointer]:
                - /url: /wiki/%D0%90%D1%84%D0%B3%D0%B0%D0%BD%D0%B8%D1%81%D1%82%D0%B0%D0%BD
              - text: . Дикий предок домашней козы, в настоящее время признается отдельным видом
              - generic [ref=e314]:
                - text: Capra aegagrus
                - superscript [ref=e315]:
                  - link "[7]" [ref=e316] [cursor=pointer]:
                    - /url: "#cite_note-life-7"
              - text: .
            - listitem [ref=e317]:
              - link "Capra hircus chialtanensis" [ref=e319] [cursor=pointer]:
