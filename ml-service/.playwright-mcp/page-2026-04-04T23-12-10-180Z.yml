              - link "править" [ref=e388] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%BE%D0%BC%D0%B0%D1%88%D0%BD%D1%8F%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0&veaction=edit&section=6
