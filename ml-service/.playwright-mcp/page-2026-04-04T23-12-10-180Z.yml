            - text: до
            - link "Средней Азии" [ref=e235] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D1%80%D0%B5%D0%B4%D0%BD%D1%8F%D1%8F_%D0%90%D0%B7%D0%B8%D1%8F
            - text: .
          - paragraph [ref=e236]:
            - text: Секвенирование митохондриальных и ядерных последовательностей ДНК от 83 древних коз (51 с геномным охватом) от древних образцов возрастом от сотен до тысяч лет выявило наличие в древних образцах митохондриальных гаплогрупп A, B, C, D и G. Палеолитические образцы диких коз попадают исключительно в рано отошедшие клады T (выявлена у диких
            - link "козлиных" [ref=e237] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D0%BB%D0%B8%D0%BD%D1%8B%D0%B5
            - text: и
            - link "западнокавказского тура" [ref=e238] [cursor=pointer]:
              - /url: /wiki/Capra_caucasica
            - text: ) и F (выявлена у безоарового козла и у небольшого количества сицилийских коз). В более поздних постнеолитических образцах митохондриальная гаплогруппа A становится доминирующей во всём мире
            - superscript [ref=e239]:
              - link "[1]" [ref=e240] [cursor=pointer]:
                - /url: "#cite_note-1"
            - text: . Два гена, связанных с одомашниванием, появились у коз по меньшей мере от 7200 и 8100 лет назад и увеличились до высоких частот одновременно с распространением повсеместно распространённой митохондриальной гаплогруппы A
            - superscript [ref=e241]:
              - link "[2]" [ref=e242] [cursor=pointer]:
                - /url: "#cite_note-2"
            - text: .
          - generic [ref=e243]:
            - heading "Описание" [level=2] [ref=e244]: Описание
            - generic [ref=e245]:
              - text: "["
              - link "править" [ref=e246] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%BE%D0%BC%D0%B0%D1%88%D0%BD%D1%8F%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0&veaction=edit&section=1
              - text: "|"
              - link "править код" [ref=e247] [cursor=pointer]:
