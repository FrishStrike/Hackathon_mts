              - text: — обитает в
              - link "Пакистане" [ref=e321] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%B0%D0%BA%D0%B8%D1%81%D1%82%D0%B0%D0%BD
              - text: . Находится под острой угрозой исчезновения, осталось лишь 500 особей.
            - listitem [ref=e322]:
              - link "Capra hircus cretica" [ref=e324] [cursor=pointer]:
                - /url: /wiki/Capra_hircus_cretica
              - text: —
              - link "Кри-кри" [ref=e325] [cursor=pointer]:
                - /url: /wiki/%D0%9A%D1%80%D0%B8-%D0%BA%D1%80%D0%B8
              - text: — живёт на острове
              - link "Крит" [ref=e326] [cursor=pointer]:
                - /url: /wiki/%D0%9A%D1%80%D0%B8%D1%82
              - text: и сопредельных островах. Повторно одичавший подвид домашней козы
              - superscript [ref=e327]:
