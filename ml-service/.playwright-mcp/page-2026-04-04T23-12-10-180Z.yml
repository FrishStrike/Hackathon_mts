          - note [ref=e394]:
            - text: "Основная статья:"
            - link "Коза в мифологии" [ref=e395] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D0%B0_%D0%B2_%D0%BC%D0%B8%D1%84%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D0%B8
          - paragraph [ref=e396]:
            - text: Для культурных
            - link "коннотаций" [ref=e397] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%BD%D0%BD%D0%BE%D1%82%D0%B0%D1%86%D0%B8%D1%8F
            - text: оказались востребованы такие свойства коз, как
            - link "ловкость" [ref=e398] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%BE%D0%B2%D0%BA%D0%BE%D1%81%D1%82%D1%8C
            - text: ", прыгучесть, проказливость,"
            - link "любопытство" [ref=e399] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D1%8E%D0%B1%D0%BE%D0%BF%D1%8B%D1%82%D1%81%D1%82%D0%B2%D0%BE
            - text: ", своенравие, драчливость. С прыгучестью коз связано такое выражение из"
            - link "профессионального жаргона" [ref=e400] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D1%80%D0%BE%D1%84%D0%B5%D1%81%D1%81%D0%B8%D0%BE%D0%BD%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D0%B9_%D0%B6%D0%B0%D1%80%D0%B3%D0%BE%D0%BD
            - text: авиаторов, как «дать козла» (см.
            - link "Козление" [ref=e401] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D0%BB%D0%B5%D0%BD%D0%B8%D0%B5
            - text: ), описывающее случай, когда самолёт неопытного лётчика подпрыгивает при посадке. С непоседливостью — сравнение с ними детей (напр. «ах ты коза»), а в
            - link "английском языке" [ref=e402] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: слово kid (козлёнок) стало синонимом слова «ребёнок». О своенравной, хитрой козе рассказывает народная сказка «
            - link "Коза-дереза" [ref=e403] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D0%B0-%D0%B4%D0%B5%D1%80%D0%B5%D0%B7%D0%B0
            - text: ». Прозвище «козёл» весьма обидно, его связывают с такими свойствами характера, как бесчестие, низость и подлость. В криминальной среде оно означает
            - link "заключённого, открыто сотрудничающего с администрацией тюрьмы" [ref=e404] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D1%8E%D1%80%D0%B5%D0%BC%D0%BD%D1%8B%D0%B5_%D0%BA%D0%B0%D1%81%D1%82%D1%8B_%D0%B2_%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B0%D1%85_%D0%B1%D1%8B%D0%B2%D1%88%D0%B5%D0%B3%D0%BE_%D0%A1%D0%A1%D0%A1%D0%A0
            - text: ", впрочем, пишут, что в 30-50 гг. XX века так называли пассивных"
            - link "гомосексуалов" [ref=e405] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D0%BC%D0%BE%D1%81%D0%B5%D0%BA%D1%81%D1%83%D0%B0%D0%BB
            - text: (до того, как таковых стали там звать «
            - link "петухами" [ref=e406] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D1%8E%D1%80%D0%B5%D0%BC%D0%BD%D1%8B%D0%B5_%D0%BA%D0%B0%D1%81%D1%82%D1%8B_%D0%B2_%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B0%D1%85_%D0%B1%D1%8B%D0%B2%D1%88%D0%B5%D0%B3%D0%BE_%D0%A1%D0%A1%D0%A1%D0%A0#Петухи
            - text: »)
            - superscript [ref=e407]:
              - link "[11]" [ref=e408] [cursor=pointer]:
                - /url: "#cite_note-:0-11"
            - text: .
          - generic [ref=e409]:
            - heading "Фразеология" [level=3] [ref=e410]: Фразеология
