              - text: "]"
            - text: . В
            - link "Индийском обозрении" [ref=e395] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%9E%D0%B1%D0%BE%D0%B7%D1%80%D0%B5%D0%BD%D0%B8%D0%B5_%D0%98%D0%BD%D0%B4%D0%B8%D0%B8&action=edit&redlink=1
