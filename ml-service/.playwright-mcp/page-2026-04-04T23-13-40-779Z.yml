                - /url: https://en.wikipedia.org/wiki/Survey_of_India
            - text: 1846—47 годов гора именовалась Дискавери, Пик-B, Пик-H и Пик-XV.
          - generic [ref=e398]:
            - heading "Гора Эверест" [level=3] [ref=e399]: Гора Эверест
            - generic [ref=e400]:
              - text: "["
              - link "править" [ref=e401] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=2
              - text: "|"
              - link "править код" [ref=e402] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=2
              - text: "]"
          - paragraph [ref=e403]:
            - text: В британской географической сводке 1849 года была сделана попытка сохранить местные оригинальные названия, когда это было возможно (как произошло, например, с
            - link "Канченджанга" [ref=e404] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D0%BD%D1%87%D0%B5%D0%BD%D0%B4%D0%B6%D0%B0%D0%BD%D0%B3%D0%B0
            - text: и
            - link "Дхаулагири" [ref=e405] [cursor=pointer]:
              - /url: /wiki/%D0%94%D1%85%D0%B0%D1%83%D0%BB%D0%B0%D0%B3%D0%B8%D1%80%D0%B8
            - text: ). Тем не менее
            - link "Эндрю Скотт Во" [ref=e406] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%BE,_%D0%AD%D0%BD%D0%B4%D1%80%D1%8E_%D0%A1%D0%BA%D0%BE%D1%82%D1%82
            - text: ", руководитель"
            - link "геодезической" [ref=e407] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%B5%D0%BE%D0%B4%D0%B5%D0%B7%D0%B8%D1%8F
            - text: службы
            - link "Британской Индии" [ref=e408] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%80%D0%B8%D1%82%D0%B0%D0%BD%D1%81%D0%BA%D0%B0%D1%8F_%D0%98%D0%BD%D0%B4%D0%B8%D1%8F
            - text: ", утверждал, что не смог найти общепринятого местного названия, и что его поиски были затруднены непальской и тибетской политикой недопущения иностранцев. Во настаивал, что, поскольку существует множество местных названий, трудно отдать предпочтение одному из них, и поэтому он решил, что Пик-XV должен быть назван в честь британского геодезиста"
            - link "Джорджа Эвереста" [ref=e409] [cursor=pointer]:
              - /url: /wiki/%D0%AD%D0%B2%D0%B5%D1%80%D0%B5%D1%81%D1%82,_%D0%94%D0%B6%D0%BE%D1%80%D0%B4%D0%B6
            - text: ", его предшественника на посту генерального геодезиста Индии"
            - superscript [ref=e410]:
              - link "[3]" [ref=e411] [cursor=pointer]:
                - /url: "#cite_note-everest_bwp70-3"
            - superscript [ref=e412]:
              - link "[4]" [ref=e413] [cursor=pointer]:
                - /url: "#cite_note-ReferenceA-4"
            - superscript [ref=e414]:
              - link "[5]" [ref=e415] [cursor=pointer]:
                - /url: "#cite_note-rgs1857-5"
            - text: . Сам Эверест был против такой чести и заявил
            - link "Королевскому географическому обществу" [ref=e416] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D1%80%D0%BE%D0%BB%D0%B5%D0%B2%D1%81%D0%BA%D0%BE%D0%B5_%D0%B3%D0%B5%D0%BE%D0%B3%D1%80%D0%B0%D1%84%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%BE%D0%B5_%D0%BE%D0%B1%D1%89%D0%B5%D1%81%D1%82%D0%B2%D0%BE
            - text: в 1857 году, что название «Эверест» физически не может быть написано на
            - link "хинди" [ref=e417] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%B8%D0%BD%D0%B4%D0%B8
            - text: и не может быть произнесено
            - link "коренными жителями Индии" [ref=e418] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%BD%D0%B4%D0%B8%D0%B9%D1%86%D1%8B
            - text: . Несмотря на возражения Эвереста, предложенное Во название победило, и Королевское географическое общество официально приняло название «Эверест» в 1865 году
            - superscript [ref=e419]:
              - link "[3]" [ref=e420] [cursor=pointer]:
                - /url: "#cite_note-everest_bwp70-3"
            - superscript [ref=e421]:
              - link "[6]" [ref=e422] [cursor=pointer]:
                - /url: "#cite_note-6"
            - text: . При этом сам Джордж Эверест не только не был первооткрывателем Эвереста — за свою жизнь он даже никогда не видел гору, а современное произношение Эвереста (
            - link / ˈ ɛ v ər ɪ s t/ [ref=e425] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B0%D0%B1%D0%BB%D0%B8%D1%86%D0%B0_%D0%9C%D0%A4%D0%90_%D0%B4%D0%BB%D1%8F_%D0%B0%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%BE%D0%B3%D0%BE_%D1%8F%D0%B7%D1%8B%D0%BA%D0%B0
            - text: )
            - superscript [ref=e426]:
              - link "[7]" [ref=e427] [cursor=pointer]:
                - /url: "#cite_note-7"
            - text: отличается от произношения фамилии сэра Джорджа (
            - link / ˈ iː v r ɪ s t/ [ref=e430] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B0%D0%B1%D0%BB%D0%B8%D1%86%D0%B0_%D0%9C%D0%A4%D0%90_%D0%B4%D0%BB%D1%8F_%D0%B0%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%BE%D0%B3%D0%BE_%D1%8F%D0%B7%D1%8B%D0%BA%D0%B0
            - text: ", Иврест)"
            - superscript [ref=e431]:
              - link "[8]" [ref=e432] [cursor=pointer]:
                - /url: "#cite_note-8"
            - text: .
          - generic [ref=e433]:
            - heading "Джомолунгма" [level=3] [ref=e434]: Джомолунгма
