              - text: "]"
          - note [ref=e1100]:
            - text: "Основная статья:"
            - link "Лавина на Джомолунгме (2014)" [ref=e1101] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D0%B2%D0%B8%D0%BD%D0%B0_%D0%BD%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B5_(2014)
          - paragraph [ref=e1102]:
            - text: 18 апреля 2014 года, в результате
            - link "схода лавины" [ref=e1103] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B0%D0%B2%D0%B8%D0%BD%D0%B0_%D0%BD%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B5_(2014)
            - text: на высоте примерно 5800 метров (чуть ниже
            - link "первого высотного лагеря" [ref=e1104] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B0%D0%B7%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BB%D0%B0%D0%B3%D0%B5%D1%80%D1%8C_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%8B
            - text: ), на склоне Джомолунгмы погибли как минимум 13 шерпов-проводников. 21 апреля поисково-спасательная операция была прекращена. По официальным данным правительства Непала, в лавине 13 человек погибли, 3 человека пропали без вести (они также считаются погибшими)
            - superscript [ref=e1105]:
              - link "[71]" [ref=e1106] [cursor=pointer]:
                - /url: "#cite_note-71"
            - superscript [ref=e1107]:
              - link "[72]" [ref=e1108] [cursor=pointer]:
                - /url: "#cite_note-72"
            - superscript [ref=e1109]:
              - link "[73]" [ref=e1110] [cursor=pointer]:
                - /url: "#cite_note-73"
            - text: .
          - generic [ref=e1111]:
            - heading "Тела погибших" [level=3] [ref=e1112]: Тела погибших
            - generic [ref=e1113]:
              - text: "["
              - link "править" [ref=e1114] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=15
              - text: "|"
              - link "править код" [ref=e1115] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=15
              - text: "]"
          - paragraph [ref=e1116]:
            - text: Тела погибших на высоких участках зачастую остаются неубранными из-за трудностей, связанных с их эвакуацией. На некоторых участках восходители вынуждены переступать через мёртвые тела
            - superscript [ref=e1117]:
              - link "[74]" [ref=e1118] [cursor=pointer]:
                - /url: "#cite_note-bbc_25_May_2016-74"
            - text: ", некоторые из которых даже служат своеобразными ориентирами. Так, тело индийского альпиниста Цеванга Палжора, погибшего в 1996 году, отмечает высоту в 8500 метров и даже имеет своё название — «"
            - link "Зелёные ботинки" [ref=e1119] [cursor=pointer]:
              - /url: /wiki/%D0%97%D0%B5%D0%BB%D1%91%D0%BD%D1%8B%D0%B5_%D0%B1%D0%BE%D1%82%D0%B8%D0%BD%D0%BA%D0%B8
            - text: » (по ярко-зелёной обуви погибшего).
          - paragraph [ref=e1120]:
            - text: В целом, существует мнение, что усыпанные трупами склоны Эвереста стали всё больше напоминать
            - link "кладбище" [ref=e1121] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BB%D0%B0%D0%B4%D0%B1%D0%B8%D1%89%D0%B5
            - superscript [ref=e1122]:
              - link "[74]" [ref=e1123] [cursor=pointer]:
                - /url: "#cite_note-bbc_25_May_2016-74"
            - text: .
          - generic [ref=e1124]:
            - heading "Горнолыжные спуски" [level=3] [ref=e1125]: Горнолыжные спуски
            - generic [ref=e1126]:
              - text: "["
              - link "править" [ref=e1127] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=16
              - text: "|"
              - link "править код" [ref=e1128] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=16
              - text: "]"
          - list [ref=e1129]:
            - listitem [ref=e1130]:
              - text: Первая попытка спуститься с вершины посредством
              - link "горных лыж" [ref=e1131] [cursor=pointer]:
                - /url: /wiki/%D0%93%D0%BE%D1%80%D0%BD%D1%8B%D0%B5_%D0%BB%D1%8B%D0%B6%D0%B8
              - text: была предпринята в 1969 году японцем Миура. Она закончилась не так, как он планировал; Миура чуть не свалился в пропасть, но чудом сумел спастись и остался жив.
            - listitem [ref=e1132]: В 1992 году по склону Эвереста на лыжах спустился французский лыжник Пьер Тардевель. Он съехал с южной вершины, расположенной на высоте 8571 м, и преодолел 3 км за 3 часа. Через 4 года итальянский лыжник Ханс Каммерландер спустился с высоты 6400 м по северному склону. Он был у подножия через 17 часов.
            - listitem [ref=e1133]: В 1998 году француз Кирил Десремо совершил первый спуск с вершины на сноуборде.
            - listitem [ref=e1134]:
              - text: В 2000 году словенец Даво Карничар съехал с Джомолунгмы на горных лыжах
              - superscript [ref=e1135]:
                - link "[46]" [ref=e1136] [cursor=pointer]:
                  - /url: "#cite_note-autogenerated3-46"
              - text: .
            - listitem [ref=e1137]:
              - text: В 2001 году французский сноубордист
              - link "Марко Сиффреди" [ref=e1138] [cursor=pointer]:
                - /url: /wiki/%D0%A1%D0%B8%D1%84%D1%84%D1%80%D0%B5%D0%B4%D0%B8,_%D0%9C%D0%B0%D1%80%D0%BA%D0%BE
              - text: спустился с вершины по
              - link "кулуару Нортона" [ref=e1139] [cursor=pointer]:
                - /url: /wiki/%D0%9A%D1%83%D0%BB%D1%83%D0%B0%D1%80_%D0%9D%D0%BE%D1%80%D1%82%D0%BE%D0%BD%D0%B0
              - text: . В следующем году он пропал при спуске с
