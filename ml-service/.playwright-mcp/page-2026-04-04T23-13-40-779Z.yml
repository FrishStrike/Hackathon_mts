              - link "править" [ref=e436] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=3
