            - text: в составе
            - link "Ван Фучжоу" [ref=e803] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%92%D0%B0%D0%BD_%D0%A4%D1%83%D1%87%D0%B6%D0%BE%D1%83&action=edit&redlink=1
            - superscript [ref=e804]:
              - link "[кит.]" [ref=e805] [cursor=pointer]:
                - /url: https://zh.wikipedia.org/wiki/%E7%8E%8B%E5%AF%8C%E6%B4%B2
            - text: ","
            - link "Цюй Иньхуа" [ref=e807] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%A6%D1%8E%D0%B9_%D0%98%D0%BD%D1%8C%D1%85%D1%83%D0%B0&action=edit&redlink=1
            - superscript [ref=e808]:
              - link "[кит.]" [ref=e809] [cursor=pointer]:
                - /url: https://zh.wikipedia.org/wiki/%E5%B1%88%E9%93%B6%E5%8D%8E
            - text: и тибетца
            - link "Гоньпо" [ref=e811] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%93%D0%BE%D0%BD%D1%8C%D0%BF%D0%BE&action=edit&redlink=1
