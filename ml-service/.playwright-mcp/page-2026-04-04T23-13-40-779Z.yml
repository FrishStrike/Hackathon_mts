            - text: .
          - paragraph [ref=e818]:
            - text: 1 мая 1963 года Джим Уиттакер (
            - link "англ." [ref=e819] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Jim Whittaker) стал первым американцем, ступившим на вершину Эвереста. Три недели спустя вторая группа из той же американской экспедиции совершила первопрохождение ранее непокоренного Западного ребра Эвереста
            - superscript [ref=e820]:
              - link "[35]" [ref=e821] [cursor=pointer]:
                - /url: "#cite_note-35"
            - text: .
          - figure "Японка Дзюнко Табэи первой из женщин покорила Джомолунгму" [ref=e822]:
            - link [ref=e823] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Junko_Tabei,_Jaapani_alpinist_85.jpg?uselang=ru
              - img [ref=e824]
            - generic [ref=e825]:
              - text: Японка
              - link "Дзюнко Табэи" [ref=e826] [cursor=pointer]:
                - /url: /wiki/%D0%A2%D0%B0%D0%B1%D1%8D%D0%B8,_%D0%94%D0%B7%D1%8E%D0%BD%D0%BA%D0%BE
              - text: первой из женщин покорила Джомолунгму
          - paragraph [ref=e827]:
            - text: Весной 1975 года Эверест впервые штурмует женская экспедиция. Первой женщиной, покорившей Джомолунгму, стала японская альпинистка
            - link "Дзюнко Табэи" [ref=e828] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B0%D0%B1%D1%8D%D0%B8,_%D0%94%D0%B7%D1%8E%D0%BD%D0%BA%D0%BE
            - text: (16 мая 1975 года). Первой
            - link "европейкой" [ref=e829] [cursor=pointer]:
              - /url: /wiki/%D0%95%D0%B2%D1%80%D0%BE%D0%BF%D0%B0
            - text: ", поднявшейся на вершину, стала полька"
            - link "Ванда Руткевич" [ref=e830] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D1%83%D1%82%D0%BA%D0%B5%D0%B2%D0%B8%D1%87,_%D0%92%D0%B0%D0%BD%D0%B4%D0%B0
            - text: (1978). Первой советской альпинисткой, достигшей вершины, стала
            - link "Екатерина Иванова" [ref=e831] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%B2%D0%B0%D0%BD%D0%BE%D0%B2%D0%B0,_%D0%95%D0%BA%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%BD%D0%B0_%D0%9D%D0%B8%D0%BA%D0%BE%D0%BB%D0%B0%D0%B5%D0%B2%D0%BD%D0%B0
            - text: (1990).
          - paragraph [ref=e832]:
            - text: 24 сентября 1975 года
            - link "британская экспедиция" [ref=e833] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%80%D0%B8%D1%82%D0%B0%D0%BD%D1%81%D0%BA%D0%B0%D1%8F_%D1%8D%D0%BA%D1%81%D0%BF%D0%B5%D0%B4%D0%B8%D1%86%D0%B8%D1%8F_%D0%BD%D0%B0_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%83_(1975)
            - text: под руководством
            - link "Криса Бонингтона" [ref=e834] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%BE%D0%BD%D0%B8%D0%BD%D0%B3%D1%82%D0%BE%D0%BD,_%D0%9A%D1%80%D0%B8%D1%81
            - text: впервые прошла юго-западную стену Эвереста
            - superscript [ref=e835]:
              - link "[36]" [ref=e836] [cursor=pointer]:
                - /url: "#cite_note-36"
            - text: . На вершину поднялись
            - link "Даг Скотт" [ref=e837] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BA%D0%BE%D1%82%D1%82,_%D0%94%D0%B0%D0%B3
            - text: и
            - link "Дугал Хэстон" [ref=e838] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D1%8D%D1%81%D1%82%D0%BE%D0%BD,_%D0%94%D1%83%D0%B3%D0%B0%D0%BB
            - text: . Через два дня, 26 сентября
            - link "Питер Бордман" [ref=e839] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%BE%D1%80%D0%B4%D0%BC%D0%B0%D0%BD,_%D0%9F%D0%B8%D1%82%D0%B5%D1%80
            - text: и шерп Петемба (
            - link "англ." [ref=e840] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: Pertemba) повторили их путь на вершину. Следовавший за ними
            - link "Мик Берк" [ref=e841] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D1%80%D0%BA,_%D0%9C%D0%B8%D0%BA
            - text: пропал без вести
            - superscript [ref=e842]:
              - link "[37]" [ref=e843] [cursor=pointer]:
                - /url: "#cite_note-37"
            - text: .
          - paragraph [ref=e844]:
            - text: В последующие годы, снова по классическому пути первовосходителей, на Эверест поднимаются альпинисты
            - link "Великобритании" [ref=e845] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%B5%D0%BB%D0%B8%D0%BA%D0%BE%D0%B1%D1%80%D0%B8%D1%82%D0%B0%D0%BD%D0%B8%D1%8F
            - text: ","
            - link "Непала" [ref=e846] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB
            - text: ","
            - link "США" [ref=e847] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BE%D0%B5%D0%B4%D0%B8%D0%BD%D1%91%D0%BD%D0%BD%D1%8B%D0%B5_%D0%A8%D1%82%D0%B0%D1%82%D1%8B_%D0%90%D0%BC%D0%B5%D1%80%D0%B8%D0%BA%D0%B8
            - text: ","
            - link "Южной Кореи" [ref=e848] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D0%B5%D1%81%D0%BF%D1%83%D0%B1%D0%BB%D0%B8%D0%BA%D0%B0_%D0%9A%D0%BE%D1%80%D0%B5%D1%8F
            - text: ","
            - link "Австрии" [ref=e849] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%B2%D1%81%D1%82%D1%80%D0%B8%D1%8F
            - text: и
            - link "ФРГ" [ref=e850] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%B5%D1%80%D0%BC%D0%B0%D0%BD%D0%B8%D1%8F
            - text: ", причём"
            - link "Райнхольд Месснер" [ref=e851] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B5%D1%81%D1%81%D0%BD%D0%B5%D1%80,_%D0%A0%D0%B0%D0%B9%D0%BD%D1%85%D0%BE%D0%BB%D1%8C%D0%B4
            - text: и Питер Хабелер достигают вершины, не пользуясь кислородом на протяжении всего штурма. В составе этих экспедиций ещё двум женщинам — польке Ванде Руткевич (1978) и немке Ханнелоре Шмац (погибла при спуске) — удалось покорить Эверест. Французы Ж. Афанасьеф и Н. Жэжэ с 8 км до 6,5 км спустились на лыжах
            - superscript [ref=e852]:
              - link "[31]" [ref=e853] [cursor=pointer]:
                - /url: "#cite_note-autogenerated1-31"
            - text: .
          - paragraph [ref=e854]:
            - text: Новое слово в покорении вершины удалось сказать полякам под руководством
            - link "Анджея Завады" [ref=e856] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%97%D0%B0%D0%B2%D0%B0%D0%B4%D0%B0,_%D0%90%D0%BD%D0%B4%D0%B6%D0%B5%D0%B9&action=edit&redlink=1
            - superscript [ref=e857]:
              - link "[пол.]" [ref=e858] [cursor=pointer]:
                - /url: https://pl.wikipedia.org/wiki/Andrzej_Zawada
            - text: . Первыми в мире они поднялись на вершину Эвереста зимой. Это восхождение было совершено
            - link "Лешеком Цихы" [ref=e860] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%A6%D0%B8%D1%85%D1%8B,_%D0%9B%D0%B5%D1%88%D0%B5%D0%BA&action=edit&redlink=1
            - superscript [ref=e861]:
              - link "[пол.]" [ref=e862] [cursor=pointer]:
                - /url: https://pl.wikipedia.org/wiki/Leszek_Cichy
            - text: и
            - link "Кшиштофом Велицким" [ref=e863] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%B5%D0%BB%D0%B8%D1%86%D0%BA%D0%B8%D0%B9,_%D0%9A%D1%88%D0%B8%D1%88%D1%82%D0%BE%D1%84
            - text: . Восхождение было осуществлено по юго-восточному гребню при температурах ниже −50 °C в последний день срока действия разрешения местных властей на право штурма вершины
            - superscript [ref=e864]:
              - link "[38]" [ref=e865] [cursor=pointer]:
                - /url: "#cite_note-38"
            - superscript [ref=e866]:
              - link "[39]" [ref=e867] [cursor=pointer]:
                - /url: "#cite_note-_1c70f452c10cbf2d-39"
            - text: . Через несколько месяцев (весной 1980 года) поляки, руководимые тем же А. Завадой, проложили новый маршрут на Эверест. На вершину по южному
            - link "контрфорсу" [ref=e868] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%BD%D1%82%D1%80%D1%84%D0%BE%D1%80%D1%81
            - text: поднялись Анджей Чок и
            - link "Ежи Кукучка" [ref=e869] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D1%83%D0%BA%D1%83%D1%87%D0%BA%D0%B0,_%D0%95%D0%B6%D0%B8
            - superscript [ref=e870]:
              - link "[31]" [ref=e871] [cursor=pointer]:
                - /url: "#cite_note-autogenerated1-31"
            - text: .
          - figure "Рейнхольд Месснер (1985)" [ref=e872]:
            - link [ref=e873] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Reinhold_Messner_5.jpg?uselang=ru
              - img [ref=e874]
            - generic [ref=e875]:
              - link "Рейнхольд Месснер" [ref=e876] [cursor=pointer]:
                - /url: /wiki/%D0%9C%D0%B5%D1%81%D1%81%D0%BD%D0%B5%D1%80,_%D0%A0%D0%B0%D0%B9%D0%BD%D1%85%D0%BE%D0%BB%D1%8C%D0%B4
              - text: (1985)
          - paragraph [ref=e877]:
            - text: Как правило, все альпинисты поднимаются на Эверест в кислородных масках. На высоте 8 км воздух разрежённый, и дышать очень трудно. Первыми без кислорода достигли вершины итальянец
            - link "Рейнхольд Месснер" [ref=e878] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B5%D1%81%D1%81%D0%BD%D0%B5%D1%80,_%D0%A0%D0%B0%D0%B9%D0%BD%D1%85%D0%BE%D0%BB%D1%8C%D0%B4
            - text: и немец Питер Хабелер в 1978 году.
          - paragraph [ref=e879]:
            - text: В 1980 году Рейнхольд Месснер, на этот раз в одиночку, снова поднялся на Эверест и установил сразу несколько рекордов. Месснеру первому удалось покорить вершину в одиночку без кислорода, не прибегая к помощи высотных носильщиков. К тому же он первым решился бросить вызов Эвересту в период
            - link "муссонов" [ref=e880] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D1%83%D1%81%D1%81%D0%BE%D0%BD
            - text: и достиг цели. Кроме того, он преодолел путь от базового лагеря, находящегося на высоте 6,5 км, до вершины по новому варианту пути с Севера всего за 3 дня
            - superscript [ref=e881]:
              - link "[31]" [ref=e882] [cursor=pointer]:
                - /url: "#cite_note-autogenerated1-31"
            - text: .
          - paragraph [ref=e883]:
            - text: В мае 1982 года 11 участников
            - link "советской экспедиции альпинистов" [ref=e884] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B5%D1%80%D0%B2%D0%B0%D1%8F_%D1%81%D0%BE%D0%B2%D0%B5%D1%82%D1%81%D0%BA%D0%B0%D1%8F_%D0%B3%D0%B8%D0%BC%D0%B0%D0%BB%D0%B0%D0%B9%D1%81%D0%BA%D0%B0%D1%8F_%D1%8D%D0%BA%D1%81%D0%BF%D0%B5%D0%B4%D0%B8%D1%86%D0%B8%D1%8F
            - text: покорили Эверест, поднявшись по считавшемуся ранее непроходимым юго-западному склону, причём 2 восхождения были совершены ночью. До этого ни один из альпинистов, входивших в состав экспедиции, не поднимался выше 7,6 км. Руководитель экспедиции
            - link "Евгений Тамм" [ref=e885] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B0%D0%BC%D0%BC,_%D0%95%D0%B2%D0%B3%D0%B5%D0%BD%D0%B8%D0%B9_%D0%98%D0%B3%D0%BE%D1%80%D0%B5%D0%B2%D0%B8%D1%87
            - text: (сын лауреата Нобелевской премии по физике
            - link "Игоря Тамма" [ref=e886] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B0%D0%BC%D0%BC,_%D0%98%D0%B3%D0%BE%D1%80%D1%8C_%D0%95%D0%B2%D0%B3%D0%B5%D0%BD%D1%8C%D0%B5%D0%B2%D0%B8%D1%87
            - text: ), старший тренер
            - link "Анатолий Овчинников" [ref=e887] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%B2%D1%87%D0%B8%D0%BD%D0%BD%D0%B8%D0%BA%D0%BE%D0%B2,_%D0%90%D0%BD%D0%B0%D1%82%D0%BE%D0%BB%D0%B8%D0%B9_%D0%93%D0%B5%D0%BE%D1%80%D0%B3%D0%B8%D0%B5%D0%B2%D0%B8%D1%87
            - text: ", тренер"
            - link "Борис Романов" [ref=e888] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%A0%D0%BE%D0%BC%D0%B0%D0%BD%D0%BE%D0%B2,_%D0%91%D0%BE%D1%80%D0%B8%D1%81_%D0%A2%D0%B8%D0%BC%D0%BE%D1%84%D0%B5%D0%B5%D0%B2%D0%B8%D1%87&action=edit&redlink=1
            - text: ", капитаны штурмовых четвёрок —"
            - link "Валентин Иванов" [ref=e889] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%B2%D0%B0%D0%BD%D0%BE%D0%B2,_%D0%92%D0%B0%D0%BB%D0%B5%D0%BD%D1%82%D0%B8%D0%BD_%D0%90%D0%BD%D0%B4%D1%80%D0%B5%D0%B5%D0%B2%D0%B8%D1%87
            - text: ","
            - link "Ерванд Ильинский" [ref=e890] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%BB%D1%8C%D0%B8%D0%BD%D1%81%D0%BA%D0%B8%D0%B9,_%D0%95%D1%80%D0%B2%D0%B0%D0%BD%D0%B4_%D0%A2%D0%B8%D1%85%D0%BE%D0%BD%D0%BE%D0%B2%D0%B8%D1%87
            - text: ","
            - link "Эдуард Мысловский" [ref=e891] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D1%8B%D1%81%D0%BB%D0%BE%D0%B2%D1%81%D0%BA%D0%B8%D0%B9,_%D0%AD%D0%B4%D1%83%D0%B0%D1%80%D0%B4_%D0%92%D0%B8%D0%BA%D0%B5%D0%BD%D1%82%D1%8C%D0%B5%D0%B2%D0%B8%D1%87
            - text: . Советская экспедиция была 25-й, достигшей вершины. Первыми на вершину поднялись
            - link "Владимир Балыбердин" [ref=e892] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B0%D0%BB%D1%8B%D0%B1%D0%B5%D1%80%D0%B4%D0%B8%D0%BD,_%D0%92%D0%BB%D0%B0%D0%B4%D0%B8%D0%BC%D0%B8%D1%80_%D0%A1%D0%B5%D1%80%D0%B3%D0%B5%D0%B5%D0%B2%D0%B8%D1%87
            - text: и
            - link "Эдуард Мысловский" [ref=e893] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D1%8B%D1%81%D0%BB%D0%BE%D0%B2%D1%81%D0%BA%D0%B8%D0%B9,_%D0%AD%D0%B4%D1%83%D0%B0%D1%80%D0%B4_%D0%92%D0%B8%D0%BA%D0%B5%D0%BD%D1%82%D1%8C%D0%B5%D0%B2%D0%B8%D1%87
            - text: . Балыбердин взошёл на вершину без кислородного аппарата. Впервые ночью
            - link "Сергей Бершов" [ref=e894] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D1%80%D1%88%D0%BE%D0%B2,_%D0%A1%D0%B5%D1%80%D0%B3%D0%B5%D0%B9_%D0%98%D0%B3%D0%BE%D1%80%D0%B5%D0%B2%D0%B8%D1%87
            - text: поднялся на вершину Джомолунгмы 4 мая 1982 года в связке с
            - link "Михаилом Туркевичем" [ref=e895] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D1%83%D1%80%D0%BA%D0%B5%D0%B2%D0%B8%D1%87,_%D0%9C%D0%B8%D1%85%D0%B0%D0%B8%D0%BB_%D0%9C%D0%B8%D1%85%D0%B0%D0%B9%D0%BB%D0%BE%D0%B2%D0%B8%D1%87
            - text: . 5 мая совершили восхождение Валентин Иванов и
            - link "Сергей Ефимов" [ref=e896] [cursor=pointer]:
              - /url: /wiki/%D0%95%D1%84%D0%B8%D0%BC%D0%BE%D0%B2,_%D0%A1%D0%B5%D1%80%D0%B3%D0%B5%D0%B9_%D0%91%D0%BE%D1%80%D0%B8%D1%81%D0%BE%D0%B2%D0%B8%D1%87
            - text: . В ночь с 8 на 9 мая поднялись на вершину
            - link "Казбек Валиев" [ref=e897] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%B0%D0%BB%D0%B8%D0%B5%D0%B2,_%D0%9A%D0%B0%D0%B7%D0%B1%D0%B5%D0%BA_%D0%A8%D0%B0%D0%BA%D0%B8%D0%BC%D0%BE%D0%B2%D0%B8%D1%87
            - text: ","
            - link "Валерий Хрищатый" [ref=e898] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D1%80%D0%B8%D1%89%D0%B0%D1%82%D1%8B%D0%B9,_%D0%92%D0%B0%D0%BB%D0%B5%D1%80%D0%B8%D0%B9_%D0%9D%D0%B8%D0%BA%D0%BE%D0%BB%D0%B0%D0%B5%D0%B2%D0%B8%D1%87
            - text: ", а 9 мая —"
            - link "Валерий Хомутов" [ref=e899] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D0%BE%D0%BC%D1%83%D1%82%D0%BE%D0%B2,_%D0%92%D0%B0%D0%BB%D0%B5%D1%80%D0%B8%D0%B9_%D0%92%D0%B0%D1%81%D0%B8%D0%BB%D1%8C%D0%B5%D0%B2%D0%B8%D1%87
            - text: ","
            - link "Владимир Пучков" [ref=e900] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%9F%D1%83%D1%87%D0%BA%D0%BE%D0%B2,_%D0%92%D0%BB%D0%B0%D0%B4%D0%B8%D0%BC%D0%B8%D1%80_%D0%9D%D0%B8%D0%BA%D0%BE%D0%BB%D0%B0%D0%B5%D0%B2%D0%B8%D1%87&action=edit&redlink=1
            - text: и
            - link "Юрий Голодов" [ref=e901] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%93%D0%BE%D0%BB%D0%BE%D0%B4%D0%BE%D0%B2,_%D0%AE%D1%80%D0%B8%D0%B9_%D0%A4%D1%91%D0%B4%D0%BE%D1%80%D0%BE%D0%B2%D0%B8%D1%87&action=edit&redlink=1
            - text: .
          - paragraph [ref=e902]:
            - text: Маршрут восхождения был проложен по юго-западной стене горы и считается одним из самых сложных в истории штурма Джомолунгмы
            - superscript [ref=e903]:
              - link "[40]" [ref=e904] [cursor=pointer]:
                - /url: "#cite_note-40"
            - text: . Сборник очерков об этом восхождении написал советский журналист
            - link "Юрий Рост" [ref=e905] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D0%BE%D1%81%D1%82,_%D0%AE%D1%80%D0%B8%D0%B9_%D0%9C%D0%B8%D1%85%D0%B0%D0%B9%D0%BB%D0%BE%D0%B2%D0%B8%D1%87
            - superscript [ref=e906]:
              - link "[41]" [ref=e907] [cursor=pointer]:
                - /url: "#cite_note-Рост82-41"
            - text: .
          - paragraph [ref=e908]:
            - text: В 1984 году впервые на вершину Эвереста поднялись австралийцы. Команда из пяти человек проложила новый маршрут под названием White Limbo по Северной стене. При этом они не пользовались кислородными баллонами и помощью шерпов, проведя восхождение в альпийском стиле
            - superscript [ref=e909]:
              - link "[42]" [ref=e910] [cursor=pointer]:
                - /url: "#cite_note-42"
            - text: .
          - figure "Вид северной стены Джомолунгмы с тропы, ведущей в базовый лагерь" [ref=e911]:
            - link [ref=e912] [cursor=pointer]:
              - /url: https://commons.wikimedia.org/wiki/File:Everest_North_Face_toward_Base_Camp_Tibet_Luca_Galuzzi_2006.jpg?uselang=ru
              - img [ref=e913]
            - generic [ref=e915]:
              - text: Вид северной стены Джомолунгмы с тропы, ведущей в
              - link "базовый лагерь" [ref=e916] [cursor=pointer]:
                - /url: /wiki/%D0%91%D0%B0%D0%B7%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BB%D0%B0%D0%B3%D0%B5%D1%80%D1%8C_%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D1%8B
          - paragraph [ref=e917]:
            - text: В 1988 году
            - link "новозеландка" [ref=e918] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%BE%D0%B2%D0%B0%D1%8F_%D0%97%D0%B5%D0%BB%D0%B0%D0%BD%D0%B4%D0%B8%D1%8F
            - link "Лидия Брэйди" [ref=e919] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%91%D1%80%D1%8D%D0%B9%D0%B4%D0%B8,_%D0%9B%D0%B8%D0%B4%D0%B8%D1%8F&action=edit&redlink=1
            - text: стала первой женщиной, достигнувшей вершины Эвереста без кислородного прибора.
          - paragraph [ref=e920]:
            - text: Весной-летом 2004 года российские альпинисты прошли по самому сложному маршруту к вершине — по центру Северной стены
            - superscript [ref=e921]:
              - link "[43]" [ref=e922] [cursor=pointer]:
                - /url: "#cite_note-43"
            - text: . Эта крупнейшая в масштабах России экспедиция стала четвёртым по величине событием в истории отечественного альпинизма — после восхождений на Эверест в 1982 году, траверса
            - link "Канченджанги" [ref=e923] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D0%BD%D1%87%D0%B5%D0%BD%D0%B4%D0%B6%D0%B0%D0%BD%D0%B3%D0%B0
            - text: в 1989 году
            - superscript [ref=e924]:
              - link "[44]" [ref=e925] [cursor=pointer]:
                - /url: "#cite_note-44"
            - text: и первопрохождения Южной стены Лхоцзе в 1990 году. В команду вошли лучшие альпинисты под руководством москвича Виктора Козлова — всего 20 человек из
            - link "Москвы" [ref=e926] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D1%81%D0%BA%D0%B2%D0%B0
            - text: ","
            - link "Тольятти" [ref=e927] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%BE%D0%BB%D1%8C%D1%8F%D1%82%D1%82%D0%B8
            - text: ","
            - link "Сочи" [ref=e928] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BE%D1%87%D0%B8
            - text: ","
            - link "Красноярска" [ref=e929] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D1%80%D0%B0%D1%81%D0%BD%D0%BE%D1%8F%D1%80%D1%81%D0%BA
            - text: ","
            - link "Новокузнецка" [ref=e930] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%BE%D0%B2%D0%BE%D0%BA%D1%83%D0%B7%D0%BD%D0%B5%D1%86%D0%BA
            - text: ","
            - link "Подольска" [ref=e931] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%B4%D0%BE%D0%BB%D1%8C%D1%81%D0%BA
            - text: ","
            - link "Екатеринбурга" [ref=e932] [cursor=pointer]:
              - /url: /wiki/%D0%95%D0%BA%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%BD%D0%B1%D1%83%D1%80%D0%B3
            - text: ","
            - link "Ростова-на-Дону" [ref=e933] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D0%BE%D1%81%D1%82%D0%BE%D0%B2-%D0%BD%D0%B0-%D0%94%D0%BE%D0%BD%D1%83
            - text: ","
            - link "Новосибирска" [ref=e934] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%BE%D0%B2%D0%BE%D1%81%D0%B8%D0%B1%D0%B8%D1%80%D1%81%D0%BA
            - text: и
            - link "Кирова" [ref=e935] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B8%D1%80%D0%BE%D0%B2
            - text: .
          - generic [ref=e936]:
            - heading "Рекорды" [level=3] [ref=e937]: Рекорды
            - generic [ref=e938]:
              - text: "["
              - link "править" [ref=e939] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=10
              - text: "|"
              - link "править код" [ref=e940] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=10
              - text: "]"
          - list [ref=e941]:
            - listitem [ref=e942]:
              - text: В 1996 году
              - link "шерп" [ref=e943] [cursor=pointer]:
                - /url: /wiki/%D0%A8%D0%B5%D1%80%D0%BF%D1%8B
              - text: Анг Рита побывал на вершине 10 раз без
              - link "кислородных баллонов" [ref=e944] [cursor=pointer]:
                - /url: /wiki/%D0%9A%D0%B8%D1%81%D0%BB%D0%BE%D1%80%D0%BE%D0%B4%D0%BD%D1%8B%D0%B9_%D0%B1%D0%B0%D0%BB%D0%BB%D0%BE%D0%BD
              - superscript [ref=e945]:
                - link "[45]" [ref=e946] [cursor=pointer]:
                  - /url: "#cite_note-news.online.ua-45"
              - text: . Спустя 4 года его рекорд побил другой шерп Аппа, достигший вершины в 11-й раз
              - superscript [ref=e947]:
                - link "[45]" [ref=e948] [cursor=pointer]:
                  - /url: "#cite_note-news.online.ua-45"
              - text: . А всего
              - link "Аппа Тенцинг" [ref=e949] [cursor=pointer]:
                - /url: /wiki/%D0%90%D0%BF%D0%BF%D0%B0_%D0%A2%D0%B5%D0%BD%D1%86%D0%B8%D0%BD%D0%B3
              - text: побывал на вершине Эвереста 21 раз (по состоянию на май 2011 года).
            - listitem [ref=e950]:
              - text: В 1999 году шерп Бабу Шири провёл на вершине 21 час, и это при том, что уже на высоте 7925 м начинается мёртвая зона — в воздухе содержится всего треть того количества кислорода, которое присутствует в атмосфере на
              - link "уровне моря" [ref=e951] [cursor=pointer]:
                - /url: /wiki/%D0%A3%D1%80%D0%BE%D0%B2%D0%B5%D0%BD%D1%8C_%D0%BC%D0%BE%D1%80%D1%8F
              - superscript [ref=e952]:
                - link "[46]" [ref=e953] [cursor=pointer]:
                  - /url: "#cite_note-autogenerated3-46"
              - text: .
            - listitem [ref=e954]:
              - text: В мае 2001 года
              - superscript [ref=e955]:
                - link "[47]" [ref=e956] [cursor=pointer]:
                  - /url: "#cite_note-47"
              - text: французский сноубордист
              - link "Марко Сиффреди" [ref=e957] [cursor=pointer]:
                - /url: /wiki/%D0%9C%D0%B0%D1%80%D0%BA%D0%BE_%D0%A1%D0%B8%D1%84%D1%84%D1%80%D0%B5%D0%B4%D0%B8
              - text: первым спустился с вершины Эвереста на сноуборде со стороны
              - link "Кулуара Нортона" [ref=e958] [cursor=pointer]:
                - /url: /wiki/%D0%9A%D1%83%D0%BB%D1%83%D0%B0%D1%80_%D0%9D%D0%BE%D1%80%D1%82%D0%BE%D0%BD%D0%B0
              - text: . Спуск до базового лагеря занял 2,5 часа. Через год, осенью, Марко совершил второе восхождение на Эверест, чтобы спуститься вниз на сноуборде по Кулуару Хорнбайна. После восхождения сноубордист в одиночку начал спуск по Кулуару Хорнбайна, и больше его никто не видел
              - superscript [ref=e959]:
                - link "[48]" [ref=e960] [cursor=pointer]:
                  - /url: "#cite_note-48"
              - text: .
            - listitem [ref=e961]:
              - text: В 2001 году удивительное восхождение на Эверест совершил незрячий американец Эрик Вейхенмайер. К тому моменту он уже покорил все самые высокие горные пики на всех континентах. «Поднявшись на семь самых высоких гор семи частей света, я надеялся показать людям, что цели, которые могут казаться недосягаемыми, на самом деле вполне достижимы», — сказал в своём заявлении Вейхенмайер
              - superscript [ref=e962]:
                - link "[46]" [ref=e963] [cursor=pointer]:
                  - /url: "#cite_note-autogenerated3-46"
              - text: .
            - listitem [ref=e964]:
              - text: 21 мая 2004 года
              - link "Пемба Дордже" [ref=e965] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D0%B5%D0%BC%D0%B1%D0%B0_%D0%94%D0%BE%D1%80%D0%B4%D0%B6%D0%B5
              - text: "установил рекорд скоростного восхождения на Эверест: 8 часов 10 минут от базового лагеря возле"
              - link "ледника Кхумбу" [ref=e966] [cursor=pointer]:
                - /url: /wiki/%D0%9A%D1%85%D1%83%D0%BC%D0%B1%D1%83_(%D0%BB%D0%B5%D0%B4%D0%BD%D0%B8%D0%BA)
              - superscript [ref=e967]:
                - link "[49]" [ref=e968] [cursor=pointer]:
                  - /url: "#cite_note-Cvoboda-49"
              - text: .
            - listitem [ref=e969]:
              - text: 22 мая 2010 года вершину покорил 13-летний американец
              - link "Джордан Ромеро" [ref=e970] [cursor=pointer]:
                - /url: /wiki/%D0%A0%D0%BE%D0%BC%D0%B5%D1%80%D0%BE,_%D0%94%D0%B6%D0%BE%D1%80%D0%B4%D0%B0%D0%BD
              - superscript [ref=e971]:
                - link "[50]" [ref=e972] [cursor=pointer]:
                  - /url: "#cite_note-50"
              - text: ", совершивший восхождение вместе с отцом. До этого рекорд принадлежал 15-летней Мин Кипа Шерпа"
              - superscript [ref=e973]:
                - link "[51]" [ref=e974] [cursor=pointer]:
                  - /url: "#cite_note-51"
              - text: .
            - listitem [ref=e975]:
              - text: В мае 2011 года непальский духовный учитель Бхакта Кумар Райбыл установил новый рекорд по продолжительности нахождения на вершине — 32 часа
              - superscript [ref=e976]:
                - link "[52]" [ref=e977] [cursor=pointer]:
                  - /url: "#cite_note-52"
              - text: .
            - listitem [ref=e978]:
              - text: 12 и 19 мая 2012 года жительница Непала по имени Чхурим (Chhurim) поставила рекорд, дважды за неделю зайдя на Эверест
              - superscript [ref=e979]:
                - link "[53]" [ref=e980] [cursor=pointer]:
                  - /url: "#cite_note-53"
              - text: .
            - listitem [ref=e981]:
              - text: 23 мая 2013 года 80-летний японец
              - link "Юитиро Миура" [ref=e982] [cursor=pointer]:
                - /url: /wiki/%D0%9C%D0%B8%D1%83%D1%80%D0%B0,_%D0%AE%D0%B8%D1%82%D0%B8%D1%80%D0%BE
              - text: ", завершив восхождение, стал самым пожилым человеком, покорившим вершину Эвереста"
              - superscript [ref=e983]:
                - link "[54]" [ref=e984] [cursor=pointer]:
                  - /url: "#cite_note-54"
              - text: . До этого рекорд принадлежал 76-летнему
              - link "непальцу" [ref=e985] [cursor=pointer]:
                - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB
              - text: по имени Мин Бахадур Шерхан
              - superscript [ref=e986]:
                - link "[55]" [ref=e987] [cursor=pointer]:
                  - /url: "#cite_note-55"
              - text: .
            - listitem [ref=e988]:
              - text: 24 мая 2014 года вершину покорила индийская девочка
              - link "Пурна Малаватх" [ref=e989] [cursor=pointer]:
                - /url: /wiki/%D0%9C%D0%B0%D0%BB%D0%B0%D0%B2%D0%B0%D1%82%D1%85,_%D0%9F%D1%83%D1%80%D0%BD%D0%B0
              - text: (13 лет, 11 месяцев). Восхождение прошло с Северной стороны по стандартному маршруту с использованием кислородных баллонов и помощи шерпов. Пурна стала самой юной женщиной в истории восхождений на Эверест
              - superscript [ref=e990]:
                - link "[56]" [ref=e991] [cursor=pointer]:
                  - /url: "#cite_note-56"
              - text: .
            - listitem [ref=e992]:
              - text: 25 мая 2014 года на вершину Эвереста по стандартному маршруту с северной стороны взошёл 72-летний американский альпинист Билл Берк (
              - link "англ." [ref=e993] [cursor=pointer]:
                - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: Bill Burke). Ранее, 23 мая 2009 года, Билл уже поднимался на Эверест в возрасте 67 лет (восхождение проходило по стандартному маршруту с южной стороны). Таким образом, Берк — самый старый альпинист, который взошёл на Эверест с двух его сторон (восхождения проводились в возрасте более 65 лет)
              - superscript [ref=e994]:
                - link "[57]" [ref=e995] [cursor=pointer]:
                  - /url: "#cite_note-57"
              - text: .
            - listitem [ref=e996]:
              - text: 21 мая 2019 года непальский альпинист Ками Рита Шерпа (
              - link "англ." [ref=e997] [cursor=pointer]:
                - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
              - text: Kami Rita Sherpa) установил мировой рекорд по количеству успешных восхождений на вершину — 24 раза (23 раза он поднимался с южной, непальской стороны и 1 раз с северной, тибетской). Восхождения были совершены в период с 1994 по 2019 годы
              - superscript [ref=e998]:
                - link "[58]" [ref=e999] [cursor=pointer]:
                  - /url: "#cite_note-58"
              - text: . 13 мая 2024 года он в очередной раз обновил свой мировой рекорд, совершив восхождение в 29-й раз. Девять дней спустя, 22 мая 2024 года, Ками поднялся на высочайшую вершину в юбилейный, 30-й раз.
            - listitem [ref=e1000]:
              - text: 22 мая 2019 года
              - link "Нирмал Пурджа" [ref=e1001] [cursor=pointer]:
                - /url: /wiki/%D0%9F%D1%83%D1%80%D0%B4%D0%B6%D0%B0,_%D0%9D%D0%B8%D1%80%D0%BC%D0%B0%D0%BB
              - text: установил рекорд, пройдя траверс Эверест—Лхоцзе (со спуском в 3-й высотный лагерь) за 10 часов 15 минут (на Эвересте он был в 5:30 утра, на Лхоцзе — в 15:45). Несколько дней спустя, 27 мая шерпа Мингма Дорчи прошёл тот же маршрут за 6 часов 1 минуту (на Эвересте он был в 0:44 ночи, на Лхоцзе — в 6:45)
              - superscript [ref=e1002]:
                - link "[59]" [ref=e1003] [cursor=pointer]:
                  - /url: "#cite_note-59"
              - text: .
            - listitem [ref=e1004]:
              - text: В мае 2013 года англичанин
              - link "Кентон Кул" [ref=e1006] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9A%D1%83%D0%BB,_%D0%9A%D0%B5%D0%BD%D1%82%D0%BE%D0%BD&action=edit&redlink=1
              - superscript [ref=e1007]:
                - link "[англ.]" [ref=e1008] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Kenton_Cool
              - text: стал первым (и пока единственным), кто сделал «Тройную корону» — восхождение на Эверест,
              - link "Лхоцзе" [ref=e1009] [cursor=pointer]:
                - /url: /wiki/%D0%9B%D1%85%D0%BE%D1%86%D0%B7%D0%B5
              - text: и
              - link "Нупцзе" [ref=e1010] [cursor=pointer]:
                - /url: /wiki/%D0%9D%D1%83%D0%BF%D1%86%D0%B7%D0%B5
              - text: в рамках одной экспедиции
              - superscript [ref=e1011]:
                - link "[60]" [ref=e1012] [cursor=pointer]:
                  - /url: "#cite_note-60"
              - text: .
          - generic [ref=e1013]:
            - heading "Статистика" [level=3] [ref=e1014]: Статистика
            - generic [ref=e1015]:
              - text: "["
              - link "править" [ref=e1016] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&veaction=edit&section=11
              - text: "|"
              - link "править код" [ref=e1017] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%94%D0%B6%D0%BE%D0%BC%D0%BE%D0%BB%D1%83%D0%BD%D0%B3%D0%BC%D0%B0&action=edit&section=11
              - text: "]"
          - paragraph [ref=e1018]:
            - text: "К вершине проложено два классических маршрута: южный (со стороны Непала, 5А) и более сложный северный (со стороны Тибета, 5Б), а также около 20 нестандартных маршрутов, относящихся уже к высотно-техническому альпинизму. Отдельную сложность составляет полный (без спуска в высотный лагерь) траверс Эверест—Лхоцзе, пока не пройденный никем из альпинистов (попытки делались"
            - link "Симоне Моро" [ref=e1019] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D1%80%D0%BE,_%D0%A1%D0%B8%D0%BC%D0%BE%D0%BD%D0%B5
            - text: в паре с
            - link "Анатолием Букреевым" [ref=e1020] [cursor=pointer]:
              - /url: /wiki/%D0%91%D1%83%D0%BA%D1%80%D0%B5%D0%B5%D0%B2,_%D0%90%D0%BD%D0%B0%D1%82%D0%BE%D0%BB%D0%B8%D0%B9_%D0%9D%D0%B8%D0%BA%D0%BE%D0%BB%D0%B0%D0%B5%D0%B2%D0%B8%D1%87
            - text: ", затем с"
            - link "Денисом Урубко" [ref=e1021] [cursor=pointer]:
              - /url: /wiki/%D0%A3%D1%80%D1%83%D0%B1%D0%BA%D0%BE,_%D0%94%D0%B5%D0%BD%D0%B8%D1%81_%D0%92%D0%B8%D0%BA%D1%82%D0%BE%D1%80%D0%BE%D0%B2%D0%B8%D1%87
            - text: ;
            - link "Ули Штек" [ref=e1022] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D1%82%D0%B5%D0%BA,_%D0%A3%D0%BB%D0%B8
            - text: погиб на
            - link "Нупцзе" [ref=e1023] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D1%83%D0%BF%D1%86%D0%B7%D0%B5
            - text: ", готовясь к траверсу)"
            - superscript [ref=e1024]:
              - link "[61]" [ref=e1025] [cursor=pointer]:
                - /url: "#cite_note-61"
            - text: .
          - paragraph [ref=e1026]: По данным Гималайской базы данных, по состоянию на конец 2017 года на вершину Джомолунгмы совершено 8306 восхождений, из числа впервые поднявшихся — 4833 человека (остальные восхождения повторные). Из этого числа 5280 восхождений совершено с южной (Непальской) стороны, остальные с северной (Тибетско-Китайской), и лишь 265 (197 альпинистов и 68 шерп) — по нестандартным маршрутам (многие из которых ни разу не были повторены).
          - paragraph [ref=e1027]:
            - text: Число погибших на 4 декабря 2017 года составляет 288 человек (173 альпиниста и 115 шерп). 181 человек погиб при восхождении с юга, остальные — с севера
            - superscript [ref=e1028]:
              - link "[62]" [ref=e1029] [cursor=pointer]:
                - /url: "#cite_note-62"
            - text: .
          - paragraph [ref=e1030]:
            - text: По данным на начало июня 2018 года, число поднявшихся на вершину мира увеличилось на 715 человек (476 с юга и 239 с севера). Список погибших также увеличился (на 5 человек)
            - superscript [ref=e1031]:
              - link "[63]" [ref=e1032] [cursor=pointer]:
                - /url: "#cite_note-63"
            - text: .
          - paragraph [ref=e1033]:
            - text: Весной 2019 года власти
            - link "Непала" [ref=e1034] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B5%D0%BF%D0%B0%D0%BB
            - text: выдали рекордное количество лицензий на подъём — 381 штуку
            - superscript [ref=e1035]:
              - link "[64]" [ref=e1036] [cursor=pointer]:
                - /url: "#cite_note-64"
            - text: . 22 мая 2019 года более 200 человек пытались взойти на гору, из-за большого количества людей возникла очередь. Людям пришлось ждать около 12 часов, чтобы подняться выше. Многие альпинисты были сильно измотаны и обморожены, в результате 10 участников группы погибли
            - superscript [ref=e1037]:
              - link "[65]" [ref=e1038] [cursor=pointer]:
