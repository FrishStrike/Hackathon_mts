                    - paragraph [ref=e901]: Я создаю наборы еды для чрезвычайных ситуаций. И вижу эту штуку в концентрированном виде. Человек покупает набор. Потом еще один. Потом спрашивает про генераторы, фильтры для воды, сроки хранения топлива. Потом пишет что смотрит участок за городом. Каждый следующий шаг логичен. А последнего шага не существует.
