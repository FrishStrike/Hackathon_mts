          - paragraph [ref=e679]:
            - text: "Козы демонстрируют огромное разнообразие во внешнем облике, начиная от размеров, пропорций и типов сложения и заканчивая формой вымени и расположением сосков. С одной стороны, козы происходят от разных видов диких предков (по современным представлениям, минимум от трёх:"
            - link "безоарового" [ref=e680] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D0%B7%D0%BE%D0%B0%D1%80%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BA%D0%BE%D0%B7%D1%91%D0%BB
            - text: и
            - link "винторогого" [ref=e681] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%B8%D0%BD%D1%82%D0%BE%D1%80%D0%BE%D0%B3%D0%B8%D0%B9_%D0%BA%D0%BE%D0%B7%D1%91%D0%BB
            - text: козлов и вымершей козы приска). С другой стороны, большие различия в облике коз отражают их физиологическую адаптацию к широкому диапазону природно-климатических условий, в том числе к экстремальным температурам и влажности, и к разным условиям кормления. Общего для всех пород перечня внешних признаков, которые бы чётко определяли зоологические различия между породами, не существует
            - superscript [ref=e682]:
              - link "[9]" [ref=e683] [cursor=pointer]:
                - /url: "#cite_note-AG-11"
            - superscript [ref=e684]:
              - link "[14]" [ref=e685] [cursor=pointer]:
                - /url: "#cite_note-_c7231bebed3f62c8-16"
            - text: . Поэтому при зоологической
            - link "классификации" [ref=e686] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BB%D0%B0%D1%81%D1%81%D0%B8%D1%84%D0%B8%D0%BA%D0%B0%D1%86%D0%B8%D1%8F
            - text: пород коз обычно применяется комплекс признаков, включающий элементы экстерьера, характер продуктивности и регион происхождения или обитания. Примером такой группировки служит простая и наглядная классификация
            - link "Зеленского" [ref=e687] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%97%D0%B5%D0%BB%D0%B5%D0%BD%D1%81%D0%BA%D0%B8%D0%B9,_%D0%93%D0%B5%D0%BE%D1%80%D0%B3%D0%B8%D0%B9_%D0%93%D1%80%D0%B8%D0%B3%D0%BE%D1%80%D1%8C%D0%B5%D0%B2%D0%B8%D1%87&action=edit&redlink=1
            - superscript [ref=e688]:
              - link "[комм. 3]" [ref=e689] [cursor=pointer]:
                - /url: "#cite_note-17"
            - link "Перейти к разделу «КлЗ»" [ref=e691] [cursor=pointer]:
              - /url: "#КлЗ"
              - generic "Перейти к разделу «КлЗ»" [ref=e692]: ➤
            - strong [ref=e693]: В шаблоне «Переход» указан второй параметр, отличный от «back».
            - text: ", а в современной научной литературе обычно используется классификация Мэйсона"
            - superscript [ref=e694]:
              - link "[комм. 4]" [ref=e695] [cursor=pointer]:
                - /url: "#cite_note-18"
            - link "Перейти к разделу «КлМ»" [ref=e697] [cursor=pointer]:
              - /url: "#КлМ"
              - generic "Перейти к разделу «КлМ»" [ref=e698]: ➤
            - strong [ref=e699]: В шаблоне «Переход» указан второй параметр, отличный от «back».
            - superscript [ref=e700]:
              - link "[15]" [ref=e701] [cursor=pointer]:
                - /url: "#cite_note-_76cb79bb689c8169-19"
            - text: . Наиболее характерными внешними признаками породы признаются профиль лицевой части головы, постав и форма ушей и тип рогов, а также характер шёрстного покрова.
          - paragraph [ref=e702]:
            - text: "Профиль головы определяют как прямой, вогнутый, выпуклый и очень выпуклый — римский (романский) нос. Уши могут быть стоячими, висячими, полувисячими, поставленными горизонтально. У разных пород различается их ширина и толщина, а длина варьируется от 5 до 30 см. Форма ушей очень разнообразна: они бывают округлыми, заострёнными, расправленными, складчатыми, свёрнутыми в трубку, концы могут быть загнуты вверх; бывают почти или полностью редуцированные, рудиментарные наружные уши"
            - superscript [ref=e703]:
              - link "[13]" [ref=e704] [cursor=pointer]:
                - /url: "#cite_note-_c90fe014fc66e851-15"
            - superscript [ref=e705]:
              - link "[16]" [ref=e706] [cursor=pointer]:
                - /url: "#cite_note-_4d9c9a15661a683a-20"
            - text: .
          - paragraph [ref=e707]:
            - text: От трёх видов диких предков домашние козы унаследовали три основных типа
            - link "рогов" [ref=e708] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D0%BE%D0%B3
            - text: . Саблевидные или дугообразные рога типа
            - link "безоарового" [ref=e709] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D0%B7%D0%BE%D0%B0%D1%80%D0%BE%D0%B2%D1%8B%D0%B9_%D0%BA%D0%BE%D0%B7%D1%91%D0%BB
            - text: ", или саблерогого, козла (Capra aegagrus) треугольного сечения, часто с зазубринами на острой передней грани, от основания полукругом расходятся в стороны. Рога этого типа могут быть разной длины и толщины, сильно закрученными почти в кольцо или спираль или, наоборот, почти прямыми. Рога в типе"
            - link "винторогого козла" [ref=e710] [cursor=pointer]:
              - /url: /wiki/%D0%92%D0%B8%D0%BD%D1%82%D0%BE%D1%80%D0%BE%D0%B3%D0%B8%D0%B9_%D0%BA%D0%BE%D0%B7%D1%91%D0%BB
            - text: маркура (Capra falconeri) плоские в сечении, направлены вверх и назад и закручены в виде винта или штопора. Рога как у ископаемой европейской козы Capra Capra prisca (рога типа «приска») изогнуты назад и в стороны и закручиваются в спираль на концах
            - superscript [ref=e711]:
              - link "[13]" [ref=e712] [cursor=pointer]:
                - /url: "#cite_note-_c90fe014fc66e851-15"
            - superscript [ref=e713]:
              - link "[16]" [ref=e714] [cursor=pointer]:
                - /url: "#cite_note-_4d9c9a15661a683a-20"
            - superscript [ref=e715]:
              - link "[17]" [ref=e716] [cursor=pointer]:
                - /url: "#cite_note-_571243e9463401f7-21"
            - text: . Существуют и другие формы рогов, возможно, свидетельствующие о смешении с другими видами
            - link "диких козлов" [ref=e717] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%BE%D1%80%D0%BD%D1%8B%D0%B5_%D0%BA%D0%BE%D0%B7%D0%BB%D1%8B
            - text: . В большинстве пород самцы имеют рога более развитые, типичной для породы формы, а у самок рога небольшие простой саблевидной формы.
          - paragraph [ref=e718]:
            - link "Комолость" [ref=e719] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%BC%D0%BE%D0%BB%D0%BE%D1%81%D1%82%D1%8C
            - text: ", то есть врождённое отсутствие рогов или зачаточные рога, у коз является"
            - link "доминантным генетическим признаком" [ref=e720] [cursor=pointer]:
              - /url: /wiki/%D0%94%D0%BE%D0%BC%D0%B8%D0%BD%D0%B0%D0%BD%D1%82%D0%BD%D1%8B%D0%B9_%D0%BF%D1%80%D0%B8%D0%B7%D0%BD%D0%B0%D0%BA
            - text: и может быть почти во всех породах. В отличие от формы профиля и (за единичными исключениями) ушей, рога имеют значение при хозяйственном использовании коз. Так, при
            - link "интенсивной системе" [ref=e721] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%98%D0%BD%D1%82%D0%B5%D0%BD%D1%81%D0%B8%D0%B2%D0%BD%D0%B0%D1%8F_%D1%81%D0%B8%D1%81%D1%82%D0%B5%D0%BC%D0%B0_%D1%81%D0%BA%D0%BE%D1%82%D0%BE%D0%B2%D0%BE%D0%B4%D1%81%D1%82%D0%B2%D0%B0&action=edit&redlink=1
            - text: содержания молочных коз безрогие матки предпочтительнее рогатых, но при
            - link "пастбищном" [ref=e722] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B0%D1%81%D1%82%D0%B1%D0%B8%D1%89%D0%B5
            - text: содержании шёрстных и пуховых пород продукцию лучшего качества получают от рогатых животных. Рогатые особи в целом крепче и выносливее комолых. Кроме того, комолость
            - link "генетически связана" [ref=e723] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D1%86%D0%B5%D0%BF%D0%BB%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5_%D0%BD%D0%B0%D1%81%D0%BB%D0%B5%D0%B4%D0%BE%D0%B2%D0%B0%D0%BD%D0%B8%D0%B5
            - text: со снижением способности козлов к размножению, поэтому для племенного воспроизводства используются только рогатые самцы
            - superscript [ref=e724]:
              - link "[13]" [ref=e725] [cursor=pointer]:
                - /url: "#cite_note-_c90fe014fc66e851-15"
            - superscript [ref=e726]:
              - link "[18]" [ref=e727] [cursor=pointer]:
                - /url: "#cite_note-Ч-плем-22"
            - text: .
          - paragraph [ref=e728]:
            - text: "Помимо важнейших экстерьерных признаков, лежащих в основании зоологических классификаций пород, у коз описывают и ряд других ста́тей. Например, на внешний облик породы сильно влияет растительность на голове: борода — пучок волос на нижней челюсти, — и чуб, или чёлка, — пучок волос на лбу. В сочетании с профилем и формой нижней челюсти украшения на голове придают представителям пород, которым они присущи, очень характерный вид, при этом чуб обычно бывает у козлов, а бородой могут обладать как самцы, так и самки некоторых пород. Ещё одним породным признаком может быть наличие или отсутствие так называемых серёжек — симметричных кожных выростов на шее под нижней челюстью, функция которых до сих пор не известна"
            - superscript [ref=e729]:
              - link "[13]" [ref=e730] [cursor=pointer]:
                - /url: "#cite_note-_c90fe014fc66e851-15"
            - text: .
          - paragraph [ref=e731]:
            - link "Пропорции и физическая конституция" [ref=e732] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%B5%D0%BB%D0%BE%D1%81%D0%BB%D0%BE%D0%B6%D0%B5%D0%BD%D0%B8%D0%B5
            - text: коз разнообразны — есть породы высоконогие и приземистые, квадратного или удлинённого формата
            - superscript [ref=e733]:
              - link "[комм. 5]" [ref=e734] [cursor=pointer]:
                - /url: "#cite_note-23"
            - text: ", с разными пропорциями головы и формой корпуса. В породах коз имеется два типа"
            - link "карликовости" [ref=e735] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%B0%D1%80%D0%BB%D0%B8%D0%BA
            - text: ": пропорциональные карлики, внешне аналогичные козам нормального размера, с пропорционально маленькой головой, рогами и т. д., а также"
            - link "ахондропластические" [ref=e736] [cursor=pointer]:
              - /url: /wiki/%D0%90%D1%85%D0%BE%D0%BD%D0%B4%D1%80%D0%BE%D0%BF%D0%BB%D0%B0%D0%B7%D0%B8%D1%8F
            - text: карлики — коротконогие, но с корпусом обычной величины и большой головой
            - superscript [ref=e737]:
              - link "[19]" [ref=e738] [cursor=pointer]:
                - /url: "#cite_note-24"
            - text: .
          - generic [ref=e739]:
            - heading "Шерсть и окрас" [level=3] [ref=e740]: Шерсть и окрас
            - generic [ref=e741]:
              - text: "["
              - link "править" [ref=e742] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&stable=0&veaction=edit&section=3
              - text: "|"
              - link "править код" [ref=e743] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&action=edit&section=3
              - text: "]"
          - paragraph [ref=e744]:
            - text: Основной
            - link "шёрстный покров" [ref=e745] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D1%81%D1%82%D1%8C
            - text: "коз может состоять из волос трёх типов — остевого, или покровного, волоса, пуховых волокон и волос редкого промежуточного типа. Породный облик определяется длиной и структурой волос и расположением их по корпусу. По структуре волосы могут быть не только грубыми («козья шерсть»), но и гладкими, шелковистыми, мягкими, волнистыми, курчавыми. Длинная шерсть может покрывать всё тело, но часто у коз с короткой шерстью длинные волосы расположены на отдельных участках: на шее и плечах (грива), вдоль спины («плащ» или «накидка»), только на крестце и бёдрах, на верхней части конечностей («штаны»), на боках и животе."
          - paragraph [ref=e746]:
            - text: Цвет шерсти и пигментация у коз, как и у других животных, образуются сочетанием пигментов
            - link "эумеланина" [ref=e747] [cursor=pointer]:
              - /url: /wiki/%D0%AD%D1%83%D0%BC%D0%B5%D0%BB%D0%B0%D0%BD%D0%B8%D0%BD
            - text: и
            - link "феомеланина" [ref=e748] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B5%D0%BE%D0%BC%D0%B5%D0%BB%D0%B0%D0%BD%D0%B8%D0%BD
            - text: ", каждый из которых может быть двух типов, или отсутствием пигмента. Располагаясь по определённой схеме по корпусу, волосы с разными пигментами образуют расцветку. Как пигментация, так и расцветка обусловлены генетически и могут быть определяющим признаком для породы. При том, что количество возможных расцветок и сочетаний цветов не так велико, благодаря индивидуальным особенностям палитра окрасов коз кажется чрезвычайно разнообразной. У некоторых пород имеются специальные названия для каждого окраса, однако для общего понимания описаний пород коз в списке нужно знать лишь четыре типа стандартных расцветок, другие расцветки образуются пятнами разного размера и цвета, располагающимися в том или ином порядке"
            - superscript [ref=e749]:
              - link "[20]" [ref=e750] [cursor=pointer]:
                - /url: "#cite_note-Color-25"
            - text: .
          - paragraph [ref=e751]:
            - text: "«Дикий» окрас представляет собой чёрные или коричневые (эумеланиновые) участки на феомеланиновом фоне разных тонов: красно-коричневом, серо-коричневом, бежевом. Тёмные участки расположены на морде, нижней части ног, животе, хвосте, шее и груди, в зоне плеч могут образовывать воротник, полосой тянутся по спине. Окрас «серна» также представляет собой тёмные отметины на более светлом фоне, однако затемнение на груди и плечах отсутствует, голова светлая с тёмной полоской от глаза к носу, узкая тёмная лента тянется вдоль спины. Противоположный ему окрас — белые или светлые участки на тёмном фоне — называют «швейцарскими отметинами», это типичная расцветка швейцарской"
            - link "тоггенбургской" [ref=e752] [cursor=pointer]:
              - /url: /wiki/%D0%A2%D0%BE%D0%B3%D0%B3%D0%B5%D0%BD%D0%B1%D1%83%D1%80%D0%B3%D1%81%D0%BA%D0%B0%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0
            - text: козы и родственных ей пород. Светлые участки образуют две полоски на морде от ушей к носу («барсучья морда»), окантовку губ и ушей; серёжки, нижние части ног и «зеркало» под хвостом также светлые. Расцветку, при которой чёрные (тёмные) полосы на морде, чёрные живот и нижние части ног дополнены чёрным цветом вдоль всей передней стороны бедра и большим участком чёрного цвета в задней части спины, почти сливающимся с чёрной раскраской задних ног, часто называют «заднее манто» (или «заднее пальто»)
            - superscript [ref=e753]:
              - link "[комм. 7]" [ref=e754] [cursor=pointer]:
                - /url: "#cite_note-28"
            - text: . При этом «передним манто» иногда зовут расцветку, при которой вся передняя часть животного (включая или не включая голову и шею) тёмная, а вся задняя часть светлая
            - superscript [ref=e755]:
              - link "[20]" [ref=e756] [cursor=pointer]:
                - /url: "#cite_note-Color-25"
            - text: .
          - paragraph [ref=e757]:
            - text: В стандартах и описаниях некоторых пород приводятся сведения о пигментации видимых
            - link "слизистых оболочек" [ref=e758] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%BB%D0%B8%D0%B7%D0%B8%D1%81%D1%82%D0%B0%D1%8F_%D0%BE%D0%B1%D0%BE%D0%BB%D0%BE%D1%87%D0%BA%D0%B0
            - text: (веки, нос, губы), кожи, цвет глаз, цвет рогов и копыт, иногда отдельно для задних и передних ног.
          - table "Разброс основных морфологических и продуктивных признаков пород коз[2]" [ref=e759]:
            - caption [ref=e760]:
              - text: Разброс основных морфологических и продуктивных признаков
              - text: пород коз
              - superscript [ref=e761]:
                - link "[2]" [ref=e762] [cursor=pointer]:
                  - /url: "#cite_note-Galal-3"
            - rowgroup [ref=e763]:
              - row "Показатель ед. изм Min Max" [ref=e764]:
                - columnheader "Показатель" [ref=e765]
                - columnheader "ед. изм" [ref=e766]
                - columnheader "Min" [ref=e767]
                - columnheader "Max" [ref=e768]
              - 'row "Вес: самцов кг 15 130" [ref=e769]':
                - cell "Вес:" [ref=e770]
