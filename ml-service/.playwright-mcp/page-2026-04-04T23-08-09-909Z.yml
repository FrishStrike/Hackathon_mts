                - cell "⍐ 30−59 ℮ 14−30 ⋁ ♂♀ 🥛 0,3−2 (д) f 5−8 ⧗ 4−5 🔪 63 🐐 162−296 Аборигенная порода западной и центральной Африки, ахондропластический карлик. Обладает толерантностью к трипаносомам, которых переносит муха цеце. Ноги и голова короткие, нижняя челюсть чуть длиннее верхней. Профиль прямой, уши стоячие или горизонтальные, довольно большие. Рога у самцов широкие, дугообразные, направлены назад и в стороны, у самок небольшие саблевидные. Обычны серёжки. Шерсть мягкая, короткая, козлы обладают гривой. Окрасы всевозможные. В породе выделяют лесной (forest) и степной (savanna) типы. Лесные вариации обычно тёмноокрашенные и меньше по размеру, степные крупнее и преимущественно светлые. Имеется множество местных названий и разновидностей." [ref=e11848]:
