              - row "Pyrenean исп. pirenaica фр. pyrénéen, race des Pyrénées, aquitaine, béarnais Пиренейская Мд+Мс+Д Испания Франция ⍐ 65−87 ℮ 50−85 ⋁ ♂ 🥛 400−500 f 3 ⧗ 7−8 🔪 60 🐐 140−180 Аборигенная порода, как считается, исключительно европейского происхождения. Профиль прямой или слабо вогнутый, морда широкая, глаза большие, уши горизонтальные или слегка повисшие. Рога мощные витые у козлов, у самок саблевидные, встречается комолость. Часто встречаются серёжки. Шерсть густая, короткая или средней длины. Масть обычно чёрная или тёмно-коричневая с палевым животом, пегая, серая, встречаются особи красные и окраса «серна». Разводится во Французских и Испанских Пиренеях и Центральной Испании. Кастрированных козлов используют для управления отарами овец. Племенная книга с 2006 г. [Е][М][P][D] [70][348][349]" [ref=e9469]:
