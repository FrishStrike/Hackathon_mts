              - text: "]"
          - paragraph [ref=e887]:
            - text: Издревле и до недавнего времени, когда у людей появилась возможность и возникла мода на
            - link "животных-компаньонов" [ref=e888] [cursor=pointer]:
              - /url: /wiki/%D0%96%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D1%8B%D0%B5-%D0%BA%D0%BE%D0%BC%D0%BF%D0%B0%D0%BD%D1%8C%D0%BE%D0%BD%D1%8B
            - text: ", коз содержали и разводили ради получения от них нужной человеку продукции. Козы являются источником"
            - link "молока" [ref=e889] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D1%8C%D0%B5_%D0%BC%D0%BE%D0%BB%D0%BE%D0%BA%D0%BE
            - text: ","
            - link "мяса" [ref=e890] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D0%BB%D1%8F%D1%82%D0%B8%D0%BD%D0%B0
            - text: ","
            - link "шерсти и пуха" [ref=e891] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D1%81%D1%82%D1%8C_(%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB)
            - text: ","
            - link "шкур" [ref=e892] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%BA%D1%83%D1%80%D0%B0
            - text: ","
            - link "кож" [ref=e893] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B6%D0%B0_(%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB)
            - text: ", рога и кости, в неплодородных регионах Африки высоко ценится козий"
            - link "навоз" [ref=e894] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B0%D0%B2%D0%BE%D0%B7
            - text: . Польза от коз не ограничивается получаемой от них продукцией. В некоторых труднодоступных горных районах, где нет других транспортных средств, коз используют как
            - link "тягловых" [ref=e895] [cursor=pointer]:
              - /url: /wiki/%D0%93%D1%83%D0%B6%D0%B5%D0%B2%D0%BE%D0%B9_%D1%82%D1%80%D0%B0%D0%BD%D1%81%D0%BF%D0%BE%D1%80%D1%82
            - text: или
            - link "вьючных" [ref=e896] [cursor=pointer]:
              - /url: /wiki/%D0%92%D1%8C%D1%8E%D1%87%D0%BD%D1%8B%D0%B9_%D1%82%D1%80%D0%B0%D0%BD%D1%81%D0%BF%D0%BE%D1%80%D1%82
            - text: животных, а в США и некоторых других странах вьючных и тягловых коз содержат ради развлечения или спорта. В овцеводческих хозяйствах Европы и Азии при помощи козлов управляют большими
            - link "овечьими" [ref=e897] [cursor=pointer]:
              - /url: /wiki/%D0%9E%D0%B2%D1%86%D0%B0
            - text: отарами. В Британии, США, Австралии и других странах козы помогают регулировать дикую растительность и ухаживать за парками. С давних времён коз используют в бытовых и религиозных обрядах как выкуп или жертвенное животное. Существуют даже бои коз, которые считаются бескровным зрелищем
            - superscript [ref=e898]:
              - link "[25]" [ref=e899] [cursor=pointer]:
                - /url: "#cite_note-бой-34"
            - text: . Однако породообразование у коз в первую очередь ориентировано именно на продукцию. Соответственно, при формировании пород единственной целью и критерием всегда является продуктивность, которая оценивается с точки зрения количества и качества продукта, а также расходов и трудозатрат, связанных с его получением
            - superscript [ref=e900]:
              - link "[6]" [ref=e901] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - superscript [ref=e902]:
              - link "[26]" [ref=e903] [cursor=pointer]:
                - /url: "#cite_note-_527322f588ad7dbc-35"
            - text: .
          - paragraph [ref=e904]:
            - text: Породы, которые выведены в результате целенаправленной
            - link "селекционной деятельности" [ref=e905] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B5%D0%BB%D0%B5%D0%BA%D1%86%D0%B8%D1%8F
            - text: человека, включая определение цели, подбор исходных пород или популяций, планирование и реализацию программы выведения и отбора, называются «заводскими». Породы, сформировавшиеся на определённой территории под влиянием стихийного отбора, или «
            - link "народной селекции" [ref=e906] [cursor=pointer]:
              - /url: /wiki/%D0%98%D1%81%D0%BA%D1%83%D1%81%D1%81%D1%82%D0%B2%D0%B5%D0%BD%D0%BD%D1%8B%D0%B9_%D0%BE%D1%82%D0%B1%D0%BE%D1%80
            - text: », называют «аборигенными» или «местными», такие породы обычно обитают и разводятся в тех районах и условиях, где они и сформировались
            - superscript [ref=e907]:
              - link "[3]" [ref=e908] [cursor=pointer]:
                - /url: "#cite_note-GRFA-4"
            - superscript [ref=e909]:
              - link "[6]" [ref=e910] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - superscript [ref=e911]:
              - link "[27]" [ref=e912] [cursor=pointer]:
                - /url: "#cite_note-Танана-36"
            - text: .
          - paragraph [ref=e913]:
            - text: Обычно заводские породы — специализированные и высоко продуктивные (молочные, мясные), они предназначены для интенсивных высокотехнологичных хозяйств и крайне требовательны к условиям содержания. Аборигенные породы, как правило, более или менее универсальны, от них получают два-три и больше видов продукции. Их продуктивность по количеству продукта очень низкая, но, в отличие от заводских, аборигенные породы идеально приспособлены к местным эко-климатическим условиям, могут кормиться скудным подножным кормом, в засушливых регионах по нескольку дней обходятся без воды. У некоторых местных пород выработана
            - link "толерантность" [ref=e914] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%BC%D0%BC%D1%83%D0%BD%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B0%D1%8F_%D1%82%D0%BE%D0%BB%D0%B5%D1%80%D0%B0%D0%BD%D1%82%D0%BD%D0%BE%D1%81%D1%82%D1%8C
            - text: (невосприимчивость) к распространённым в местах их обитания заболеваниям и паразитам, из-за которых разведение в этих районах других пород коз невозможно
            - superscript [ref=e915]:
              - link "[3]" [ref=e916] [cursor=pointer]:
                - /url: "#cite_note-GRFA-4"
            - superscript [ref=e917]:
              - link "[6]" [ref=e918] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - superscript [ref=e919]:
              - link "[9]" [ref=e920] [cursor=pointer]:
                - /url: "#cite_note-AG-11"
            - superscript [ref=e921]:
              - link "[27]" [ref=e922] [cursor=pointer]:
                - /url: "#cite_note-Танана-36"
            - superscript [ref=e923]:
              - link "[28]" [ref=e924] [cursor=pointer]:
                - /url: "#cite_note-_a28a6662ed24926b-37"
            - superscript [ref=e925]:
              - link "[29]" [ref=e926] [cursor=pointer]:
                - /url: "#cite_note-Итал-38"
            - text: .
          - paragraph [ref=e927]:
            - text: Наиболее распространённый способ создания новых пород, как заводских, так и местных — улучшение аборигенных коз скрещиванием по определённой схеме с высокопродуктивными породами. Так появляются породы, внешне похожие на заводских прародителей, но приспособленные к местным условиям. Продуктивность таких пород далека от продуктивности специализированных заводских, но всё же выше, чем у аборигенных. Некоторые заводские породы изначально создаются как породы двойного назначения (мясо-молочные, мясо-шёрстные и т. д.)
            - superscript [ref=e928]:
              - link "[3]" [ref=e929] [cursor=pointer]:
                - /url: "#cite_note-GRFA-4"
            - superscript [ref=e930]:
              - link "[6]" [ref=e931] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - text: .
          - generic [ref=e932]:
            - heading "Плодовитость" [level=4] [ref=e933]: Плодовитость
            - generic [ref=e934]:
              - text: "["
              - link "править" [ref=e935] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&stable=0&veaction=edit&section=5
              - text: "|"
              - link "править код" [ref=e936] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&action=edit&section=5
              - text: "]"
          - paragraph [ref=e937]:
            - text: Способность коз приносить потомство очень важна при любом типе продуктивности породы. Родившиеся козлята увеличат производительное стадо или в скором будущем дадут мясо, а лактация у козоматок продолжается несколько месяцев после рождения приплода (козления). Важными породными признаками являются ранее
            - link "половое созревание" [ref=e938] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%BB%D0%BE%D0%B2%D0%BE%D0%B5_%D1%81%D0%BE%D0%B7%D1%80%D0%B5%D0%B2%D0%B0%D0%BD%D0%B8%D0%B5
            - text: молодых козочек, предрасположенность к
            - link "многоплодности" [ref=e939] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BD%D0%BE%D0%B3%D0%BE%D0%BF%D0%BB%D0%BE%D0%B4%D0%BD%D0%B0%D1%8F_%D0%B1%D0%B5%D1%80%D0%B5%D0%BC%D0%B5%D0%BD%D0%BD%D0%BE%D1%81%D1%82%D1%8C
            - text: ","
            - link "фертильность" [ref=e940] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B5%D1%80%D1%82%D0%B8%D0%BB%D1%8C%D0%BD%D0%BE%D1%81%D1%82%D1%8C
            - text: (способность к зачатию), выживаемость козлят в раннем возрасте. Подобно диким предкам, большинство коз
            - link "способны к спариванию" [ref=e941] [cursor=pointer]:
              - /url: /wiki/%D0%AD%D1%81%D1%82%D1%80%D1%83%D1%81
            - text: один раз в год в определённый сезон, но для некоторых пород свойственны более частые периоды готовности к спариванию. Такая особенность позволяет получать более одного приплода в год (три приплода за два года и даже два за один год) и, к тому же, обеспечивает непрерывность получения от стада мяса и молока. Для коз шёрстно-пухового направления наоборот, желательна выраженная сезонность в спаривании и козлении, потому что продукцию собирают один раз в год в строго определённое время
            - superscript [ref=e942]:
              - link "[6]" [ref=e943] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - superscript [ref=e944]:
              - link "[18]" [ref=e945] [cursor=pointer]:
                - /url: "#cite_note-Ч-плем-22"
            - text: .
          - generic [ref=e946]:
            - heading "Молочная продуктивность" [level=4] [ref=e947]: Молочная продуктивность
            - generic [ref=e948]:
              - text: "["
              - link "править" [ref=e949] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&stable=0&veaction=edit&section=6
              - text: "|"
              - link "править код" [ref=e950] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&action=edit&section=6
              - text: "]"
          - paragraph [ref=e951]:
            - text: Для специализированных молочных пород экономически выгоден длинный интервал между козлениями и продолжительная лактация. Лучшие заводские молочные породы способны доиться непрерывно до 20-24 месяцев, иногда и более, однако из практических соображений срок лактации ограничивают 10-11 месяцами. Высокие — несколько литров — удои предполагают достаточно объёмное вымя. Маленькое вымя аборигенных коз не обеспечивает больших удоев, но на горных пастбищах и в зарослях большое вымя страдало бы от постоянных травм. В зависимости от способа доения — машинного или ручного — отбираются свойственные породе форма, размер и расположение сосков
            - superscript [ref=e952]:
              - link "[18]" [ref=e953] [cursor=pointer]:
                - /url: "#cite_note-Ч-плем-22"
            - superscript [ref=e954]:
              - link "[30]" [ref=e955] [cursor=pointer]:
                - /url: "#cite_note-_5dbc2eb047d37028-39"
            - text: .
          - paragraph [ref=e956]:
            - text: Породные особенности у коз проявляются не только в величине удоев, но и в составе молока. Среднее содержание
            - link "жира" [ref=e957] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D0%BB%D0%BE%D1%87%D0%BD%D1%8B%D0%B9_%D0%B6%D0%B8%D1%80
            - text: ","
            - link "белка" [ref=e958] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B5%D0%BB%D0%BA%D0%B8
            - text: ", других веществ — это"
            - link "наследуемые" [ref=e959] [cursor=pointer]:
              - /url: /wiki/%D0%9D%D0%B0%D1%81%D0%BB%D0%B5%D0%B4%D1%83%D0%B5%D0%BC%D0%BE%D1%81%D1%82%D1%8C_(%D0%B3%D0%B5%D0%BD%D0%B5%D1%82%D0%B8%D0%BA%D0%B0)
            - text: породные признаки. Кроме того, компоненты молока определяют его пригодность к разным видам переработки. Молоко одних пород лучше подходит для
            - link "пастеризации" [ref=e960] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%B0%D1%81%D1%82%D0%B5%D1%80%D0%B8%D0%B7%D0%B0%D1%86%D0%B8%D1%8F
            - text: ", других — содержит вещества, необходимые для производства"
            - link "сыра" [ref=e961] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D1%8B%D1%80
            - text: или
            - link "йогурта" [ref=e962] [cursor=pointer]:
              - /url: /wiki/%D0%99%D0%BE%D0%B3%D1%83%D1%80%D1%82
            - text: . Есть местные породы, молоко которых обладает особыми качествами — исключительно высокой жирностью, очень долго хранится или годится для изготовления уникального местного сорта сыра.
          - generic [ref=e963]:
            - heading "Мясная продуктивность" [level=4] [ref=e964]: Мясная продуктивность
            - generic [ref=e965]:
              - text: "["
              - link "править" [ref=e966] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&stable=0&veaction=edit&section=7
              - text: "|"
              - link "править код" [ref=e967] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&action=edit&section=7
              - text: "]"
          - paragraph [ref=e968]:
            - text: Специализированные мясные породы характеризуются особо быстрым ростом до достижения оптимальной
            - link "убойной" [ref=e969] [cursor=pointer]:
              - /url: /wiki/%D0%A3%D0%B1%D0%BE%D0%B9_%D0%B6%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D1%8B%D1%85
            - text: кондиции. Для аборигенных пород важны местные традиции употребления козлятины. Так, в некоторых регионах предпочитают забивать 2-х, 3-х или 6-месячных козлят, соответственно в местных породах именно на этот период приходится наибольшая скорость роста. Породными признаками являются
            - link "убойный выход" [ref=e970] [cursor=pointer]:
              - /url: /wiki/%D0%A3%D0%B1%D0%BE%D0%B9%D0%BD%D1%8B%D0%B9_%D0%B2%D1%8B%D1%85%D0%BE%D0%B4
            - text: (отношение веса туши к живому весу), соотношение веса мяса и костей в туше, жирность, химический состав и вкусовые качества мяса
            - superscript [ref=e971]:
              - link "[6]" [ref=e972] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - text: .
          - generic [ref=e973]:
            - heading "Шёрстная и пуховая продуктивность" [level=4] [ref=e974]: Шёрстная и пуховая продуктивность
            - generic [ref=e975]:
              - text: "["
              - link "править" [ref=e976] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&stable=0&veaction=edit&section=8
              - text: "|"
              - link "править код" [ref=e977] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&action=edit&section=8
              - text: "]"
          - paragraph [ref=e978]:
            - text: Ценность шерсти и пуха зависит от их пригодности к промышленной переработке. Селекция шёрстных пород направлена на получение длинной, тонкой, ровной, прочной и упругой шерсти, одинаковой по всему корпусу козы. Белая и светлая шерсть ценится выше тёмной. По тем же параметрам оценивается и пух (кашмир, кашемир, пашмина — от местных названий старейших популяций пуховых коз). Шёрстный покров пуховых коз всегда состоит из смеси пуха и остевых волос, так что работа с породами имеет целью не только повышение качества пуха, но и увеличение его доли в общей массе шерсти. Пух вычёсывают в период массовой
            - link "линьки" [ref=e979] [cursor=pointer]:
              - /url: /wiki/%D0%9B%D0%B8%D0%BD%D1%8C%D0%BA%D0%B0
            - text: ", поэтому важно, чтобы в это время он отделялся легко и полностью. Мясо-шёрстно-пуховых местных коз и шёрстно-пуховые породы смешанного происхождения с небольшим содержанием пуха стригут и лишь затем вручную отделяют пух от остевого волоса. При такой технологии быстрая и дружная линька, наоборот, приводила бы к потерям"
            - superscript [ref=e980]:
              - link "[18]" [ref=e981] [cursor=pointer]:
                - /url: "#cite_note-Ч-плем-22"
            - superscript [ref=e982]:
              - link "[31]" [ref=e983] [cursor=pointer]:
                - /url: "#cite_note-_dc3b198b1429336d-40"
            - superscript [ref=e984]:
              - link "[32]" [ref=e985] [cursor=pointer]:
                - /url: "#cite_note-_2e42cc08147dbbce-41"
            - superscript [ref=e986]:
              - link "[33]" [ref=e987] [cursor=pointer]:
                - /url: "#cite_note-_5dbc2fb047d371f1-42"
            - text: .
          - paragraph [ref=e988]:
            - text: "Шерсть промежуточного типа — особая форма остевого волоса, по физическим характеристикам близкая к пуху: очень тонкая, лёгкая, мягкая и эластичная. Такой шерстью обладает единственная порода коз —"
            - link "ангорская" [ref=e989] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BE%D1%80%D1%81%D0%BA%D0%B0%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0
            - text: ", из неё производят пряжу с торговым названием «"
            - link "мохер" [ref=e990] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%BE%D1%85%D0%B5%D1%80
            - text: »
            - superscript [ref=e991]:
              - link "[комм. 10]" [ref=e992] [cursor=pointer]:
                - /url: "#cite_note-44"
            - text: (
            - link "англ." [ref=e993] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: mohair), а для необработанной шерсти в русскоязычной литературе используется термин «могер»
            - superscript [ref=e994]:
              - link "[35]" [ref=e995] [cursor=pointer]:
                - /url: "#cite_note-Ч-ш-45"
            - text: . Производные породы, полученные скрещиванием ангоры с местными пуховыми или шёрстными породами, также обладают шерстью промежуточного типа (или смешанной), но её характеристики не соответствуют могеру; такие породы и их шерсть за рубежом называют «кашгора» (
            - link "англ." [ref=e996] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B3%D0%BB%D0%B8%D0%B9%D1%81%D0%BA%D0%B8%D0%B9_%D1%8F%D0%B7%D1%8B%D0%BA
            - text: cashgora — от cashmere + angora)
            - superscript [ref=e997]:
              - link "[32]" [ref=e998] [cursor=pointer]:
                - /url: "#cite_note-_2e42cc08147dbbce-41"
            - text: .
