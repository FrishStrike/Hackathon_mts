          - paragraph [ref=e495]:
            - text: В животноводстве, помимо понятия «порода», используется понятие «породная группа», которое определяет
            - link "популяцию" [ref=e496] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D0%BF%D1%83%D0%BB%D1%8F%D1%86%D0%B8%D1%8F
            - text: животных, не в полной мере соответствующую требованиям к породе, например, с недостаточным поголовьем или количеством линий, так что чистопородное разведение сопряжено с высоким риском
            - link "инбредной депрессии" [ref=e497] [cursor=pointer]:
              - /url: /wiki/%D0%98%D0%BD%D0%B1%D1%80%D0%B5%D0%B4%D0%BD%D0%B0%D1%8F_%D0%B4%D0%B5%D0%BF%D1%80%D0%B5%D1%81%D1%81%D0%B8%D1%8F
            - text: . Подходы, применяемые ФАО с позиции изучения и сохранения
            - link "биологического разнообразия" [ref=e498] [cursor=pointer]:
              - /url: /wiki/%D0%91%D0%B8%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%BE%D0%B5_%D1%80%D0%B0%D0%B7%D0%BD%D0%BE%D0%BE%D0%B1%D1%80%D0%B0%D0%B7%D0%B8%D0%B5
            - text: "домашних животных, в этом плане более лояльны и включают в число пород малочисленные популяции. Кроме пород выделяют также разновидности (типы, экотипы): это часть породы, незначительно отличающаяся от остального поголовья в породе, но всё же явно различимая, как правило, по небольшому числу признаков. По вопросу разграничения пород и разновидностей тоже нет единства, и нередки случаи, когда разновидности породы выделяют в самостоятельные породы, или наоборот, одну породу присоединяют к другой в качестве разновидности. Для примера, словарь пород сельскохозяйственных животных Мэйсона содержал (в редакции 1996 года) 595 пород и 76 разновидностей, в базе данных пород домашних животных ФАО"
            - superscript [ref=e499]:
              - link "[5]" [ref=e500] [cursor=pointer]:
                - /url: "#cite_note-_9246156dd5e6f9a1-6"
            - text: по состоянию на 2009 год числились 1153 породы коз
            - superscript [ref=e501]:
              - link "[6]" [ref=e502] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - text: ", а в научной литературе можно встретить названия и описания пород коз, не вошедших ни в словарь Мэйсона, ни в базу данных ФАО."
          - paragraph [ref=e503]:
            - text: Не существует и общепринятой системы регистрации пород. В зависимости от национального законодательства и местных традиций признание поголовья породой могут осуществлять государственные органы, профильные общественные организации, ассоциации или клубы заводчиков
            - superscript [ref=e504]:
              - link "[комм. 2]" [ref=e505] [cursor=pointer]:
                - /url: "#cite_note-8"
            - text: и любителей породы, а для некоторых стран признание факта существования породы заключается лишь в публикации мнения исследователя в научном журнале. Единственным общепризнанным документом считается
            - link "племенная книга" [ref=e506] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BB%D0%B5%D0%BC%D0%B5%D0%BD%D0%BD%D0%B0%D1%8F_%D0%BA%D0%BD%D0%B8%D0%B3%D0%B0
            - text: — основной регистр, отражающий историю породы и происхождение породистых животных. Для трансграничных пород, то есть тех, которые разводятся не только в стране происхождения, но и в других местах, организации, контролирующие разведение породы, могут автономно действовать в каждой стране, где распространена порода, их может быть несколько в стране, и каждая из организаций может утверждать свой
            - link "стандарт" [ref=e507] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D1%82%D0%B0%D0%BD%D0%B4%D0%B0%D1%80%D1%82_%D0%BF%D0%BE%D1%80%D0%BE%D0%B4%D1%8B
            - text: и вести свою племенную книгу. В описании пород в списке приведены, при наличии, сведения о годе признания породы (утверждении стандарта) на её родине согласно действующему там порядку. Приводится и год открытия (начала) племенной книги, а если книг несколько — год открытия самой ранней из них, чаще всего это племенная книга в стране происхождения породы.
          - paragraph [ref=e508]:
            - text: Распространение породного разнообразия коз по территории их обитания неоднородно. По данным ФАО, 95 % мирового поголовья коз приходится на территории
            - link "развивающихся стран" [ref=e509] [cursor=pointer]:
              - /url: /wiki/%D0%A0%D0%B0%D0%B7%D0%B2%D0%B8%D0%B2%D0%B0%D1%8E%D1%89%D0%B8%D0%B5%D1%81%D1%8F_%D1%81%D1%82%D1%80%D0%B0%D0%BD%D1%8B
            - text: ", где выращивают приблизительно 60 % от всего многообразия пород. В то же время на долю"
            - link "Европы" [ref=e510] [cursor=pointer]:
              - /url: /wiki/%D0%95%D0%B2%D1%80%D0%BE%D0%BF%D0%B0
            - text: приходится лишь 4 % поголовья и 33 % генетического разнообразия
            - superscript [ref=e511]:
              - link "[6]" [ref=e512] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - text: . Такой дисбаланс обусловлен, в первую очередь, низким уровням развития чистопородного животноводства в развивающихся странах. В Европе деятельность по описанию, учёту, сохранению и целенаправленному развитию пород коз началась в последней трети XIX века, а к началу XXI века в каждой стране имеются организации, занимающиеся стандартизацией, контролирующие чистопородное разведение и ведущие
            - link "племенные книги" [ref=e513] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BB%D0%B5%D0%BC%D0%B5%D0%BD%D0%BD%D0%B0%D1%8F_%D0%BA%D0%BD%D0%B8%D0%B3%D0%B0
            - text: . В большинстве стран, насчитывающих наибольшее поголовье коз, специализированные государственные или общественные организации по породам животных отсутствуют и племенные книги не ведутся. Бо́льшая часть имеющихся в них коз относятся к неидентифицированным местным популяциям, не подвергались
            - link "направленной селекции" [ref=e514] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B5%D0%BB%D0%B5%D0%BA%D1%86%D0%B8%D1%8F
            - text: и зачастую находятся в труднодоступных районах. В 1996 году Галл
            - superscript [ref=e515]:
              - link "[7]" [ref=e516] [cursor=pointer]:
                - /url: "#cite_note-9"
            - text: описал 136 новых пород из разных регионов, в то время как в редакции словаря пород Мэйсона 1981 года числилось лишь 115 пород коз, известных к этому моменту
            - superscript [ref=e517]:
              - link "[2]" [ref=e518] [cursor=pointer]:
                - /url: "#cite_note-Galal-3"
            - superscript [ref=e519]:
              - link "[6]" [ref=e520] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - superscript [ref=e521]:
              - link "[8]" [ref=e522] [cursor=pointer]:
                - /url: "#cite_note-Dubeuf-10"
            - text: . В рамках деятельности ФАО по изучению и сохранению биоразнообразия публикуются сведения об обнаруженных или впервые описанных породах. В современных условиях идентификацию и дифференциацию пород, помимо исследования
            - link "фенотипа" [ref=e523] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B5%D0%BD%D0%BE%D1%82%D0%B8%D0%BF
            - text: ", осуществляют с использованием современных"
            - link "методов генетики" [ref=e524] [cursor=pointer]:
              - /url: /wiki/%D0%93%D0%B5%D0%BD%D0%B5%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B9_%D0%B0%D0%BD%D0%B0%D0%BB%D0%B8%D0%B7
            - text: ", на"
            - link "хромосомном" [ref=e525] [cursor=pointer]:
              - /url: /wiki/%D0%A5%D1%80%D0%BE%D0%BC%D0%BE%D1%81%D0%BE%D0%BC%D0%B0
            - text: и
            - link "митохондриальном" [ref=e526] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B8%D1%82%D0%BE%D1%85%D0%BE%D0%BD%D0%B4%D1%80%D0%B8%D0%B0%D0%BB%D1%8C%D0%BD%D0%B0%D1%8F_%D0%94%D0%9D%D0%9A
            - text: уровне
            - superscript [ref=e527]:
              - link "[9]" [ref=e528] [cursor=pointer]:
                - /url: "#cite_note-AG-11"
            - superscript [ref=e529]:
              - link "[10]" [ref=e530] [cursor=pointer]:
                - /url: "#cite_note-12"
            - superscript [ref=e531]:
              - link "[11]" [ref=e532] [cursor=pointer]:
                - /url: "#cite_note-_70f6b0e1ddcd8956-13"
            - superscript [ref=e533]:
              - link "[12]" [ref=e534] [cursor=pointer]:
                - /url: "#cite_note-S73-14"
            - text: . Но до сих пор, по общему мнению учёных, идентифицирована и описана лишь малая часть местных пород коз, фактически обитающих в
            - link "Западной Азии" [ref=e535] [cursor=pointer]:
              - /url: /wiki/%D0%97%D0%B0%D0%BF%D0%B0%D0%B4%D0%BD%D0%B0%D1%8F_%D0%90%D0%B7%D0%B8%D1%8F
            - text: ","
            - link "Северной Африке" [ref=e536] [cursor=pointer]:
              - /url: /wiki/%D0%A1%D0%B5%D0%B2%D0%B5%D1%80%D0%BD%D0%B0%D1%8F_%D0%90%D1%84%D1%80%D0%B8%D0%BA%D0%B0
            - text: и в
            - link "Андах" [ref=e537] [cursor=pointer]:
              - /url: /wiki/%D0%90%D0%BD%D0%B4%D1%8B
            - text: ", а значительная часть местных пород, внесённых в базу данных ФАО, за пределами своих регионов неизвестна"
            - superscript [ref=e538]:
              - link "[2]" [ref=e539] [cursor=pointer]:
                - /url: "#cite_note-Galal-3"
            - superscript [ref=e540]:
              - link "[6]" [ref=e541] [cursor=pointer]:
                - /url: "#cite_note-_da713f8e75bfe38b-7"
            - superscript [ref=e542]:
              - link "[13]" [ref=e543] [cursor=pointer]:
                - /url: "#cite_note-_c90fe014fc66e851-15"
            - text: .
