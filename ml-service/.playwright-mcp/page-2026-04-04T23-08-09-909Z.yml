            - text: (ФАО) определяет породу как группу животных одного вида, специфические признаки которой позволяют визуально отличить её от других пород, или же группу, сходную по
            - link "фенотипу" [ref=e279] [cursor=pointer]:
              - /url: /wiki/%D0%A4%D0%B5%D0%BD%D0%BE%D1%82%D0%B8%D0%BF
            - text: с другой породой, но отделённую от неё территориально или на культурном уровне
            - superscript [ref=e280]:
              - link "[комм. 1]" [ref=e281] [cursor=pointer]:
                - /url: "#cite_note-2"
            - text: ", так что её можно идентифицировать как отдельную породу"
            - superscript [ref=e282]:
              - link "[2]" [ref=e283] [cursor=pointer]:
                - /url: "#cite_note-Galal-3"
            - superscript [ref=e284]:
              - link "[3]" [ref=e285] [cursor=pointer]:
                - /url: "#cite_note-GRFA-4"
            - text: . Полный перечень существующих в мире пород коз пока не создан, не известно и общее количество пород. Такая ситуация обусловлена тем, что нет единого, согласованного учёными и специалистами всех стран, подхода к идентификации пород, а значительная часть существующих пород коз до настоящего времени не описана и не изучена.
