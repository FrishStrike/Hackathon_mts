              - text: "]"
          - paragraph [ref=e1024]:
            - generic [ref=e1025]: Пометка tr означает, что название породы не встречается в источниках на русском языке и образовано переводом или транслитерацией названия на английском языке или языке страны происхождения, либо что порода не упоминается в иноязычных источниках и название на английском языке образовано переводом с русского.
