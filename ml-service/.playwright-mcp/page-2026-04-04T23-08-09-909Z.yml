                - cell "15" [ref=e773]
                - cell "130" [ref=e774]
              - row "самок 13 120" [ref=e775]:
                - cell "самок" [ref=e776]
                - cell "13" [ref=e777]
                - cell "120" [ref=e778]
              - row "удой за лактацию кг 16 775" [ref=e779]:
                - cell "удой за лактацию" [ref=e780]
                - cell "кг" [ref=e781]
                - cell "16" [ref=e782]
                - cell "775" [ref=e783]
              - row "Продолжительность лактации[комм. 8] дней 85 300" [ref=e784]:
                - cell "Продолжительность лактации[комм. 8]" [ref=e785]:
                  - text: Продолжительность лактации
