              - link "Обратно к тексту" [ref=e12369] [cursor=pointer]:
                - /url: "#cite_ref-2"
                - text: ↑
              - text: Например, принадлежащие разным племенам или разным социальным слоям, так что обитающие на одной территории животные из двух разных популяций разделены физически и не смешиваются. Так, козы крупного молочного хозяйства и похожие козы в ближайшей деревне могут быть признаны разными породами.
