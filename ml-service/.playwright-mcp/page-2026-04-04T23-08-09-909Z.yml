              - row "Anglo-Nubian син. nubian Англо-нубийская Мл+Мс Англия ⍐ 76−136 ℮ 60−140 🥛 750−1200 f 4,6−9 ⧗ 9−10 🐐 140 Выведена в XIX веке скрещиванием местных коз с джамнапари и зараиби. Крупная коза с длинными висячими ушами. Профиль римский, нижняя челюсть укороченная. Животные могут быть рогатыми или комолыми, серёжки отсутствуют. Шерсть короткая, глянцевая, жёлто-коричневой или белой масти, нередки пятна. Очень плодовитая. Часто используется для улучшения и создания пород. Племенная книга с 1910 г. [Е][М][P] [59][60][72]" [ref=e1445]:
