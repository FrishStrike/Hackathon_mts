              - row "Savanna син. savannah white, white boer Саванна[45] Мс+Мл Африка ⍐ 48−62 ℮ 60 🐐 122 Выведена в Южной Африке с 1957 года скрещиванием цветных козлов местных пород с белыми козами и отбором по окрасу, признана в 1993 году. Уши овальные висячие, профиль выпуклый. Шерсть короткая жёсткая, зимой с пуховым подшёрстком. Преобладающий окрас белый, возможен красный, голубой, чёрный. Кожа тёмная, чёрные рога и копыта, веки хорошо пигментированы. Благодаря окрасу коза пользуется спросом в качестве жертвенного животного в религиозных ритуалах африканских племён. Распространена на всей территории Африки. [М] [119][128][368]" [ref=e10075]:
