              - row "Angora син. ankara, tiftik, sybokke, mohair Ангорская син. ангора, кемельская Ш+Мс Турция ⍐ 51−66 ℮ 27−45 ⋁ ♂♀ 🥛 51−135 f 4,4−4,5 ⧗ 5−7 ✀ 0,6−6,1 🔪 38−52 🐐 101−124 Древняя порода. Профиль у самцов слегка выпуклый, у самок прямой или слабо вогнутый. Уши длинные, полувисячие, рога у козлов сильные, плавно изогнутые, у коз саблевидные средней величины. Шерсть длинная (18-25 см), блестящая, курчавая, особого качества (могер). В прохладном климате стрижётся дважды в год. Преобладающая масть белая, есть отродья коричневой, чёрной и серой масти. Использовалась при создании многих пород шёрстного направления. Племенная книга с 1906 г. [Е][М][P][D] [35][39][40] [41][63][65]" [ref=e1469]:
