              - img [ref=e246]
          - paragraph [ref=e248]:
            - text: Козы — сельскохозяйственные животные вида
            - link "домашняя коза" [ref=e249] [cursor=pointer]:
              - /url: /wiki/%D0%94%D0%BE%D0%BC%D0%B0%D1%88%D0%BD%D1%8F%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0
            - text: (Capra hircus),
            - link "мелкий рогатый скот" [ref=e250] [cursor=pointer]:
              - /url: /wiki/%D0%9C%D0%B5%D0%BB%D0%BA%D0%B8%D0%B9_%D1%80%D0%BE%D0%B3%D0%B0%D1%82%D1%8B%D0%B9_%D1%81%D0%BA%D0%BE%D1%82
            - text: — широко распространены во всём мире и используются практически в любых
            - link "природно-климатических условиях" [ref=e251] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BB%D0%B8%D0%BC%D0%B0%D1%82
            - text: ", даже таких, где другие продуктивные животные обитать не могут. Разные"
            - link "породы" [ref=e252] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D0%B0_(%D0%B6%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D0%BE%D0%B2%D0%BE%D0%B4%D1%81%D1%82%D0%B2%D0%BE)
            - text: коз приспособлены к различным
            - link "системам животноводства" [ref=e253] [cursor=pointer]:
              - /url: /w/index.php?title=%D0%A1%D0%B8%D1%81%D1%82%D0%B5%D0%BC%D0%B0_%D0%B6%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D0%BE%D0%B2%D0%BE%D0%B4%D1%81%D1%82%D0%B2%D0%B0&action=edit&redlink=1
            - text: — от маленьких стад из 3—5 голов на скудном подножном корме до крупных интенсивных животноводческих предприятий, от круглогодичного
            - link "выпаса" [ref=e254] [cursor=pointer]:
              - /url: /wiki/%D0%92%D1%8B%D0%BF%D0%B0%D1%81
            - text: до полностью стойлового содержания, с множеством промежуточных вариаций между ними. Козы являются источником нескольких видов продукции, из них основные —
            - link "молоко" [ref=e255] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D1%8C%D0%B5_%D0%BC%D0%BE%D0%BB%D0%BE%D0%BA%D0%BE
            - text: ","
            - link "мясо" [ref=e256] [cursor=pointer]:
              - /url: /wiki/%D0%9A%D0%BE%D0%B7%D0%BB%D1%8F%D1%82%D0%B8%D0%BD%D0%B0
            - text: и
            - link "шерсть" [ref=e257] [cursor=pointer]:
              - /url: /wiki/%D0%A8%D0%B5%D1%80%D1%81%D1%82%D1%8C_(%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB)
            - text: . Среди пород коз есть высокопродуктивные специализированные, породы двойного-тройного назначения и универсальные. Внешние различия между породами представлены множеством основных и второстепенных признаков, которые варьируются в очень широком диапазоне.
          - paragraph [ref=e258]:
            - text: В список включены породы коз, описанные, хотя бы кратко, в одном или нескольких основных источниках
            - link "Перейти к разделу «ОИ»" [ref=e260] [cursor=pointer]:
              - /url: "#ОИ"
              - generic "Перейти к разделу «ОИ»" [ref=e261]: ➤
            - strong [ref=e262]: В шаблоне «Переход» указан второй параметр, отличный от «back».
            - text: — авторитетных изданиях, содержащих перечни пород коз без ограничения по территориальному признаку (породы мира). Не включены исчезнувшие породы, а также упомянутые, но не описанные ни в одном из основных источников.
          - generic [ref=e263]:
            - heading "Многообразие пород коз" [level=2] [ref=e264]: Многообразие пород коз
            - generic [ref=e265]:
              - text: "["
              - link "править" [ref=e266] [cursor=pointer]:
                - /url: /w/index.php?title=%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D1%8B_%D0%BA%D0%BE%D0%B7&stable=0&veaction=edit&section=1
              - text: "|"
              - link "править код" [ref=e267] [cursor=pointer]:
