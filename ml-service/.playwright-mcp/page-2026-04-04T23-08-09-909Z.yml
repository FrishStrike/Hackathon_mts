              - row "Croatian spotted хорв. hrvatska šarena, (domaća, naziva) balkanska, bukovica, dinarska šarena[комм. 19], šara Хорватская пёстраяtr Мс Хорватия ⍐ 55−75 ℮ 35−65 🥛 80−250 f 2,5−6 ⧗ 2−9 ✀ 0,3−1 🔪 48 🐐 125−150 Аборигенная порода труднодоступных горных регионов. Профиль прямой, уши средней длины стоячие и горизонтальные. Рога длинные саблевидные, возможна комолость. Кожа плотная, пигментированная. Шерсть длинная, густая, блестящая, преобладающий окрас чёрно-белый характерной раскраски «заднее манто», встречается слошной чёрный, коричневый и серый. Разводится в Далмации. Племенная книга с 1999 г. [М][P][D] [173][174][175]" [ref=e3626]:
