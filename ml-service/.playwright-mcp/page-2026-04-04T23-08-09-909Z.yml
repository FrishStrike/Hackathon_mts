              - text: "]"
          - paragraph [ref=e268]:
            - text: В мире разводится и используется множество
            - link "пород" [ref=e269] [cursor=pointer]:
              - /url: /wiki/%D0%9F%D0%BE%D1%80%D0%BE%D0%B4%D0%B0_(%D0%B6%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D0%BE%D0%B2%D0%BE%D0%B4%D1%81%D1%82%D0%B2%D0%BE)
            - link "коз" [ref=e270] [cursor=pointer]:
              - /url: /wiki/%D0%94%D0%BE%D0%BC%D0%B0%D1%88%D0%BD%D1%8F%D1%8F_%D0%BA%D0%BE%D0%B7%D0%B0
            - text: . Породой в
            - link "животноводстве" [ref=e271] [cursor=pointer]:
              - /url: /wiki/%D0%96%D0%B8%D0%B2%D0%BE%D1%82%D0%BD%D0%BE%D0%B2%D0%BE%D0%B4%D1%81%D1%82%D0%B2%D0%BE
            - text: называют группу
