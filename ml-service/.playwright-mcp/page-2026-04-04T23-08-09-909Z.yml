              - 'row "Bagot Багот Д Англия ℮ 25 ⋁ ♂♀ «Парковая порода», предназначена для размещения в парках и лесах. Завезена в Англию в XIV веке предположительно из Португалии, разводилась для спортивной охоты. Практически исчезла, но была восстановлена на базе швейцарских коз. Содержится в парках как декоративное животное и для контроля за растительностью. Некрупная коза с длинными рогами, длинной шерстью и характерной типичной расцветкой: чёрная голова и шея, корпус белый. Племенная книга с 1974 г. [Е][P][D] [96]" [ref=e1911]':
