              - row "Black Bengal син. bengal, deshi Бенгальская син. бенгальская чёрная Мс+Мл+Д Бангладеш Индия ⍐ 45−61 ℮ 19−35 ⋁ ♂♀ 🥛 16−144 f 6,5 ⧗ 2−4 🔪 45,7−55,5 🐐 160−231 Аборигенная порода Бенгалии, самая мелкая коза региона. Уши короткие, держатся горизонтально, профиль слабо вогнутый. Рога маленькие или средней величины, направлены вверх или назад. Шерсть короткая, мягкая и блестящая, преимущественно чёрного окраса, встречаются коричневый, серый, белый, двухцветные. Порода исключительно плодовитая, козлята рождаются два раза в год. Подходит для скудных пастбищ. Используется также как вьючное животное. Преобладающая порода в Бангладеш, разводится также в северо-восточной Индии (Ассам, Одиша, Бихар, Западная Бенгалия). [Е][М][P][D] [84][119][120] [121][122][123]" [ref=e2469]:
