              - 'row "Moxotó син. black-back Моксото́ Мл+Мс+Шк Бразилия ⍐ 62−71 ℮ 30−40 ⋁ ♂♀ 🥛 90 f 4 ⧗ 4 🔪 45 🐐 137 Получена скрещиванием французской альпийской с местными козами, происходящими от завезённых колонистами португальских коз породы чарнегуэйра или серпентина, отобранными по окрасу. Уши стоячие или горизонтальные, рога небольшие. Шерсть короткая. Окрас белый и светло-кремовый с чёрной раскраской «серна». Признана в 1977 году. Имеются разновидности: moxotó negra — чёрная или тёмно-коричневая с чёрным рисунком «серна», — и молочная moxotó lettera, в прошлом порода бранка сертанежа, сформированная скрещиванием местных коз с зааненской. Разводится в Пернамбуку. Племенная книга с 1976 г. [Е][М][P][D] [93][118]" [ref=e8308]':
