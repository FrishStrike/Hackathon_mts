              - 'row "Toggenburg син. alemã нем. Toggenburger Тоггенбургская Мл+Мс Швейцария ⍐ 68−83 ℮ 45−91 ⋁ ♂− 🥛 400−1047 f 2,9−7,9 ⧗ 9 Старейшая из швейцарских молочных пород. Уши стоячие, профиль вогнутый. Шерсть короткая или средней длины, на спине и ляжках может достигать 20 см. Окрас разных тонов бурого со «швейцарскими отметинами»: белыми полосами на морде, ушами и ногами. Порода многоплодная, выносливая, высокоудойная, молоко содержит много жира. Используется для улучшения и выведения новых пород. Племенная книга с 1890 г. [Е][М][P][D] [59][60][311]" [ref=e11293]':
