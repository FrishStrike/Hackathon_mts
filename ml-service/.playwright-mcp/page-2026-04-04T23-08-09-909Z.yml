              - row "Oberhasli син. oberhasli brienzer, brienz, hasli Оберхасле-бриенцская син. оберхасли, оберхазли, горная комолая, горная с мастью серны Мл Швейцария ⍐ 60−86 ℮ 40−80 🥛 500−1109 Признана как отдельная порода в 1977 году, до этого считалась разновидностью альпийской серны. Профиль прямой, уши маленькие стоячие. Рога саблевидные или отсутствуют. Шерсть короткая, окрас «серна» с чёрными полосами на морде и вдоль спины, встречается и чёрная масть. Порода характерна для кантонов Берн, Гларус, Граубюнден, Фрибур. В США под этим названием понимается местное поголовье, сформировавшееся на базе оберхасле-бриенцских коз, завезённых в 1936 году. Выделяют чистокровную швейцарскую оберхазли (swiss oberhasli, swiss alpine) и американскую оберхазли (american oberhasli) с примесью других пород. Их племенная книга ведётся c 1978 года. [Е][М][P] [60][72][96] [330]" [ref=e8847]:
